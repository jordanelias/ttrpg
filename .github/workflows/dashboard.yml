name: Valoria Dashboard

# Builds dashboard/data.json (tools/dashboard_data.py) and deploys
# dashboard/ to GitHub Pages. One-time manual step required before the
# first successful deploy: repo Settings -> Pages -> Source: "GitHub Actions"
# (the default GITHUB_TOKEN cannot flip that setting itself).

on:
  push:
    branches: [main]
    paths:
      - 'workplans/**'
      - 'proposals/**'       # proposals card recomputes inline (build_proposals section)
      - 'registers/editorial_ledger*.jsonl'
      - 'references/audit_registry.jsonl'
      - 'registers/handoffs/**'
      - 'HANDOFF.md'
      - 'CURRENT.md'            # rendered by the Reconciliation-status panel (build_drift)
      - 'dashboard/**'
      - 'tools/dashboard_data.py'
      - 'tools/review_core.py'          # Repository-state card reads review_core.collect()
      - 'registers/review_baseline.yaml' # the ratchet the review_state grade is graded against
      - 'tools/definitions_store.py'    # the browse "By definition" surface + parity gate
      - 'references/definitions/**'      # the generated unified definitions store
      - 'references/names_index.yaml'    # authoritative name source the definitions store merges
      - 'references/descriptor_registry.yaml'  # descriptor roster the definitions store merges
      - 'engine/engine_params/sim_params.json'         # the values-layer 'By value' browse surface
      - 'engine/engine_params/value_pointer_links.json'  # value<->pointer links rendered in browse
      - 'tools/observability/obs_core.py'   # shared primitives the inline proposals section uses
      - 'references/module_contracts.yaml'  # Missing card: contract doc_null/island/orphan-emit + key graph
      - 'tools/observability/build_incompleteness.py'  # the Missing-face scanner itself
      - 'skills/valoria-vector-audit/scripts/vector_audit.py'  # emits the Missing card's audit rows
      - '.github/workflows/dashboard.yml'
  schedule:
    # Daily fallback — staleness (workplan drift, CI status) can change even with
    # no commits to the paths above. NOTE: GitHub auto-disables scheduled workflows
    # after 60 days with no repository activity; the push trigger above is the
    # actual freshness backstop, this cron is a convenience, not the only path.
    - cron: '17 6 * * *'
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required — tools/dashboard_data.py's `activity` section
          # reads `git log`; the default shallow checkout (depth 1) would leave it
          # able to see only the single latest commit.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyyaml

      # ── Missing-face feed regeneration (bundled with deploy) ──────────────────
      # The dashboard's "Missing" card reads tools/observability/incompleteness.json.
      # These three explicitly-named steps REGENERATE that feed here, at deploy time,
      # so the published card is fresh with the tree being deployed — NOT the weekly
      # audit-refresh.yml snapshot. They write into the runner only (not committed):
      # the committed feed stays the weekly snapshot that serves the console + the
      # INCOMPLETENESS.md view; this deploy build gets its own fresh copy. Order is
      # load-bearing — each step's output is the next's input, ending at data.json.
      - name: Regenerate decisions digest (Missing-face prose rollup input)
        run: python3 tools/observability/build_decisions.py

      - name: Emit vector-audit structural findings (Missing-face input)
        # ~70s (curate_tokens): the audit's Mode-B implied-missing + Mode-H isolate
        # rows the ledger surfaces. MUST run before build_incompleteness.
        run: python3 skills/valoria-vector-audit/scripts/vector_audit.py --repo-root . --emit-findings tools/observability/audit_findings.json

      - name: Regenerate Incompleteness Ledger (Missing face)
        # Whole-tree scan for every stub/null/missing/excluded/unverified thing;
        # writes incompleteness.json that the next step's build_incompleteness card reads.
        run: python3 tools/observability/build_incompleteness.py

      - name: Build dashboard data.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 tools/dashboard_data.py

      - uses: actions/upload-pages-artifact@v3
        with:
          # Scoped to dashboard only — docs/ also holds unrelated internal
          # docs (docs/freshness_gate_spec.md, docs/governance_deferred.yaml)
          # that are not part of the published site.
          path: dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Summary
        run: echo "Dashboard live at ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"

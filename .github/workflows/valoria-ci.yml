name: Valoria Integrity Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on rapid pushes — saves CI minutes
concurrency:
  group: valoria-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── FOUNDATION: runs first, others depend on it ────────────────────────────

  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify all CI tools and repo tools are importable
        run: |
          python -m py_compile tools/ci_register_size_check.py
          python -m py_compile tools/ci_co_file_checker.py
          python -m py_compile tools/ci_editorial_checker.py
          python -m py_compile tools/ci_hooks_verifier.py
          python -m py_compile tools/broken_dependency_checker.py
          python -m py_compile tools/patch_propagation_checker.py
          python -m py_compile tools/freshness_gate.py
          python -m py_compile tools/compliance_check.py
          python -m py_compile tools/atomizer.py
          python -m py_compile tools/skeleton_gen.py
          python -m py_compile tools/index_gen.py
          echo "All tools: syntax OK"

  # ── EXTERNAL ENFORCEMENT: runs outside Claude, cannot be bypassed ──────────

  register-sizes:
    name: Register Size Check
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check all register sizes within thresholds
        run: python3 tools/ci_register_size_check.py

  hooks-verifier:
    name: Enforcement Architecture Intact
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify hooks wired, skills clean, skeleton limits
        run: python3 tools/ci_hooks_verifier.py

  co-file-check:
    name: Co-File Requirements
    runs-on: ubuntu-latest
    needs: [register-sizes, hooks-verifier]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for accurate diffs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check co-file rules satisfied
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 tools/ci_co_file_checker.py

  editorial-check:
    name: Editorial Path Markers
    runs-on: ubuntu-latest
    needs: [register-sizes, hooks-verifier]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check editorial paths have markers, including deleted files
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 tools/ci_editorial_checker.py

  integrity:
    name: Repository Integrity
    runs-on: ubuntu-latest
    needs: [register-sizes, hooks-verifier]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Broken dependency check
        env:
          GITHUB_PAT: ${{ secrets.VALORIA_PAT }}
        run: python3 tools/broken_dependency_checker.py
      - name: Patch propagation check
        env:
          GITHUB_PAT: ${{ secrets.VALORIA_PAT }}
        run: python3 tools/patch_propagation_checker.py
      - name: Freshness gate check
        env:
          GITHUB_PAT: ${{ secrets.VALORIA_PAT }}
        run: python3 tools/freshness_gate.py
      - name: Upload failure report on error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-failure-${{ github.sha }}
          path: |
            references/canonical_sources.yaml
            references/propagation_map.md
          retention-days: 30

  compliance-check:
    name: Compliance Check
    runs-on: ubuntu-latest
    needs: [register-sizes, hooks-verifier]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run compliance check
        run: python3 tools/compliance_check.py --check-only --repo-state .

  skills-lint:
    name: Skills Lint
    runs-on: ubuntu-latest
    needs: hooks-verifier
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify hooks imported in orchestrator
        run: |
          grep -q "import valoria_hooks" skills/valoria-orchestrator/SKILL.md \
            || { echo "FAIL: orchestrator missing import valoria_hooks"; exit 1; }
          grep -q "assert_bootstrap()" skills/valoria-orchestrator/SKILL.md \
            || { echo "FAIL: orchestrator missing assert_bootstrap()"; exit 1; }
          grep -q "h.safe_commit" skills/valoria-orchestrator/SKILL.md \
            || { echo "FAIL: orchestrator missing h.safe_commit"; exit 1; }
          echo "Orchestrator hook wiring: OK"
      - name: Verify non-orchestrator skills stripped of redundant blocks
        run: |
          fail=0
          for f in skills/*/SKILL.md; do
            skill=$(basename $(dirname "$f"))
            [ "$skill" = "valoria-orchestrator" ] && continue
            grep -q "Pre-commit (run before every" "$f" \
              && { echo "FAIL: $skill has redundant pre-commit block"; fail=1; }
            grep -q "Memory contamination warning:" "$f" \
              && { echo "FAIL: $skill has redundant memory warning"; fail=1; }
            grep -q "## FETCH LOG" "$f" \
              && { echo "FAIL: $skill has redundant fetch log block"; fail=1; }
          done
          [ $fail -eq 0 ] && echo "Skills redundancy lint: OK"
          exit $fail
      - name: Verify all required hook functions present
        run: |
          hooks="skills/valoria-orchestrator/scripts/valoria_hooks.py"
          fail=0
          for fn in assert_bootstrap task_gate task_gate_with_system editorial_gate \
                    pre_commit_gate pre_commit_gate_mutating commit_message_gate propose_mechanic_gate \
                    context_gate memory_contamination_guard safe_commit; do
            grep -q "def $fn" "$hooks" \
              || { echo "FAIL: $hooks missing: def $fn"; fail=1; }
          done
          [ $fail -eq 0 ] && echo "Hook functions: OK"
          exit $fail

name: Valoria Integrity Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on rapid pushes — saves CI minutes
concurrency:
  group: valoria-${{ github.ref }}
  cancel-in-progress: true

# Enforcement model: this CI is the ONE authoritative tier (on branch-protected main).
# Every gate is its own job that depends only on syntax-check, so a hiccup in one gate
# can never silently skip another. The local tier (.githooks/pre-commit +
# .claude/settings.json) calls the SAME tools/ci_*.py validators for fast feedback.

jobs:

  # ── FOUNDATION ──────────────────────────────────────────────────────────────
  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile all validators and tools
        run: |
          python -m py_compile \
            tools/ci_common.py \
            tools/ci_register_size_check.py \
            tools/ci_co_file_checker.py \
            tools/ci_editorial_checker.py \
            tools/ci_hooks_verifier.py \
            tools/ci_naming_check.py \
            tools/names.py \
            tools/ci_names_check.py \
            tools/ci_names_consistency.py \
            tools/valoria_rename.py \
            tools/ci_vetting_check.py \
            tools/ci_supersession_check.py \
            tools/ci_sim_fabrication_check.py \
            tools/validate_ed_citations.py \
            tools/valoria_local.py \
            tools/hook_naming_guard.py \
            tools/session_status.py \
            tools/session_handoff_reminder.py \
            tools/broken_dependency_checker.py \
            tools/patch_propagation_checker.py \
            tools/freshness_gate.py \
            tools/compliance_check.py \
            tools/atomizer.py \
            tools/doc_index_gen.py \
            tools/index_gen.py
          echo "All tools: syntax OK"

  # ── REGISTER + ARCHITECTURE GATES ───────────────────────────────────────────
  register-sizes:
    name: Register Size Check
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 tools/ci_register_size_check.py

  hooks-verifier:
    name: Enforcement Architecture Intact
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 tools/ci_hooks_verifier.py

  # ── CHANGESET-AWARE GATES (need full history for accurate diffs) ─────────────
  co-file-check:
    name: Co-File Requirements
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check co-file rules satisfied
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 tools/ci_co_file_checker.py

  editorial-check:
    name: Editorial Path Markers
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check editorial paths have markers
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 tools/ci_editorial_checker.py

  naming-check:
    name: Naming Invariant (Solmund)
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: No new use of a deprecated name (read from references/names_index.yaml)
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 tools/ci_naming_check.py

  names-consistency:
    name: Names Index ↔ Registry Mirrors
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Mirror name fields agree with names_index.yaml
        run: python3 tools/ci_names_consistency.py

  names-drift:
    name: Names Drift Lint (report-only)
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    # Report-only: surfaces newly-added deprecated mechanic/clock names against the
    # warn-tier entries of references/names_index.yaml without blocking, while the
    # existing tree's residuals are triaged. Flip an entry warn -> block in the index
    # (moving it under naming-check) once its residuals are cleared. See HANDOFF.md.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: No new use of a warn-tier deprecated name
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 tools/ci_names_check.py

  sim-fabrication-check:
    name: Sim Anti-Fabrication
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: No uncited mechanical constants in sim code
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 tools/ci_sim_fabrication_check.py

  supersession-check:
    name: Supersession Churn Guard (warn)
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Warn on un-rechecked supersession propagation (never fails)
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 tools/ci_supersession_check.py

  # ── WHOLE-TREE GATES ────────────────────────────────────────────────────────
  vetting-check:
    name: PP-674 Vetting Framework
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 tools/ci_vetting_check.py

  ed-citations:
    name: ED Citation Integrity
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 10
    # Blocking as of 2026-06-29: the full ED-citation backlog was reconciled to 0
    # genuine violations (292 -> 0). 91 ledger-lag / open EDs registered, the
    # ED-814->ED-907 phantom repointed, and open/provisional over-claims reworded;
    # validator precedence + table-row-bleed false positives fixed.
    # See designs/audit/2026-06-28-ed-citation-triage/02_reconciliation.md.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - run: python3 tools/validate_ed_citations.py

  unit-tests:
    name: Validator Unit Tests
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: pip install pyyaml pytest
      - run: python -m pytest tests/valoria -q

  sim-regression:
    name: Sim Reference Regression
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: pip install pyyaml pytest
      # Deterministic seeded oracle for the sim/ reference the Godot port validates
      # against (ED-1053). Before this, sim/ had zero tests and never ran in CI, so a
      # degenerate-balance regression could land unflagged. ~20s.
      - run: python -m pytest sim/tests -q

  integrity:
    name: Repository Integrity
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Broken dependency check
        env:
          GITHUB_PAT: ${{ secrets.VALORIA_PAT }}
        run: python3 tools/broken_dependency_checker.py
      - name: Patch propagation check
        env:
          GITHUB_PAT: ${{ secrets.VALORIA_PAT }}
        run: python3 tools/patch_propagation_checker.py
      # Report-only: freshness flags pre-existing stale canonical docs (the
      # canonical_sha SHA-split content work, roadmap K-2 / LB-6) — real debt, but
      # not the harness migration's scope. Was hidden until gate decoupling let this
      # job run. Drop continue-on-error once the stale docs are refreshed. See HANDOFF.md.
      - name: Freshness gate check (report-only)
        continue-on-error: true
        env:
          GITHUB_PAT: ${{ secrets.VALORIA_PAT }}
        run: python3 tools/freshness_gate.py
      - name: Upload failure report on error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-failure-${{ github.sha }}
          path: |
            references/canonical_sources.yaml
            references/propagation_map.md
          retention-days: 30

  compliance-check:
    name: Compliance Check
    runs-on: ubuntu-latest
    needs: syntax-check
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run compliance check
        run: python3 tools/compliance_check.py --check-only --repo-state .

  # ── AGGREGATOR: the single required check for branch protection ──────────────
  # Proves every authoritative gate actually RAN and PASSED (not skipped). Make
  # this job the required status check on main.
  ci-summary:
    name: All Gates Green
    runs-on: ubuntu-latest
    if: always()
    needs:
      - syntax-check
      - register-sizes
      - hooks-verifier
      - co-file-check
      - editorial-check
      - naming-check
      - names-consistency
      - sim-fabrication-check
      - vetting-check
      - unit-tests
      - sim-regression
      - integrity
      - compliance-check
      - ed-citations
    steps:
      - name: Assert all gates ran and succeeded
        run: |
          echo '${{ toJSON(needs) }}' > needs.json
          python3 -c "import json,sys; d=json.load(open('needs.json')); [print(f\"{k}: {v['result']}\") for k,v in d.items()]; bad={k:v['result'] for k,v in d.items() if v['result']!='success'}; print('FAILED (not success):', bad) if bad else print('All gates green.'); sys.exit(1 if bad else 0)"

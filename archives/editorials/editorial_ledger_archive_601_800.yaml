    description: "Volley Phase dice pool undefined. mass_battle_v3.md §A.7 says 'Roll Effective Power vs TN 6.' Effective Power is not defined for Volley context. Two candidates: (a) Power stat (unit quality, 1-7); (b) engagement pool formula = min(Size,Command)+Command per PP-233. These produce different values. ED-037 confirms TN 6 but does not address pool definition."
    priority: P1
    tags: [mass_combat, volley, pool_formula]
    blocks: volley_simulation

  - id: ED-438
    status: resolved
    date_raised: 2026-04-09
    description: "Command distribution across sub-units: explicit rule text needed. Formula gives Pool = min(Size,Command)+Command per sub-unit but does not state whether Command applies in full to each sub-unit or is divided. §A.8 note implies full Command per sub-unit (splitting is disadvantageous vs undivided defender), but this is implicit. If Command divides, splitting is always inferior. If full, 3-way split triples total dice — design intent is full Command per sub-unit per §A.8, but needs explicit rule text."
    priority: P1
    tags: [mass_combat, command, sub_units, pool_formula]
    blocks: sub_unit_strategy_simulation
    date_resolved: 2026-04-12
    resolution: "Explicit rule text at mass_battle_v3 L197 (PP-504): full Command per sub-unit, not divided. Close confirmed."


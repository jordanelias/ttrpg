  - id: ED-024
    status: resolved
    date_resolved: 2026-04-06
    description: "Southernmost Mode 3 entity stat blocks"
    decision: "Mode 3 entities in the Southernmost are threadcut beings (§5.3, P-05, P-06). They cannot be fully rendered — not a rendering failure, but an excess of existence that exceeds the rendering capacity to integrate. Their continued presence produces structural entanglement in the surrounding environment and those nearby, as a consequence of proximity to something that radically exceeds rendering capacity (cf. Solmund's miracles producing Locked zones as side-effect, not intent). Non-Thread engagement is ontologically irrelevant. TS 50+ required to engage meaningfully. GM approximates entity behaviour by reference to standard Thread operation tables understood as operating beyond human limits — scale, co-movement magnitude, and intentionality all exceed what human threadwork produces. No stat block. No generic entity table. Provisional archetypes (Knot-Anchor, Coherence-Drain, Tessellate-Bleed) struck — implied creature-type stat blocks, violating P-05."
    tags: [southernmost, combat, mode3]


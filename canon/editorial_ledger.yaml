- id: ED-913
  date: '2026-05-15'
  description: 'Battle-outcome event emission not implemented in sim_mb_06_v25. run_multi_unit_battle does not emit BattleOutcome
    to strategic layer. Without this, all C strategic mechanics (Part E + peninsular §3 + §A.14) are unreachable from S. MASTER
    UNLOCK — implementing F8.4 unblocks F6.6 (Gap registration) + F7.1 (faction Military ceiling) + F7.3 (Reinforcement) +
    F7.5 (Campaign Supply) + F7.6 (Levy offensive restriction) + F7.7 (Knights Templar Sacred Assembly) + F7.8 (Wealth-Zero)
    + F7.9 (battle-cascade). 8 findings unlocked. Resolution path: BattleOutcome dataclass with winner/casualties/units_destroyed/final_disc/final_morale/battle_type/territory/territory_conquered_by/thread_gaps_created/is_inter_faction.
    run_multi_unit_battle returns BattleOutcome; strategic layer consumes via on_battle_resolved. F8.4 + T-82 in audit.'
  severity: P1
  type: missing
  archetype: A2
  affected_docs:

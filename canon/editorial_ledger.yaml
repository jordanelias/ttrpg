- id: ED-915
  date: '2026-05-15'
  description: 'Audit meta-recommendation: bottom-up sanctity (M-9) refactor of §A.6 formation RPS + §A.8 tactic counter table.
    Currently §A.6 (''Shield Wall negates Wedge'') and §A.8 (''Refused Flank counters Envelopment'') if implemented as table-lookups
    are top-down recognition rules. M-9-compliant alternative: Shield Wall''s +2D Def is high enough that Wedge''s +2D Off
    no longer overcomes it via pool arithmetic; negation emerges, not looked up. Hammer & Anvil success emerges from Anvil
    stamina-hold (combat_mode=Shield Wall) + Hammer Fast envelop into rear cells via pure cell mechanics; not a named-tactic
    bonus. Consistent with F5.4b sightline-terrain refactor (forest-flanking emerges from sightline reduction, not ''no flanking
    in forest'' rule). Resolution path: when implementing F2.3 + F2.6, write modifiers as composable arithmetic on existing
    pool primitives. No special-case lookup tables. F9.5 + T-92 in audit.'
  severity: P1
  type: incongruency
  archetype: A2
  affected_docs:
  - designs/provincial/mass_battle_v30.md
  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F9.5

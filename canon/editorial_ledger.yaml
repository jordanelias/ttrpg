  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F6.7
- id: ED-909
  date: '2026-05-15'
  description: 'PP-712 Discipline persistence between battles not modeled in sim_mb_06_v25. C §A.13 + PP-712: Discipline persists
    across battles; degradation does NOT auto-recover; recovery requires Muster action; Wealth-Zero stacks. Discipline is
    a depletable resource. Master operational-tempo variable (T-76 in audit). Without it, players can redeploy worn-Discipline
    units freely; strategic depth lost. Lateral closest: FM player condition/form/sharpness across matches — Valoria''s discrete
    Disc (1-7) more legible than continuous form. Resolution path: unit.discipline_persisted = unit.discipline_current at
    battle resolution (not reset); Morale resets per PP-711; between-battle recovery requires Muster. Blocks on F8.4 strategic-tactical
    bridge. F7.4 + T-76 in audit.'
  severity: P1
  type: missing
  archetype: A2
  affected_docs:

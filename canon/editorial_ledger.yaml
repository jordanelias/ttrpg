  - designs/provincial/military_layer_v30.md
  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F7.4
- id: ED-910
  date: '2026-05-15'
  description: 'BG-mode mass battle (mass_battle_v30 Part B §B.1-§B.5) entirely absent from sim_mb_06_v25. §B.2 unit-equivalence
    table + §B.3 tactic-card resolution + §B.4 card deck not modeled. One of two full canonical modes unimplemented. Resolution
    path: separate bg_mass_battle.py module. resolve_bg_battle(side_a, side_b, tactic_a, tactic_b, ground) -> outcome via
    tactic-card disposition -> pool sum(Martial)+floor(Mil/2) -> TN 7 -> margin -> outcome. Lateral: TW auto-resolve uses
    similar quick-resolve formula. F8.1 in audit.'

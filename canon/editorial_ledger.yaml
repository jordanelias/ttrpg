- id: ED-828
  date: 2026-05-15
  description: 'PP-717 D2 (Pool DR — combat-only diminishing returns above Agi 4) was sim-validated in v22-v27 weapon system audits and marked "ratified" in tests/audit/all_directions_ners_v27.md, but was NEVER propagated to params/combat. params/combat L14 has always carried the clean universal grammar `(Agi × 2) + H + 3`. The 2026-05-15 engine NERS audit incorrectly cited params/combat L14 as the source of the DR formula (F3/L-1) — citation was wrong; DR existed only in audit/sim layer documents. Jordan Decision-A 2026-05-15: PP-717 D2 explicitly REJECTED at canon layer. Combat pool retains universal grammar. Agi 6 pool-dominance gap (v27 sim showed 55% advantage at pool 17 vs 11) is queued for Phase 4 simulation re-check to confirm whether the problem PP-717 D2 was designed to address still manifests at current canonical values.'
  severity: P2
  type: incongruency
  archetype: A2
  affected_docs:
  - tests/audit/all_directions_ners_v27.md
  - tests/audit/pp717_ners_all_directions.md
  - tests/audit/engine_ners_2026-05-15.md
  status: resolved
  jordan_decision: '2026-05-15 — reject PP-717 D2 at canon; queue Phase 4 sim.'
  resolution_commit: pending-this-sweep
- id: ED-829
  date: 2026-05-15
  description: 'Decision-B 2026-05-15: Social contest Rattled mechanic converted from +1 Ob per level to −1D per level (Argue pool). Honors PP-716 channel reservation (actor-state degradation → Pool, not Ob). Math at typical pools 8-12D is roughly equivalent; the change is for engine-architectural consistency, not balance. Fixed in params/contest L111-112 in same sweep. Sim re-validation recommended but not blocking.'
  severity: P3
  type: incongruency
  archetype: A2
  affected_docs:
  - params/contest.md
  status: resolved
  jordan_decision: '2026-05-15 — convert to −1D for channel consistency.'
  resolution_commit: pending-this-sweep
- id: ED-830
  date: 2026-05-15
  description: 'Decision-C 2026-05-15: Engine-value taxonomy standardized across canon docs to 4-bucket model (Derived Values / Tracks / Clocks / Pools). derived_stats §14 restructured as canonical home of taxonomy. Closes F4 (Vitality naming retired), F5 (Intel added; Mandate→Legitimacy naming aligned with PP-686 v2), F7 (Coherence reclassified from Derived Value to Track), D-3 (Inspiration cap added to Derived Values bucket). params/core §Derived Scores should be updated to reference §14 in a future cleanup commit (deferred — not P1).'
  severity: P2

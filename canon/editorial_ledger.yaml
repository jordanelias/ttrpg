- id: ED-907
  date: '2026-05-15'
  description: 'Threadweave-OR-tactic hard tradeoff (PP-501, §A.10) not modeled in S. Master gameplay-decision primitive:
    general must choose every turn to declare a tactical action (Envelopment/Hammer-and-Anvil/Refused Flank/etc.) OR Threadweave.
    Not both. Single most consequential mechanical rule in §A.10. Lateral closest: HoMM hero-cast-one-spell-per-turn scaled
    up to lead-army-or-weave. Resolution path: general_action_this_turn: Literal[''tactic'',''thread'',None] flag on Unit;
    second declaration raises validation error. F6.2 + T-71 in audit. Blocks on F6.1.'
  severity: P1
  type: missing
  archetype: A2
  affected_docs:

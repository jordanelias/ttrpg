    decision: "No carry-over rule in combat_design_v1. Damage applies to current Health track only. When Health reaches 0, a wound is taken and Health resets to max. Excess damage beyond the 0-threshold does not carry into the reset track. This makes wounds discrete thresholds, not continuous."

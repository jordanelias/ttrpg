    description: "Domain Echo as scene-availability declaration (all modes). Instead of Domain Echo = event that fires, Domain Echo = scene is available for player engagement. Uninvestigated echoes escalate on a seasonal clock; at threshold, the situation resolves autonomously without player input (world moves, not player loss). Scenes yield two output categories: Primary (the situation — degree outcome affects trajectory of the character/event) and Secondary (leads, relationship shifts, unlocked echoes, Thread-sensitive information — present at all degrees, content varies by degree). Characters (e.g. Vaynard, Klapp) are world-state contributors with internal clocks, not objectives. Engaging a character node yields secondary information beyond their immediate plotline. Applicable across all modes: TTRPG, Hybrid, Videogame, and Board Game (BG layer already has equivalent in TC passive advance, Stability decay, autonomous Domain Action resolution)."

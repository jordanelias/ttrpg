    decision: "params_combat defines: stabilised characters return after 1-scene rest; wounds clear at session end. No Quick Rest/Full Rest distinction exists in current design (stage1 §3.9 is outdated). Single recovery model: Take a Breath restores Stamina; scene rest restores consciousness; session end clears wounds."

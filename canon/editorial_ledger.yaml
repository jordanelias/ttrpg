entries:
- id: ED-900
  date: '2026-05-15'
  description: 'Reserve formation canonized in mass_battle_v30 §A.6 + PP-MB-04 + PP-499 but absent from sim_mb_06_v25. C explicit:
    Reserve commitment at Phase 3 of Turn N+1 makes unit immediately available for Phase 5 Engagement same turn. Pharsalus
    G-2 hidden-4th-line ambush structurally non-reproducible. Resolution path: add committed:bool=False + commitment_pending:bool=False
    on Unit; reserve units do not advance/engage/drain stamina. Compounds with F2.1 axis split (spatial_pattern x combat_mode
    separation). F1.1 + F2.4 in 2026-05-15 mass-battle comparative audit.'
  severity: P1
  type: missing
  archetype: A2
  affected_docs:
  - designs/provincial/mass_battle_v30.md
  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F1.1 / F2.4
- id: ED-901
  date: '2026-05-15'
  description: 'Shield Wall combat mode canonized in §A.6 + PP-500 (Off -1D, Def +2D, cannot advance, negates one flank/turn,
    +2D propagates to all simultaneous engagements) but absent from sim_mb_06_v25. Hastings G-6 structurally non-reproducible.
    C->S correctness drift on ratified canon mechanic. Resolution path: combat_mode=''Shield Wall'' flag with off_pool -=1,
    def_pool +=2, can_advance=False, flank_negation_remaining=1/turn; PP-500 propagates via existing pair-iteration. Blocks
    on F2.1 axis split. F2.3 in audit.'
  severity: P1
  type: missing
  archetype: A2
  affected_docs:
  - designs/provincial/mass_battle_v30.md
  - params/mass_combat.md
  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F2.3
- id: ED-902
  date: '2026-05-15'
  description: 'Mass-battle damage formula drift between C and S. C PP-233 line 70: linear damage = successes * (1 + Power).
    S compute_degree + DAMAGE_BY_DEGREE (line 1259): degree-stepped 0/1/Power/(1+Power). For 10 net successes vs 1, C deals
    10x more damage than S. 10x drift in dominant-side damage output. No mass-scale acclaimed precedent (TW/FoG2/UG/CM/Bannerlord)
    uses degree-stepped damage. Resolution options: (a) S aligns to C linear; (b) C aligns to S degree-stepped (revises PP-233
    worked example); (c) distinct mass-vs-personal abstractions ratified with bridge document explaining cadence-and-cell-decomposition
    relationship. Recommended: (c). F3.1 + T-55 in audit.'
  severity: P1
  type: incongruency
  archetype: A2
  affected_docs:
  - designs/provincial/mass_battle_v30.md
  - params/mass_combat.md
  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F3.1
- id: ED-903
  date: '2026-05-15'
  description: 'Class-dependent damage modifier (PP-194 / PARAMS-GAP-05 Dmg Mod table: Levy LightCut +1, Light Infantry LightCut
    +2, Heavy Infantry HeavyCut +4, Cavalry HeavyCut +5, Knights Templar HeavyBlunt +5, etc.) not implemented in S. S uses
    raw Power as damage source for all units. Also surfaces internal canon drift: PP-233 line 70 specifies linear damage =
    successes * (1 + Power); PARAMS-GAP-05 line 284 specifies Size loss = max(0, net + Dmg Mod - DR). Two damage formulas
    in canon with unclear relationship. Resolution path: depends on F3.1 (damage formula) + F2.2 (class taxonomy). When class
    is a primitive, dmg_mod becomes a class attribute. F3.6 in audit.'
  severity: P1
  type: incongruency
  archetype: A2
  affected_docs:
  - designs/provincial/mass_battle_v30.md
  - params/mass_combat.md
  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F3.6
- id: ED-904
  date: '2026-05-15'
  description: 'Mass-battle pursuit damage formula drift. C §A.12: routing unit loses Size = pursuer net Offence successes
    per turn (no Defence allocation). S pursuit_damage line 2098: dmg HP = net * (1 + Power) - DR (HP not Size). At BLOCK_SIZE=100:
    S deals 0.03-0.10 Size/turn vs C 2-4 Size/turn. 25-30x drift in pursuit lethality. v16 manifest measured 1.4x winner/loser
    casualty ratio vs R O-10 historical 2-5x. F4.1 + F4.2 + F1.3 together produce historical ratio when implemented. Lateral:
    TW + Bannerlord pursuit catastrophic 60-90% routed army deaths. Resolution path: replace pursuit_damage line 2098 to apply
    damage directly to Size (dmg_size = max(0, a_net - dr_size_units)). F4.1 + T-62 in audit.'
  severity: P1
  type: incongruency
  archetype: A2
  affected_docs:
  - designs/provincial/mass_battle_v30.md
  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F4.1
- id: ED-905
  date: '2026-05-15'
  description: 'Environment / terrain layer entirely absent from sim_mb_06_v25. C §A.9 specifies 6 terrain types (River, Uphill,
    Forest, Walls, Narrow Pass, Open) with explicit pool/speed/flanking modifiers. PP-780 (§A.9 line 476) specifies geographic
    battle-terrain derivation from territory_polygons via march_layer §8.2. None implemented in S. All terrain-relevant R
    reconstructions non-reproducible: Hastings (slope), Crecy (slope+mud), Agincourt (funnel+mud+stakes), Marignano (vineyards+ditches),
    Pavia (walls+cover), Panipat (wagon-fortress), Adrianople (ridge), Pharsalus (stream-bed anchor). Single largest unimplemented
    canon mechanic in S. Resolution path: ground_type primitive per cell; pool/speed/sightline modifiers per-cell from ground_attributes.
    Lateral universal in TW/FoG2/UG/CM/Bannerlord/FM. F5.1 + T-63 in audit. Unlocks F5.2 / F5.4 / F5.4b / F5.6 / F5.7 / F6.9.'
  severity: P1
  type: missing
  archetype: A2
  affected_docs:
  - designs/provincial/mass_battle_v30.md
  - tests/sim/sim_mb_06_v25.py
  status: open
  jordan_decision: pending
  source: designs/audit/2026-05-15-mb-comparative-audit/audit.md F5.1
- id: ED-906
  date: '2026-05-15'
  description: 'Threadwork integration with mass battle entirely absent from sim_mb_06_v25 (threadwork_check empty hook line
    412). C §A.10 (Thread Operations in Mass Battle) + §A.11 (Southernmost) + threadwork_v30 §2.4 (five op types) + §2.6 (contested
    intentionality) + §3.2 (Coherence reduction) unimplemented. Largest unimplemented canon system in S after F5.1 terrain.
    Threadwork is Valoria''s firearm-analog (R T-19/T-20/T-21 reframed) — canon design passes structural validation but mechanically
    absent. Resolution path: 5-stage implementation: practitioner primitives → phase-integration → scale-mapping → contested
    resolution → persistence. F6.1 + T-69 in audit. Unlocks F6.2 / F6.3 / F6.4 / F6.5 / F6.6 / F6.7 / F6.8 / F6.9 / F6.10.'
  severity: P1

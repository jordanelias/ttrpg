    source: fidelity-audit
    description: "Stage1 vs design doc conflicts (Combat Pool Agi formula, STR in damage, damage formula, simultaneous resolution, initiative Attunement vs Agility roll, Stamina formula, Leap pool Cognition vs Spirit+Attunement). All resolved: stage docs are outdated, design docs govern."
    status: resolved
    priority: P1
    decision: "All compilation stage documents superseded as of 2026-04-04. Design docs and params files are canonical. Stage1 conflicts are not conflicts — stage1 is simply stale."
    tags: [audit, canonical_sources, core_engine, combat]

  - id: ED-200
    status: resolved
    date_resolved: 2026-04-04
    description: "Single-hit wound cap — resolved by design doc silence"
    decision: "No wound cap per hit exists in combat_design_v1 or params_combat. Stage1 §3.8 is outdated. Damage converts to wounds per the Health track formula (every Endurance+6 Health = 1 wound). No artificial ceiling. High-damage hits can inflict multiple wounds — this is the intended lethality model."
    tags: [combat, wounds, params_combat]
  - id: ED-201
    status: resolved
    date_resolved: 2026-04-04
    description: "Excess damage carry-over — resolved by design doc silence"
    decision: "No carry-over rule in combat_design_v1. Damage applies to current Health track only. When Health reaches 0, a wound is taken and Health resets to max. Excess damage beyond the 0-threshold does not carry into the reset track. This makes wounds discrete thresholds, not continuous."
    tags: [combat, wounds, health, params_combat]
  - id: ED-202
    status: resolved
    date_resolved: 2026-04-04
    description: "Rest and wound recovery — resolved from params_combat"
    decision: "params_combat defines: stabilised characters return after 1-scene rest; wounds clear at session end. No Quick Rest/Full Rest distinction exists in current design (stage1 §3.9 is outdated). Single recovery model: Take a Breath restores Stamina; scene rest restores consciousness; session end clears wounds."
    tags: [combat, recovery, rest, params_combat]
  - id: ED-203
    status: resolved
    date_resolved: 2026-04-04
    description: "Combat Pool minimum 5 — no penalty clause"
    decision: "Clean floor at 5. No -1D penalty. combat_design_v1 and params_combat both specify minimum 5 with no additional penalty. Stage1 penalty clause does not exist in canonical design."
    tags: [combat, pool_minimum, params_combat]

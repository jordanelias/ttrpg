- id: ED-822
  date: 2026-05-11
  description: 'Volley/Engagement composition balance. SIM-MB-05A composition sweep showed ranged-heavy compositions winning
    disproportionately (pure-melee vs ranged-heavy 4 to 1 disadvantage). SIM-MB-05C tested TN6 vs TN7 Volley calibration:
    TN7 improves pure-melee-vs-balanced from 28 percent to 36 percent (8 percentage point gain) but pure-melee-vs-ranged-heavy
    remains roughly unchanged (15-16 percent). TN7 is partial improvement but does not fully resolve. Recommendation: adopt
    TN7 as clean primary fix; raise composition-balance secondary measure as ED-825 for Phase 3+ work. Secondary measure options:
    a) melee_pct as engagement Ob bonus for heavier-melee side; b) Volley pool cap = floor(volley_pool / 2); c) ranged_DR
    scaled by defender melee_pct (heavier front rank shields back rank). Source: SIM-MB-05C section 3.2.'
  severity: P2
  type: incongruency
  archetype: A2
  affected_docs:
  - params/mass_combat.md
  - designs/provincial/mass_battle_v30.md
  status: open
  jordan_decision: pending
- id: ED-823
  date: 2026-05-11
  description: 'Combined attack effectiveness calibration. SIM-MB-05C 3v1 combined-attack test surfaced concern: Fibonacci-divided
    pool concentrated at one column may be LESS effective than 3 separate column engagements. Lead Power 4 Size 3 Arrowhead
    with 2 supporters concentrating at center: combined pool ~7 dice vs defender 1 column ~3 dice. Compared to distributed:
    3 attackers engaging 3 columns each at ~3 dice vs defender split ~3 dice each. Distributed produces 3 simultaneous Successful
    engagements; combined produces 1 Successful engagement against full defender HP pool. ED-805 Fibonacci denominators (1,2,3,5,8)
    may be too aggressive. Resolution options: a) reduce denominators (1, 1.5, 2, 3, 5); b) combined attack damages all defender
    columns proportionally; c) combined attack with single column requires defender to have a single-column shape (e.g., Arrowhead)
    to be tactically meaningful. Test harness for 3v1 combined was incomplete in SIM-MB-05C; needs SIM-MB-06 rebuild. Severity
    P2, defer until after Phase 6 propagation.'
  severity: P2
  type: incongruency
  archetype: A2
  affected_docs:
  - designs/provincial/mass_battle_v30.md
  - params/mass_combat.md
  status: open
  jordan_decision: pending
- id: ED-826
  date: 2026-05-15
  description: 'F1 (engine NERS audit 2026-05-15): params/core L121 carried stale Vitality formula (Endurance × 10, ED-694) that PP-716 had superseded. Engine code reading params/core computed wrong damage capacity for End 1, 2, 3, 5, 7. Fixed in same sweep: row replaced with current Health formula `(End+6) × (MW+1)`, MW cap 3, referencing derived_stats §4.1 as authoritative.'
  severity: P1
  type: stale
  archetype: A1
  affected_docs:
  - params/core.md
  status: resolved
  jordan_decision: '2026-05-15 — proceed with PP-716/PP-717 propagation sweep.'
  resolution_commit: pending-this-sweep
- id: ED-827
  date: 2026-05-15
  description: 'F2 (engine NERS audit 2026-05-15): params/contest L107 + L254 carried stale Concentration = Focus + Recall formula. Per derived_stats §5.2 (PP-716), canonical is Concentration = Focus × 3 (Recall removed — no conceptual connection to sustained mental focus). Fixed in same sweep.'
  severity: P1

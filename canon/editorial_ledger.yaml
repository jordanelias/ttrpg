    decision: "No wound cap per hit exists in combat_design_v1 or params_combat. Stage1 §3.8 is outdated. Damage converts to wounds per the Health track formula (every Endurance+6 Health = 1 wound). No artificial ceiling. High-damage hits can inflict multiple wounds — this is the intended lethality model."

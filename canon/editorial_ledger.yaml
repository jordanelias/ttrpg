  resolution_commit: pending-this-sweep
- id: ED-831
  date: 2026-05-15
  description: 'F12 (DISCOVERED during ED-826/827 execution sweep, not in original engine NERS audit): params/combat L138 carries `Max Wounds = floor(Endurance/2) + 1` WITHOUT the PP-717 D1 cap at 3. The MW cap is canonical in derived_stats §4.1 L57 but was never propagated to params/combat. At End 6: params says MW=4 (Health = 50 × 5 = 250 HP, wildly wrong); canon says MW=3 (Health = 48). Engine code reading params/combat L138 computes 25%-higher HP at End 6, and progressively worse at End 8+. P1-equivalent propagation defect. NOT FIXED in this sweep — flagged for follow-up. Jordan to confirm whether to add to next sweep.'
  severity: P1
  type: stale
  archetype: A1
  affected_docs:
  - params/combat.md
  status: open
  jordan_decision: pending

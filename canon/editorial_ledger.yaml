- id: ED-908
  date: '2026-05-15'
  description: 'Contested thread resolution (threadwork_v30 §2.6) not modeled in S. Without this, enemy practitioners cannot
    defend against incoming ops; defensive parity (R T-21 firearm-analog) impossible. C: when both engagement-pair Units have
    embedded practitioners, contested resolution fires with engagement modifier Ob += floor(opp TPS/2) min +1, resolved via
    6-row outcome table. Lateral distinct from TW:Warhammer instant Dispel Scroll — Valoria''s contest is full two-pool engagement
    at practitioner layer. Resolution path: two-pool contested roll + outcome table — same pattern as opposed §A.8 tactics
    (F2.6). F6.7 + T-74 in audit. Blocks on F6.1.'
  severity: P1
  type: missing
  archetype: A2
  affected_docs:

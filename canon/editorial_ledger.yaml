  - id: ED-721
    date: 2026-04-20
    description: "CI cap vs Piety Yield at T9 — formula ambiguity in 'PT tier × SW/5'. Spec example (ci_political_v30 §1, lines 62–64) treated PT as a non-linear tier factor (T9 PT 5 → 1.0; T8 PT 3 → 0.25), yielding ~1 CI/season at game start — Assert remains relevant. B3/B4 simulators (engine_v3 line 232, arc_test_batch4 line 109) interpreted PT_tier as the literal PT value, computing 5×5/5 = 5/season — saturating the +5 cap from S1 and rendering Assert mechanically irrelevant. Audit (tests/sim_framework/session_audit_2026-04-19.md gap #6) flagged for Jordan design decision."
    status: resolved
    severity: P1
    source: tests/sim_framework/session_audit_2026-04-19.md
    resolution: "Editorial decision (Jordan permission, 2026-04-20): formalize PT_tier as non-linear lookup, matching the spec's worked examples. Canonical table now in ci_political_v30 §1: PT 5 → 1.0; PT 4 → 0.5; PT 3 → 0.25; PT 2 → 0.10; PT 1 → 0; PT 0 → 0. Game-start Piety Yield = 1 CI/season from T9; cap not saturated. Assert preserved as relevant Domain Action. Propagated to params/bg/ci_seizure.md, params/bg/geography.md, and engine_v3.py (PT_TIER dict). B3/B4 simulator outputs based on the literal-PT formula are now invalidated — flagged for re-run in next simulation session. arc_test_batch3.py + arc_test_batch4.py code unchanged (test scripts) — re-run will use corrected engine_v3."

  - id: ED-722
    date: 2026-04-20
    description: "Spiritual Weight redundancy — settlement_layer_v30 §1.5 Religious Building Axis (Chapel/Church/Cathedral) duplicated SW's role as 'where Church matters structurally.' SW was a static parallel mechanic to dynamic settlement-level Church infrastructure introduced by PP-666. Identified by Jordan during ED-721 review."
    status: resolved
    severity: P2
    source: jordan_review_during_ED-721
    resolution: "Editorial decision (Jordan permission, 2026-04-20, option B from in-session proposal): SW unifies into a runtime aggregate of settlement-level Church religious infrastructure. SW(t) = min(5, Σ over settlements s in t of building_tier(s.religious_building)) where None=0, Chapel=1, Church=2, Cathedral=3. Cap 5, floor 0. Geography SW table now seeds the starting state — at game start, each territory is populated with religious buildings whose tier sum equals the listed SW value. Runtime updates: +1 to +3 on Ecclesiastical Appointment / building upgrade; −1 to −3 on siege / Mass Battle sack / desacralization. All three SW use cases (Piety Yield, Church political pool, PT momentum) now operate on dynamic SW — losing Himmelenger Cathedral collapses T9 Piety Yield from 1.0 to 0.4 (floored to 0). Propagated to ci_political_v30 §1, params/bg/geography.md, settlement_layer_v30 §1.5+§1.6a (per-settlement seed table). engine_v3.py: added sack_religious_building / build_religious_building helpers; B5 stress-tested (arc_test_b5_2026-04-20.md). B5 confirmed predicted penalties: −1.15 CI/season per Cathedral lost; non-Prominent territories accumulate 'stored value' that activates on future Prominence; recovery via E.A. is fully reversible."

  - id: ED-723
    date: 2026-04-20
    description: "AER (Altonian Ecclesiastical Relationship) generation mechanic flagged as unspecified in tests/sim_framework/session_audit_2026-04-19.md gap #9. Investigation revealed mechanic was already specified in params/bg/tracks.md PP-181/PP-565 + params/bg/institutions.md (Cardinal of Temperance row): Mandate vs Ob = ⌊AER/2⌋+1 maintains; Year-End decay −1 if not maintained. Gap was a sim implementation gap, not a design gap. The B3 simulator did not load tracks.md and therefore did not implement the mechanic."
    status: resolved
    severity: P2
    source: tests/sim_framework/session_audit_2026-04-19.md
    resolution: "Editorial confirmation (Jordan permission, 2026-04-20): AER mechanic per tracks.md is canonical. engine_v3 wiring added: GameState.aer_temperance_active_this_year flag; Church Priority 5 (Cardinal of Temperance Phase 1 declaration, requires Church controls T9, Mandate vs Ob = ⌊AER/2⌋+1, Success: AER +1 cap 5); Year-End decay −1 if no Temperance success that year; check_victory adds Altonian Conquest condition (IP ≥ 100 AND AER ≤ 1). B5-6 verified: 8-season run shows AER 2 → 4 with Temperance firing at S4 + S6. session_audit_2026-04-19.md gap #9 closed."

  - id: ED-724
    date: 2026-04-20
    description: "Engine v4 per-settlement architecture proposal — engine v3 models territory aggregates; ED-722 dynamic SW + settlement_layer_v30 Part 1 (per-settlement governance, religious building axis, Bishop-Governor, Wing slots, black markets, intelligence brokers, Thread exploitation sites) presuppose a per-settlement model. Engine v3 simulations of these mechanics are necessarily approximate."
    status: resolved
    severity: P2
    source: ED-722_followup
    resolution: "Editorial approval (Jordan permission, 2026-04-20): proposal documented in designs/architecture/engine_v4_per_settlement_proposal.md. Five-phase migration plan: v4.0 foundational (Settlement dataclass, Territory.sw as property), v4.1 per-settlement seizure, v4.2 per-settlement Capture sequence, v4.3 Bishop appointment, v4.4 settlement-derived phenomena (black markets / intel brokers / Thread sites). v4.0 is high-priority (unblocks B6 Cathedral construction stress test). v4.1–v4.4 can be deferred until specific stress tests require them. Engine v3 + ED-722 mutator helpers are sufficient for non-architectural sim work."

  - id: ED-725
    date: 2026-04-20
    description: "B5 stress test batch — exercises ED-722 dynamic SW, ED-723 AER mechanic, and confirms ED-721 PT_TIER table under destructive-event scenarios."
    status: resolved
    severity: P2
    source: ED-721/722/723_followup
    resolution: "B5-1 baseline 3.70 CI/season; B5-2 sack T9 Cathedral → −1.15/season penalty (matches ED-722 prediction); B5-3 compound Cathedral+Templar loss → −2.15/season; B5-4 desacralization of non-Prominent territory has zero immediate effect (stored value); B5-5 recovery via E.A. fully reversible; B5-6 AER mechanic verified working; B5-7 time-to-Unification baseline S15 vs sacked-S5 S16 (modest campaign-scale impact due to other CI sources buffering). Findings document: tests/sim_framework/arc_test_b5_2026-04-20.md. Open: B6 Cathedral-construction acceleration test (requires engine_v4.0); Mass Seizure declaration probability vs cleanly-completing campaigns audit (9/10 runs early-end via shared-loss)."

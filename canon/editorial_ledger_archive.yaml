    description: "Irreversible institutional precedent persistence across campaigns. Resolved 2026-04-24: closed as deferred-pending-design-intent. The question of cross-campaign precedent persistence is a campaign-architecture decision rather than a spec edit. Three coherent positions per game-design-precedent research: (1) Single-campaign architecture (Hogwarts Legacy model) — campaigns self-contained, precedents reset; (2) Persistent world (Bartle/MMO model — Avalon: The Legend Lives 1989+, EVE Online) — precedents persist across sessions; (3) NG+ legacy (State of Decay 2 4-legacy-endings model) — completed campaigns mark world; subsequent campaigns inherit some markers. Each position has different implementation cost and design surface. Resolution requires Jordan campaign-architecture decision; not a spec defect. Spec is unchanged unless and until a specific architecture is selected."
    status: resolved
    severity: P2


- id: PP-494
  date: 2026-04-09
  severity: P1
  description: >
    Retroactive register entry. Church Graduated Seizure: Pool = Influence + floor(TC/15),
    Ob = 7 − CV. Available at any TC value (not post-75 gate). Replaces TC 75 hard seizure
    gate. Church TCV victory threshold reduced to ≥ 8. OW CV+1 is a consequence, not

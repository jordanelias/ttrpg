    required to play Assert once TC freezes — the mandatory Assert was a TC-generation
    mechanism, and TC generation has ceased. In the seizure phase, Church's action
    economy is fully available for seizure and supporting actions. Assert remains
    available as an optional action post-TC 75 (it produces no TC change but can
    still serve as a Stability-risk action if Church chooses). Corrects SIM-GS-01
    finding L6.
  finding_id: [L6-SIM-GS-01, ED-369]
  source: SIM-GS-01 editorial resolution 2026-04-09
  affects: [references/params_board_game.md]
  status: applied



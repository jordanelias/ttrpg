- id: PP-609
  type: patch
  date: 2026-04-14
  severity: P2
  description: >
    Einhir Foundational sites — canonical design definition.

    The Einhir did not primarily operate AT the Foundational scale. They operated
    FROM Foundational-stabilized sites. The distinction is critical.

    FOUNDATIONAL STABILIZATION (what the Einhir actually did):
    The Einhir maintained and stabilized the four Foundational Thread conditions in
    specific locations, not as an end in itself, but as the platform from which
    large-scale Structural operations could be conducted reliably.

    The four Foundational conditions:
    (1) Temporal coherence: the condition under which things become sequentially and
        continuously. Stable temporal coherence = memory formation is clear, Thread
        operations have predictable temporal auto-effects, POP is precise. Disrupted:
        the relationship between before and after is unreliable at the Thread level;
        memory formation fails not because memories are damaged but because the temporal
        substrate through which experience becomes memory is inconsistent.
    (2) Spatial extension: the condition under which things occupy distinct positions
        and can be other-than-here. Stable: positioning is exact, Thread configuration
        of objects is correctly located. Disrupted: the condition for having a position
        becomes locally compromised; orientation fails not because of disorientation
        but because the Thread conditions for spatial distinctness are unreliable.
    (3) Configurational legibility: the condition under which Thread configurations
        have a character that can be read. Stable: high-TS practitioners perceive
        configurations clearly even at low effort. Disrupted: practitioners find their
        perception returning nothing renderable — the Forgetting's specific form for
        practitioners is this dimension's Foundational disruption.
    (4) Actualization: the condition under which configurations are determinate rather
        than oscillating. Stable: things are what they are, fully. Disrupted: configurations
        oscillate between states at the Thread level (Shifting Objects are Object-scale
        actualization disruptions; Foundational actualization disruption affects the
        conditions for anything being determinate in the region).

    Einhir Foundational sites stabilized all four. Result: a location where everything is
    exactly what it is, exactly where it should be, exactly when it should happen. Thread
    operations that fail elsewhere from substrate instability succeed here. For non-practitioners:
    unusual felt reality, stable memory, heightened presence.

    T15 (Askeheim) was the Einhir's most significant Foundational stabilization site —
    the center from which they managed Thread conditions across the peninsula.

    THE CALAMITY'S MECHANISM:
    The Einhir were performing large-scale Structural operations from T15 using the
    Foundational stabilization as the platform. Something caused the Foundational
    stabilization to collapse — possibly a Structural operation at a scale that exceeded
    what the stabilization could support. When the stabilization collapsed, what had been
    the most stable site became the most catastrophically unstable. The organized
    positive being (Ein Sof) that the stabilization had been holding in configured form
    erupted through the breach without organization — not because Ein Sof is hostile, but
    because the container broke and what was inside it does not naturally conform to human
    rendering categories.

    The wound is not one Foundational Gap but a network of mutually reinforcing Foundational
    Gaps across the Askeheim region whose combined extent has consumed the surrounding intact
    Foundational substrate — destroying the self-repair context. Single Foundational Gaps can
    self-close in 32 seasons (n=5) because the surrounding intact substrate provides the
    conditions for closure. The Calamity network cannot self-close because there is no
    surrounding intact Foundational substrate within the wound's influence range to provide
    those conditions. Edeyja's work is: isolate individual Gaps from the network → restore
    local Foundational stability around isolated Gaps → allow those to close → expand the
    stable region → repeat. Each major conflict resets sections she has stabilized.

    Add to: designs/setting/calamity_radiation.md (Foundational section); arc_register.md
    (T15 entry clarification); session worldbuilding canon.
  finding_id: null
  affects:
    - designs/setting/calamity_radiation.md
    - references/arc_register.md
  status: applied

- id: PP-610

- id: PP-616
  type: patch
  date: 2026-04-14
  severity: P1
  description: >
    Thread operation pools standardised. Attunement removed from all Thread pools.
    Spirit is the attribute for all Thread operations — it is the metaphysical capacity
    to engage with Thread reality while remaining grounded. Attunement (Social group)
    belongs in social/perceptual calibration contexts, not Thread work.

    CANONICAL THREAD POOLS (all use (Spirit × 2) + History + TPS base):

    | Operation         | Pool                             | TN |
    |-------------------|----------------------------------|----|
    | Leap              | (Spirit × 2) + History + TPS     | 7  |
    | Weaving           | (Spirit × 2) + History + TPS     | 7  |
    | Pulling           | (Spirit × 2) + History + TPS     | 7  |
    | Past-Oriented Pulling | (Spirit × 2) + History + TPS÷2 (round down) | 8 |
    | Mending           | (Spirit × 2) + History + TPS     | 7  |
    | Community Weaving | (Spirit × 2) + History + TPS     | 7  |
    | Locking           | (Spirit × 2) + History           | 8  |
    | Dissolution       | (Spirit × 2) + History           | 8  |

    CHANGES FROM PRIOR PARAMS:
    - Mending was: Attunement + Focus + TPS. Now: (Spirit × 2) + History + TPS.
    - Leap was: Spirit + Attunement + History + TPS. Now: (Spirit × 2) + History + TPS.
    - Community Weaving was: Attunement + History + TPS. Now: (Spirit × 2) + History + TPS.
    - Focus removed from all pool dice. Focus = Contact Rounds only (duration, not pool).
    - All remaining references to Attunement in Thread operation pools are struck.

    BINDING OPS (Lock/Dissolution) — no TPS, design note added:
    Locking and Dissolution act against the substrate's natural tendency (forcing fixity or
    forcing absence). Perceptual depth (TPS) does not assist these operations — the
    practitioner is not reading the substrate but overriding it. Spirit and domain
    knowledge (History) are the sole resources. This is intentional and load-bearing
    to the Binding Ops design (PP-252).

    POP — half TPS, design note added:
    Past-Oriented Pulling operates across temporal distance. Perceptual depth (TPS) applies
    to present Thread configurations; past configurations are only partially accessible
    to current perception. Half TPS at TN 8 represents working with partial perceptual
    access at greater temporal depth. The further back the recency band, the harder the Ob.

    ATTUNEMENT REMAINS CANONICAL FOR:
    - Combat initiative (higher Attunement acts last — reads the exchange)
    - Social contest Appraise pool (Attunement + Recall)
    - No-Adjudicator contest arguing (Attunement × 2) + History
    - Fieldwork: social reads, witness interviews, Thread-aware exploration
    Attunement is the social/perceptual calibration stat. It is not a Thread work stat.

    FOCUS REMAINS CANONICAL FOR:
    - Contact Rounds = Focus score (duration of Thread contact window)
    Focus no longer contributes dice to any Thread operation pool.

    REALISTIC POOL CALIBRATION NOTE:
    Effective practitioner ceiling given realistic stat assumptions (3 = average,
    each step = ~1 SD, Spirit 5 = exceptional, TS 75 = near-Edeyja after centuries):
    - Capable PC: Spirit 4, TS 50→TPS 5, Hist 3: pool = (4×2)+3+5 = 16D
    - Exceptional PC: Spirit 5, TS 60→TPS 6, Hist 3: pool = (5×2)+3+6 = 19D
    - Edeyja (NPC): Spirit 6, TS 75→TPS 7, Hist 3: pool = (6×2)+3+7 = 22D
    Ob 10 (Foundational): Edeyja P(≥10) ≈ 6%. Correct difficulty.
  finding_id: null
  affects:
    - references/params_threadwork.md
  status: applied


- id: PP-617
  type: patch
  date: 2026-04-14
  severity: P2
  description: >
    History system formalised. Replaces informal "history points + 3" construction.

    CANONICAL HISTORY RULES:
    - Each character has Histories — areas of life experience and expertise.
    - Each History has a level (1–3 points). Cap: 3 points per specific History.
    - Primary relevant History: contributes full points as dice (+1D per point, max +3D).
    - Only one History may be designated Primary per roll (must be narratively defensible).
    - Secondary History: not permitted. One History only per roll.
    - The +3D constant in all pool formulas is the floor contribution independent of
      History — a baseline competence every character brings, before History.

    POOL FORMULA (all systems — unified):
    Pool = (Primary Attribute × 2) + 3 + (Primary History level, 0–3D)
    Minimum pool: 5D (at Attribute 1, no relevant History: (1×2)+3=5).
    Maximum from History: +3D (History level 3).
    Maximum pool (non-Thread): (7×2)+3+3 = 20D — theoretical, not realistic.
    Realistic max (Attribute 5, History 3): (5×2)+3+3 = 16D.

    Thread pool formula:
    Pool = (Spirit × 2) + 3 + (Primary History level) + TPS
    (TPS replaces the "perceptual amplifier" function that doubling would otherwise provide)

    Recall stat governs History point cap: a specific History cannot hold more points
    than the character's Recall score. History 3 requires Recall ≥ 3.
  finding_id: null
  affects:
    - references/params_core.md
    - references/params_threadwork.md
  status: applied

- id: PP-618
  type: correction
  date: 2026-04-14
  severity: P1
  description: >
    PP-616 correction: Binding Ops (Lock, Dissolution) include TPS.

    PP-616 stated Binding Ops use (Spirit × 2) + History with NO TPS. This was wrong.

    RATIONALE (reversed): Perceptual depth (TPS) is directly relevant to Locking and
    Dissolution. The deeper a practitioner perceives a Thread configuration, the better
    they understand its internal structure — its joints, tolerances, and the points at
    which it can be fixed in place (Lock) or unmade (Dissolution). A TS 30 practitioner
    attempting Dissolution on something they can barely perceive has far less information
    about where and how to apply the operation than a TS 70 practitioner who sees the
    full architecture. Knowing a configuration's limits is how you break it.

    The TN 8 for Binding Ops is what makes them genuinely difficult — not a reduced pool.

    CORRECTED CANONICAL THREAD POOLS:

    | Operation             | Pool                                 | TN |
    |-----------------------|--------------------------------------|----|
    | Leap                  | (Spirit × 2) + History + TPS         | 7  |
    | Weaving               | (Spirit × 2) + History + TPS         | 7  |
    | Pulling               | (Spirit × 2) + History + TPS         | 7  |
    | Past-Oriented Pulling | (Spirit × 2) + History + TPS÷2      | 8  |
    | Mending               | (Spirit × 2) + History + TPS         | 7  |
    | Community Weaving     | (Spirit × 2) + History + TPS         | 7  |
    | Locking               | (Spirit × 2) + History + TPS         | 8  |
    | Dissolution           | (Spirit × 2) + History + TPS         | 8  |

    All Thread operations now use the same pool construction.
    Differentiation comes from: TN (7 vs 8), Ob (scale-dependent), TS minimum gates,
    Coherence costs, and Gap consequences (Dissolution only).
    POP retains TPS÷2 and TN 8 — temporal distance limits perceptual access to past
    configurations; this is the remaining pool asymmetry.

    COMBAT INITIATIVE CLARIFICATION (PP-239 confirmed):
    Attunement primary: higher Attunement acts last in Exchange 1 (more information).
    Agility tiebreaker: if Attunement equal, higher Agility acts last.
    Both stats involved — Attunement is the primary initiative stat; Agility resolves ties.
    This was not changed by PP-616; clarification only.
  finding_id: PP-616

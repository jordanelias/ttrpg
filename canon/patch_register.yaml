- id: PP-589
  type: patch
  date: 2026-04-13
  severity: P2
  description: >
    Refinement of PP-582 and PP-584 on the Forgetting and Vaynard's epistemic position.
    The Heidegger ready-to-hand / present-at-hand distinction applies precisely.
    Vaynard operates entirely in present-at-hand mode with respect to Thread reality.
    He retains: propositional knowledge about threadwork (TK 5 — theoretical framework),
    historical knowledge about the Einhir and the Southernmost, observable effects he has
    witnessed (temporal dissonance, memory inconsistencies — he experiences the gap between
    what he remembers and what is now the case). He does NOT have access to: the experience
    of Thread contact itself (ready-to-hand), the operational "how" of any Thread operation,
    the perceptual substrate that TS ≥ 29 renders available.
    His consequentialist calculation fails specifically because he cannot evaluate the
    safety rule ("TS 30+ required") against his own situation. That evaluation requires
    ready-to-hand epistemic access — knowing FROM WITHIN whether TK 5 is sufficient
    substitute for TS 30+ perceptual capacity. He cannot perform this evaluation. From his
    present-at-hand position, TK 5 (the most comprehensive theoretical account any
    non-practitioner has assembled) appears like a reasonable operational substitute.
    He is wrong in a way he cannot discover except through Thread contact itself.
    PP-584's correction ("words point at something he cannot render") was too strong:
    Vaynard can render the abstract and historical referents of those words. What he cannot
    render is the operational dimension — the ready-to-hand experience that would let him
    evaluate the words against his own capacity.
    Player role (PP-584 conclusion) remains correct: structural constraint, not communication.
    Vaynard cannot be argued out of his calculation because the argument requires him to
    perform an evaluation he lacks the epistemic equipment to perform. No propositional
    argument bridges the ready-to-hand gap. He would need to be the kind of entity that
    can enter Thread contact to know whether his TK 5 substitutes for TS 30+.
  finding_id: PP-582 PP-584 (refinement)
  affects:
    - references/arc_register.md
    - tests/sim_arc_c01_vaynard_unchecked.md
  status: applied

- id: PP-590
  type: patch
  date: 2026-04-13
  severity: P2
  description: >
    Thread Contact TS Development — mechanism made explicit.
    Canonical grounding: P-01 (Inseparability), §1 Philosophical Foundations
    (Threads are the substrate of all being — what things are made of and the
    condition of possibility for being). Any Thread-marked configuration continues
    to exert configurational pull on everything in sustained contact with it.
    Contact with Thread-marked material is a Thread relationship; sustained Thread
    relationships develop perceptual access to the substrate.

    Three tiers of TS development rate via sustained contact (additive with other sources):

    (1) AMBIENT ENVIRONMENTAL EXPOSURE (lowest rate):
    Sustained presence near Thread-active conditions (Calamity Radiation Fragile/Fractured
    effects, Einhir ruin sites, territories with active Gaps/Shifting Objects). Examples:
    RM communities in Proximity 1 territories; populations near Einhir ruin sites.
    Canonical mechanic: calamity_radiation.md §RS Critical Distance 3: "Discovery Events
    possible — TS growth checks for witnesses." This already covers the mechanism; this
    PP makes it explicit for Fragile/Fractured bands at closer proximity.
    Rate: Spirit TN7 Ob2 per season of sustained presence in Thread-active territory.
    Only applies to TS 0–9 characters (below Practitioner threshold). TS 10+ develop
    through practitioner methods.

    (2) SUSTAINED HANDLING OF THREAD-MARKED OBJECTS (moderate rate):
    Repeated contact with Woven artifacts, Shifting Objects, confiscated Thread-evidence.
    Examples: Vaynard's Private Collection use (already canonical: +1 TS hidden/use);
    Inquisitors handling confiscated Thread-evidence over career; merchants handling
    Thread-touched goods (cf. NPC-ARC-FEL). Shifting Objects perdure — sustained handling
    of a Shifting Object is contact with an actively oscillating Thread configuration.
    Rate: as per the canonical Private Collection mechanic (+1 hidden TS per use) for
    intentional concentrated handling. For ambient professional handling (Inquisitors,
    merchants): Spirit TN7 Ob3 per campaign arc of sustained professional contact.
    This explains Haelgrund TS 12 (career Inquisitor) and Klapp TS 31 (career archivist
    and head of Church education — extensive contact with suppressed Thread-adjacent texts
    and artifacts across decades). These are not anomalies; they are expected outcomes.

    (3) DIRECT PRACTITIONER OPERATION OR PROXIMITY TO ACTIVE THREAD WORK (highest rate):
    Being present as a Thread operation occurs. The operation's co-movement effects extend
    to all present (P-01 compliance). Examples: any non-practitioner present during a Leap
    and Thread operation; communities where practitioners operate visibly.
    Rate: Spirit TN7 Ob1 per scene of direct exposure to active Thread operation.
    (This rate is already used by Discovery Event mechanics and TE-18.)

    DESIGN CONSEQUENCE (Church self-defeating dynamic):
    The Inquisitorial programme requires extensive handling of Thread-adjacent evidence.
    The Church's most diligent Inquisitors are its most Thread-sensitive personnel.
    The institutional suppression apparatus is simultaneously the institutional
    Thread-sensitivity development programme. This is the metaphysical foundation
    of NPC-ARC-HAE (Haelgrund Defection) and ARC-S08/S21 (Klapp Threshold) —
    not occupational hazard in an abstract sense but the literal mechanism of contact.

    Add to params_threadwork.md §Thread Sensitivity as a clarifying section.
    Cross-reference: calamity_radiation.md (ambient exposure), params_factions.md
    §Private Collection (intentional artifact handling), NPC-ARC-HAE, ARC-S08.
  finding_id: null
  affects:

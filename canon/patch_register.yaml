- id: PP-632
  type: patch
  date: 2026-04-13
  severity: P1
  description: >
    Disposition and Knot system redesign (user-approved 2026-04-13):

    DISPOSITION:
    - Range: −3 to +5 → −4 to floor(Bonds/2)+1
    - Ob rule: stepped lookup table → max(1, base Ob − Disposition) direct subtraction
    - Starting Disposition: faction table → lifepath ±0.5 increments, floor, clamped to range
    - Decay threshold: above +3 → above +2
    - Information gates updated for new range
    - Impress exempt from Disposition subtraction (sets initial Disposition)

    KNOTS:
    - Ontological basis: Knots are being-with (Mitsein), not Thread operations.
      Any character. TS not required for formation.
    - Pool: (Bonds × 2) + 3 points
    - Tiers: Close 5 / Medium 2 / Loose 1
    - Max count: floor(Bonds/2)+1 (same formula as Disposition ceiling)
    - Formation: max Disposition + Connect roll (Ob = tier, Disposition subtracted)
    - Rupture: points return; Disposition →−4; Composure damage = tier cost
    - Loss: points return; Disposition removed; Coherence −1 (mandatory, Amendment 01);
      Composure damage = tier cost
    - Threadcut being Knot strain: +1/use, −1/season rest, instability at 5

    FILES UPDATED:

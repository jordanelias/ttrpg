    Fibonacci: 1, 1, 2, 3, 5, 8. The escalation between levels grows — the jump
    from Structural to Foundational (3 Ob) exceeds any prior gap. Correct.

    "Field" replaces "Territorial" as name for the intermediate level. A field of
    shared Thread coherence — the emergent configuration of a coherent local area.
    Not a BG territory card (those are Structural scale).

    MENDING DEPTH OB: Depth Ob − 1 (working with substrate's self-repair tendency).

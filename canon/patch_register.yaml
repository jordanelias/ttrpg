- id: PP-506
  date: 2026-04-09
  severity: P1
  description: >
    Fort Level / Battle trigger for Graduated Seizure (ED-355, ED-368 resolved).
    Fort Level does NOT modify Seizure Ob. Seizure is a political act — Church
    institutional authority overriding local governance. Fort Level is relevant only
    to Battle resolution, not to seizure Ob.
    Battle trigger rule: if the target territory has a garrison (Fort ≥ 1 AND at least
    one military unit present belonging to the controlling faction), Church must first
    win a Battle before Seizure can be attempted that season. Battle uses standard rules
    (attacker Military vs Ob = defender Military ÷ 2, round up, min 1; Fort Level adds
    bonus dice to defender per standard Battle rules). If Church wins the Battle: Seizure
    roll proceeds immediately in the same resolution. If Church loses the Battle: Seizure
    does not fire; Casus Belli still granted. An ungarrisoned fortified territory (Fort ≥ 1,
    no units) can be Seized directly — no Battle required.
    Retroactively formalises victory_architecture_v1.md §3.2 PP-500 reference.
    [PROVISIONAL: ED-355 flagged for simulation confirmation.]
  finding_id: [D5-J3-SIM-GS-01]
  source: SIM-GS-01 editorial resolution 2026-04-09
  affects: [references/params_board_game.md, references/params_factions.md]
  status: applied

- id: PP-507
  date: 2026-04-09
  severity: P1
  description: >
    Graduated Seizure availability gate (ED-365 resolved). Church Graduated Seizure
    (PP-494) is available at ANY TC value from TC ≥ 15 (i.e. as soon as floor(TC/15) ≥ 1).
    There is no post-TC 75 gate on Graduated Seizure itself. TC 75 is the phase transition
    where TC freezes and seizure becomes Church's primary strategic mode — but seizure was
    always available. The params_board_game §TC 75 Territorial Seizure header was a
    structural artifact grouping seizure rules, not a gate condition. Struck from
    params_board_game: the implication that seizure requires TC ≥ 75. Corrects SIM-GS-01
    finding D5.
    Early Seizure (TC < 50) political consequence: Casus Belli granted plus all factions
    observe the attempt (no concealment possible pre-TC 50; Church's territorial ambition
    becomes a political event). Post-TC 50: Casus Belli still granted but observation
    is limited to factions with Intel ≥ 3 in the target territory.
    [PROVISIONAL: observation rule flagged for simulation confirmation.]
  finding_id: [D5-SIM-GS-01, ED-365]
  source: SIM-GS-01 editorial resolution 2026-04-09
  affects: [references/params_board_game.md]
  status: applied

- id: PP-508
  date: 2026-04-09
  severity: P1
  description: >
    OW CV cap conflict resolution (ED-366 resolved). PP-494 governs: Graduated Seizure
    Overwhelming result grants CV +1 in target territory as a consequence, NOT cap-governed.
    The ±1 CV seasonal cap applies to player-initiated CV Domain Actions only. Seizure is
    a distinct category (analogous to PP-254 TC seizure classification). Struck from
    params_board_game §TC 75 Territorial Seizure Results: the phrase 'counts against ±1 CV
    seasonal cap.' Replaces with: 'CV +1 on Overwhelming is a consequence effect — not
    subject to the ±1 CV seasonal cap. State-change effects and conquest consequences are
    exempt from action caps.' Corrects SIM-GS-01 finding D7.
  finding_id: [D7-SIM-GS-01, ED-366]
  source: SIM-GS-01 editorial resolution 2026-04-09
  affects: [references/params_board_game.md]
  status: applied

- id: PP-509
  date: 2026-04-09
  severity: P2
  description: >
    Prominence check timing (ED-367 resolved). Prominence for Graduated Seizure is assessed
    at seizure declaration, not at resolution. If Church Mandate falls below the controlling
    faction's Mandate between declaration and resolution (e.g. via an interrupt action),
    the seizure roll still proceeds — the declaration locked the prominence check. Rationale:
    consistency with standard Domain Action resolution (declared conditions govern); prevents
    exploit where factions artificially inflate their own Mandate mid-resolution to strip
    prominence. Corrects SIM-GS-01 finding J4.
  finding_id: [J4-SIM-GS-01, ED-367]
  source: SIM-GS-01 editorial resolution 2026-04-09
  affects: [references/params_board_game.md]
  status: applied

- id: PP-510
  date: 2026-04-09
  severity: P1
  description: >
    Casus Belli mechanic definition (GAP-CB resolved). Casus Belli (CB) is a one-season
    political token. When CB is granted: the receiving faction places a CB marker on their
    faction mat (colour-coded to the offending faction). Effects (all fire at next Accounting
    after CB is granted):
    (1) Receiving faction may play one free Senator Outward (Diplomacy) action targeting the
        offending faction this season without spending a card slot. This represents formal
        diplomatic protest.
    (2) If the receiving faction plays a Legionary action against the offending faction this
        season, Ob is reduced by 1 (min 1). Military action is politically legitimised.
    (3) All other factions observe the CB grant (public record). Any faction may invoke
        the CB as justification for joining a coalition this season (coalition Ob −1 for
        this season only if the CB-holding faction is primary).
    CB marker is removed at the following Accounting regardless of whether effects were used.
    Only one CB may be held against any single faction at a time; a new CB from the same
    source replaces the existing one (timer resets, effects refresh).
    [PROVISIONAL: CB stacking across multiple sources (e.g. CB from Church AND CB from Crown
    simultaneously) flagged — confirm whether multiple CB markers can be held.]
  finding_id: [L2-SIM-GS-01, GAP-CB]
  source: SIM-GS-01 editorial resolution 2026-04-09
  affects: [references/params_board_game.md, references/params_factions.md]
  status: applied

- id: PP-511
  date: 2026-04-09
  severity: P2
  description: >
    Mandatory Assert suspension post-TC 75 (ED-369 resolved). Mandatory Assert (PP-480,

- id: PP-623
  type: correction
  date: 2026-04-14
  severity: P1
  description: >
    Probability calculation corrected throughout. Prior simulation used E[net]=0.3
    per die at TN7, which is wrong. Correct values:

    E[NET PER DIE BY TN:
    TN 7: faces 1→-1, 2-6→0, 7-9→+1, 10→+2. E = -0.1+0+0.3+0.2 = 0.4
    TN 8: faces 1→-1, 2-7→0, 8-9→+1, 10→+2. E = -0.1+0+0.2+0.2 = 0.3
    TN 9: faces 1→-1, 2-8→0, 9→+1, 10→+2. E = -0.1+0+0.1+0.2 = 0.2
    Each TN step costs exactly 0.1 E[net] per die.

    Variance per die (TN7): E[X²]=0.8, Var=0.64, SD=0.8.
    For N dice: E=0.4N, SD=√(0.64N)=0.8√N.

    FIBONACCI DEPTH Ob CORRECTED (shift one step up in sequence):
    | Depth       | Ob | Mending Ob |
    |-------------|-----|------------|
    | Object      | 1   | n/a        |
    | Personal    | 2   | n/a        |
    | Relational  | 3   | 2          |
    | Field       | 5   | 4          |
    | Structural  | 8   | 7          |
    | Foundational| 13  | 12         |

    Sequence: 1, 2, 3, 5, 8, 13. Fibonacci from F(1) through F(7).
    Mending: Depth Ob − 1 (working with substrate's self-repair tendency).

    TOTAL OB = Depth Ob + Breadth Ob + Distance Ob + TN modifiers (unchanged from PP-622).

    VERIFICATION (E=0.4/die TN7, normal approx with continuity correction):

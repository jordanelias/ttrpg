    Expert 17D (E=6.8, SD=3.30):
      Field single contact Ob5: P≈76% ✓
      Formation 100m Ob(3+2+1=6): P≈65% ✓
    Master 20D (E=8.0, SD=3.58):
      Structural single contact Ob8: P≈56% ✓ hard
    Edeyja 22D (E=8.8, SD=3.75):
      Foundational Mending single contact Ob12: P≈22% ✓ hard sustained work
      Foundational standard single contact Ob13: P≈16% ✓
      Foundational network Ob(13+4+3=20): P<1% ✓ impossible alone

    TN8 (Binding Ops): E=0.3N. For 22D: E=6.6, SD=3.66.
      Edeyja Relational Lock single contact (Ob3): P≈83% ✓ expert Binding accessible
      Edeyja Structural Lock single contact (Ob8): P≈47% ✓ hard
    TN9 (POP Binding): E=0.2N. 22D: E=4.4.
      Near-impossible except at shallow depth and close range.

    |-------------|----------------|----|-------------|
    | Contact     | 0–1m           | 0  | 30+         |
    | Close       | 1–10m          | 0  | 30+         |
    | Near        | 10–100m        | 1  | 50+         |
    | Distant     | 100m–1km       | 2  | 70+         |

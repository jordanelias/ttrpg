    Ministry AP-tokens on faction elimination: Ministry AP-tokens persist through any faction's elimination. They are Ministry (NPC) assets, not assets of the controlling faction. Territories that go Uncontrolled after faction elimination retain their Ministry AP-tokens. The Ministry NPC AI continues to operate per its priority tree regardless of which faction holds former Crown territories. Corrects STR-ELIM-D-02.
  finding_id: STR-ELIM-D-02
  source: stress test 2026-04-08 PP-476-498 coverage
  affects: ['references/params_board_game.md']
  status: applied


- id: PP-489
  date: 2026-04-08
  severity: P1
  description: >
    Captured General — multiple capture stacking: each captured/killed named general adds 1 season to the Legionary card unavailability timer additively. Timer displayed on faction mat. If a general is killed while Legionary is already unavailable, timer extends by 1. No cap stated — sustained military pressure yields proportionate disruption. Resolves STR-GEN-D-01.
  finding_id: STR-GEN-D-01
  source: stress test 2026-04-08 PP-476-498 coverage
  affects: ['references/params_board_game.md']
  status: applied


- id: PP-490
  date: 2026-04-08
  severity: P2
  description: >
    Captured General — Mandate −1 timing: Mandate −1 fires at Accounting regardless of whether ransom has been offered or accepted. Ransom restores the general next season; the political cost of losing command is immediate and not mitigated by ransom payment. Confirms rule text intent. Resolves STR-GEN-D-02.
  finding_id: STR-GEN-D-02
  source: stress test 2026-04-08 PP-476-498 coverage
  affects: ['references/params_board_game.md']
  status: applied


- id: PP-491
  date: 2026-04-08
  severity: P2
  description: >
    Cardinal Succession — schism trigger with dead Cardinal: when a Cardinal is dead (in the gap period before Year-End replacement), that Cardinal is removed from the schism trigger pool. If the schism trigger fires (Church Stability = 2 + Senator action vs Church this season), the acting Cardinal is the next in rotation order: Fortitude → Justice → Prudence → Temperance → Fortitude (skipping any dead Cardinals). If all four Cardinals are dead simultaneously, schism cannot trigger (no Cardinals to challenge). Resolves STR-CARD-D-02.
  finding_id: STR-CARD-D-02
  source: stress test 2026-04-08 PP-476-498 coverage
  affects: ['references/params_board_game.md']
  status: applied


- id: PP-492
  date: 2026-04-08
  severity: P1
  description: >
    Conviction Yield — Church velocity compensation: at TC 30–49, Institutional Momentum produces TC +2/season (increased from +1) to compensate for the structural Conviction Yield exclusion of Church-controlled territories (PP-473 + PP-484). At TC 50+, Institutional Momentum reverts to +1/season (standard). Rationale: Church starts with only T9 (its capital, excluded from Conviction Yield pool by PP-473 logic). Early-game TC generation is critically hampered without T9 yield; the +2 momentum at 30–49 provides a credible approach to the 50-threshold where Conviction Yield in other territories can take over. Resolves STR-TC-D-01 (partially — campaign length still a gap).
  finding_id: STR-TC-D-01
  source: stress test 2026-04-08 PP-476-498 coverage
  affects: ['references/params_board_game.md']
  status: applied

- id: PP-479
  date: 2026-04-08
  severity: P2
  description: >
    Church + Hafenmark Partition co-victory condition "no active military conflict" defined.
    Means: no Legionary card played by either faction targeting a territory held by the other
    in the current season OR the immediately prior season. Physical tracking: a Conflict Marker
    (flip token) placed on the relevant faction mat when military conflict occurs; removed at
    the second Accounting after placement. Resolves SIM-DEBT-BG-03 D-03-04.
  finding_id: STR-BG-D-03-04
  source: BG remaining SIM-DEBT simulation 2026-04-08
  affects: [designs/board_game/victory_architecture_v1.md, references/params_board_game.md]
  status: applied

- id: PP-480
  date: 2026-04-08
  severity: P2
  description: >
    Ministry NPC Domain action conflict rule added. When Ministry NPC would play a Domain
    action in a territory already acted on by a player faction in the same Phase 4 resolution,
    Ministry redirects to the next-priority territory per its AI tree. Ministry does not stack
    Domain actions with player factions in the same territory same phase. If all viable
    territories are already acted-on: Ministry takes Priority 5 default action in any uncontested
    AP-token territory regardless of prior player action there. Resolves SIM-DEBT-BG-05 F-Ministry-01.
  finding_id: STR-BG-Ministry-01
  source: BG remaining SIM-DEBT simulation 2026-04-08
  affects: [references/params_board_game.md]
  status: applied


    - references/params_threadwork.md (Knot Mechanics canonical section)
    - references/params_core.md (Bonds attribute note updated)
    - references/canonical_sources.yaml (stale note fixed)
  finding_id: disposition-knot-redesign-2026-04-13
  affects:

  date: 2026-04-14
  severity: P1
  description: >
    P1-G03 documented. TE-08 (T9 Himmelenger falls): Church Mandate −3 is the game's
    largest single-action stat reduction, but it leaves Church's Territorial Seizure
    and Piety Yield mechanics intact because both use Influence (not Mandate) as their
    pool stat. At Mandate 2, Church can still: (a) Seize territories via Graduated
    Seizure (Pool = Influence + floor(TC/15)); (b) generate TC via Assert (Influence vs
    Ob 2); (c) accumulate Piety Yield (territory PT contributes regardless of Mandate).
    What collapses at Mandate 2: Excommunication (near-impossible at 2D TN7 Ob 2),
    Heresy Investigation effectiveness (2D pool), Institutional Mandate trigger
    (requires M ≥ 4), Formal Crown Treaty negotiation capacity.
    GMs and players must understand: Church losing T9 triggers political collapse but
    NOT operational Thread/TC collapse. Church remains a viable TC generator and
    territory seizer at Mandate 2. Add explicit note to TE-08 arc entry and Church
    faction reference.
  finding_id: P1-G03
  affects:
    - references/arc_register.md
    - references/params_board_game.md
  status: applied


- id: PP-595
  type: patch
  date: 2026-04-14
  severity: P1
  description: >
    P1-G05 resolved. Löwenritter Reconstitution (PP-431 senator inward action) is
    available only when PI = 0. The Coup fires PI −3; if pre-coup PI ≈ 6, post-coup
    PI = 3, placing Reconstitution out of reach. Löwenritter's Regency victory
    requires PI ≥ 4. The path from PI 3 (post-coup) to PI ≥ 4 CANNOT go through
    Reconstitution — that action requires PI = 0 as a prerequisite, which means PI
    must first deteriorate further before Reconstitution becomes available.
    The intended recovery path: Löwenritter must rely on Hafenmark Parliamentary
    Manoeuvre success (+1 PI) or Crown Parliamentary Session (+1 PI) or Ministry
    Mandate ≥ 4 support — all dependent on other factions cooperating. This is
    correct design: Regency legitimacy must be demonstrated through political
    reconstruction, not just military authority. However, GMs need this made
    explicit, as Löwenritter players may assume Reconstitution is their PI recovery
    tool when it is not available at PI 3.
    Add to: Löwenritter NPC AI (post-coup priority tree), Reconstitution action
    description (note: PI 3 post-standard-coup means this action unavailable;
    requires PI to drop to 0 via further deterioration first).
  finding_id: P1-G05
  affects:
    - references/params_board_game.md
  status: applied



    nothing from T15 — the excessive being at the wound site is categorically epistemically
    inaccessible. No roll. (2) Champions with TS ≥ 29: automatic Forgetting Check Success.
    Their consciousness can render Southernmost experience as knowledge. No roll. (3) Champions
    with TS 10–28: roll as currently specified (same pool vs Ob 2). Their Thread Sensitivity
    allows partial perception but does not guarantee Forgetting resistance. The roll covers
    the ambiguous zone. This aligns the BG abstraction with the philosophical foundations
    (P-08, P-13): the epistemic barrier at T15 is metaphysical, not a skill challenge.
    It cannot be overcome by effort, preparation, or documentation for TS < 29. Add to
    params_board_game.md §Southernmost Access System §Expedition Procedure and

- id: PP-506
  date: 2026-04-09
  severity: P1
  description: >
    Fort Level / Battle trigger for Graduated Seizure (ED-355, ED-368 resolved).
    Fort Level does NOT modify Seizure Ob. Seizure is a political act — Church
    institutional authority overriding local governance. Fort Level is relevant only
    to Battle resolution, not to seizure Ob.
    Battle trigger rule: if the target territory has a garrison (Fort ≥ 1 AND at least
    one military unit present belonging to the controlling faction), Church must first
    win a Battle before Seizure can be attempted that season. Battle uses standard rules
    (attacker Military vs Ob = defender Military ÷ 2, round up, min 1; Fort Level adds
    bonus dice to defender per standard Battle rules). If Church wins the Battle: Seizure
    roll proceeds immediately in the same resolution. If Church loses the Battle: Seizure
    does not fire; Casus Belli still granted. An ungarrisoned fortified territory (Fort ≥ 1,
    no units) can be Seized directly — no Battle required.
    Retroactively formalises victory_architecture_v1.md §3.2 PP-500 reference.
    [PROVISIONAL: ED-355 flagged for simulation confirmation.]
  finding_id: [D5-J3-SIM-GS-01]
  source: SIM-GS-01 editorial resolution 2026-04-09
  affects: [references/params_board_game.md, references/params_factions.md]
  status: applied

- id: PP-507
  date: 2026-04-09
  severity: P1
  description: >
    Graduated Seizure availability gate (ED-365 resolved). Church Graduated Seizure
    (PP-494) is available at ANY TC value from TC ≥ 15 (i.e. as soon as floor(TC/15) ≥ 1).
    There is no post-TC 75 gate on Graduated Seizure itself. TC 75 is the phase transition
    where TC freezes and seizure becomes Church's primary strategic mode — but seizure was
    always available. The params_board_game §TC 75 Territorial Seizure header was a
    structural artifact grouping seizure rules, not a gate condition. Struck from
    params_board_game: the implication that seizure requires TC ≥ 75. Corrects SIM-GS-01
    finding D5.
    Early Seizure (TC < 50) political consequence: Casus Belli granted plus all factions
    observe the attempt (no concealment possible pre-TC 50; Church's territorial ambition
    becomes a political event). Post-TC 50: Casus Belli still granted but observation
    is limited to factions with Intel ≥ 3 in the target territory.
    [PROVISIONAL: observation rule flagged for simulation confirmation.]
  finding_id: [D5-SIM-GS-01, ED-365]
  source: SIM-GS-01 editorial resolution 2026-04-09
  affects: [references/params_board_game.md]
  status: applied

- id: PP-508
  date: 2026-04-09
  severity: P1
  description: >
    OW CV cap conflict resolution (ED-366 resolved). PP-494 governs: Graduated Seizure
    Overwhelming result grants CV +1 in target territory as a consequence, NOT cap-governed.
    The ±1 CV seasonal cap applies to player-initiated CV Domain Actions only. Seizure is
    a distinct category (analogous to PP-254 TC seizure classification). Struck from

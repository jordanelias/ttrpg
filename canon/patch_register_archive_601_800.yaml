- id: PP-492
  date: 2026-04-08
  severity: P1
  description: >
    Conviction Yield — Church velocity compensation: at TC 30–49, Institutional Momentum produces TC +2/season (increased from +1) to compensate for the structural Conviction Yield exclusion of Church-controlled territories (PP-473 + PP-484). At TC 50+, Institutional Momentum reverts to +1/season (standard). Rationale: Church starts with only T9 (its capital, excluded from Conviction Yield pool by PP-473 logic). Early-game TC generation is critically hampered without T9 yield; the +2 momentum at 30–49 provides a credible approach to the 50-threshold where Conviction Yield in other territories can take over. Resolves STR-TC-D-01 (partially — campaign length still a gap).
  finding_id: STR-TC-D-01
  source: stress test 2026-04-08 PP-476-498 coverage
  affects: ['references/params_board_game.md']
  status: applied


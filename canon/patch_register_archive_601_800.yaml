    Weight-of-Numbers — primary faction determination: the primary suppressing faction (whose pool the coalition bonus applies to) is the faction with the highest Mandate among all factions playing suppression actions against the same target this phase. Tiebreak priority: Crown > Hafenmark > Varfell > Löwenritter > Restoration Movement. Determination is automatic — no declaration required. Resolves STR-WON-D-01.
  finding_id: STR-WON-D-01
  source: stress test 2026-04-08 PP-476-498 coverage
  affects: ['references/params_board_game.md']
  status: applied


- id: PP-487
  date: 2026-04-08
  severity: P2
  description: >
    Weight-of-Numbers — valid suppression action definition: a valid suppression action is any Domain Action that directly targets another faction's Mandate stat or their unique clock/track (TC for Church, PI for Hafenmark, VTM for Varfell). This mirrors the Institutional Mandate trigger scope (ED-324). Generic Domain Actions not targeting Mandate or unique tracks do not qualify. Resolves STR-WON-D-02.
  finding_id: STR-WON-D-02
  source: stress test 2026-04-08 PP-476-498 coverage
  affects: ['references/params_board_game.md']
  status: applied



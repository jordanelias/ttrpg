- id: PP-508
  date: 2026-04-09
  severity: P1
  description: >
    ED-358 resolved. §A.8 splitting note struck and replaced with correct doctrine.
    Splitting is structurally advantageous in nearly all Command pairings (+9% to +45%
    win-rate advantage). §A.8 claim ("splitting 3+3 against undivided 5 is disadvantageous")
    was wrong — it assumed defender could maintain full pool vs each sub-unit simultaneously,
    which is impossible under current rules (defender pool splits). Hard counters to splitting:
    (1) Narrow Pass terrain (1 engagement per side — primary counter), (2) Feigned Retreat
    to disengage and re-concentrate. Matching the split is not an effective counter.
    Simulation: split dominates in all tested configurations except near-ceiling matchups. [PROVISIONAL]
  finding_id: SIM-MB-02 Scenario 8, SIM-MB-03 D2
  source: mass_battle stress test 2026-04-09
  affects: [designs/mass_combat/mass_battle_v3.md, references/params_mass_combat.md]
  status: applied



- id: PP-565
  type: redesign
  date: 2026-04-12
  severity: P2
  description: >
    ED-328 + ED-341 resolved: AER advancement and decay redesigned.
    Advancement: Cardinal of Temperance Phase 1 declaration now requires a roll
    (Mandate vs Ob = floor(current AER / 2) + 1). Success: AER +1. Failure: no change.
    At AER 2-3: Ob 2 (~54% at Mandate 5). At AER 4-5: Ob 3 (~29% at Mandate 5).
    Decay: AER -1 at Year-End Accounting if Temperance maintenance was not successfully
    maintained that year. Creates natural AER homeostasis without trivialising early AER.
    Was: passive no-roll AER loss reduction; achievable AER 3 by Season 3 automatically.
  finding_id: ED-328, ED-341
  affects: [references/params_board_game.md]
  status: applied


    Both armies fight uncommanded — PP-273 1D minimum, Line, no tactics — until each
    general re-establishes Command (Ob 2 check Phase 1 following turn). Sequencing:
    simultaneous initiative per standard personal combat. Simulation: 3-turn duel
    leaves ~80% of Size=5 armies intact. Low-Command generals disadvantaged on

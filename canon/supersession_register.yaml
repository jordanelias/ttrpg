# Supersession Register
# Tracks editorial decisions, PPs, EDs, and commits that have been overridden by later work.
# 
# PURPOSE: Prevent propagation of stale authority. Before treating any editorial decision,
# PP, ED resolution, or audit finding as authoritative, check this register for supersession.
#
# FORMAT:
#   - superseded_id: <commit-sha | ED-NNN | PP-NNN | file_path>
#     scope: <what the superseded item claimed>
#     superseded_by: <commit-sha | ED-NNN | PP-NNN>
#     superseded_date: YYYY-MM-DD
#     replacement: <brief description of current canonical>
#     files_to_recheck: [paths that may have propagated the stale version]

entries:


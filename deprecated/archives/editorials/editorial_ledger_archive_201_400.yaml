    status: resolved
    date_resolved: 2026-04-06
    priority: P1-BLOCKER
    source: opus_handoff session 2026-04-06
    decision: >
      Deed checklist system dissolved for Crown/Church/Hafenmark/Varfell. Victory is now simultaneous
      conditions (TCV threshold + faction-specific requirements) held for 2 consecutive seasons.
      Conviction Track (CV) 0-5 per territory is the ideological axis contested by all factions.
      TC freezes at 75. Church shifts to territorial seizure post-75. TCV values assigned to all
      17 territories (total 30). Crown Primary: TCV≥18 + Mandate≥5 + TC<50 + IP<60 + PI≥4 + moderate CV.
      Church Primary: TC≥75 → TCV≥18 with CV≥3 everywhere. Hafenmark Primary: TCV≥14 + Mandate≥4 + PI≥5 +
      Crown Mandate≤3 + reformed CV. Varfell: 3 paths retained with TCV integration. RM: 5 territories
      CV≤1 + RS≥40 + 5 Presence markers. Full spec in designs/board_game/victory_architecture_v1.md.

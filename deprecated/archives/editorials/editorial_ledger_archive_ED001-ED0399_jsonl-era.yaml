- {"id": "ED-308", "description": "Varfell succession: if Vaynard dies, VTM resets to 0 (Thread path closes for faction). Maret Uln is the natural successor (practitioner TS, Loyalty 4, People's Revolution-adjacent). Faction transforms from Reinhardt's conquest machine to RM-aligned Thread-aware polity. This is effectively RM Emergence from inside Varfell rather than from outside. Design question: is this the primary RM Emergence path, replacing the hostile-emergence triple-condition trigger?\n", "status": "resolved", "priority": "P2", "source": "opus_handoff session 2026-04-06", "blocks": "Varfell faction card, RM emergence mechanic", "tags": ["setting", "varfell", "succession", "restoration-movement", "vaynard"], "date_resolved": "2026-04-12", "resolution": "Resolved by PP-486 in params_factions: Maret Uln succeeds, VTM resets to 0, Varfell aligns with RM but is NOT RM Emergence.", "patch": "PP-486"}
- {"id": "ED-309", "description": "Baralta succession: should PI (Parliament Integrity) serve as the succession mechanic (high PI = institutions survive her death; low PI = Hafenmark fractures)? Or does Baralta need a named successor NPC with a loyalty track like Torben/Elske? Her royal lineage (cadet branch) means succession is bloodline + institutional, not purely parliamentary.\n", "status": "resolved", "priority": "P2", "source": "opus_handoff session 2026-04-06", "blocks": "Hafenmark faction card", "tags": ["setting", "hafenmark", "succession", "baralta"], "date_resolved": "2026-04-12", "resolution": "Resolved by PP-487 in params_factions: PI ≥ 4 = institutional succession (Mandate -1, Stability -1); PI < 4 = fracture (Mandate halved). No named successor.", "patch": "PP-487"}

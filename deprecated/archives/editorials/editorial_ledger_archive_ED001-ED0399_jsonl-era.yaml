- {"id": "ED-298", "date_flagged": "2026-04-04", "date_resolved": "2026-04-04", "source": "design", "source_file": "session_log_current.md", "status": "resolved", "decision": "Approved as specified. PP-405 applied. Token = cube. Parliamentary-only. Year-End expiry if no hostile action. Diplomacy Ob 2 early resolution.", "description": "Resentment token design (2C — Parliamentary Vote). Voting No on a blocked motion earns +1 Standing but generates Resentment vs proposing faction. Resentment: −1 Ob on Domain Actions targeting that faction (motivated opposition); +1 Ob on proposer's Domain Actions targeting resentful faction. Expires at Year-End if no hostile action taken. Resolved via Diplomacy (Ob 2, mutual consent). Requires: token form factor decision (card/cube/token); confirmation that Resentment is parliamentary-only (not generated by Domain Actions); confirmation of resolution conditions.", "propagation_targets": ["designs/board_game/valoria_bg_v05_simulation_and_patches.md", "references/params_factions.md"], "propagation_status": "pending", "tags": ["board-game", "parliamentary", "resentment", "coalition", "design"]}
- {"id": "ED-299", "date_flagged": "2026-04-04", "date_resolved": "2026-04-04", "source": "design", "source_file": "session_log_current.md", "status": "resolved", "decision": "Approved. Four canonical coalition pairs enumerated in params_factions via PP-405.", "description": "Coalition trigger enumeration required for PP-404 (missed coalition Ob penalty). Each coalition pair needs: trigger condition (stat threshold), relevant stats for each faction, and whether the trigger is symmetric or asymmetric. Current design doc references Church+Hafenmark pact as a sim construct — canonical coalition list needed in params_factions or bg_v05.", "propagation_targets": ["references/params_factions.md", "designs/board_game/valoria_bg_v05_simulation_and_patches.md"], "propagation_status": "pending", "tags": ["board-game", "coalition", "factions", "enumeration"]}
- {"id": "ED-300", "date_flagged": "2026-04-05", "date_resolved": "2026-04-06", "source": "design", "source_file": "session_log_current.md", "description": "Domain Echo as scene-availability declaration (all modes). Instead of Domain Echo = event that fires, Domain Echo = scene is available for player engagement. Uninvestigated echoes escalate on a seasonal clock; at threshold, the situation resolves autonomously without player input (world moves, not player loss). Scenes yield two output categories: Primary (the situation — degree outcome affects trajectory of the character/event) and Secondary (leads, relationship shifts, unlocked echoes, Thread-sensitive information — present at all degrees, content varies by degree). Characters (e.g. Vaynard, Klapp) are world-state contributors with internal clocks, not objectives. Engaging a character node yields secondary information beyond their immediate plotline. Applicable across all modes: TTRPG, Hybrid, Videogame, and Board Game (BG layer already has equivalent in TC passive advance, Stability decay, autonomous Domain Action resolution).", "status": "resolved", "priority": "P2", "decision": null, "propagation_targets": ["designs/board_game/valoria_bg_v05_simulation_and_patches.md", "references/params_board_game.md", "session_log_current.md"], "propagation_status": "pending", "tags": ["domain-echo", "scene-generation", "hybrid", "videogame", "board-game", "all-modes", "escalation", "autonomous-resolution", "investigation"]}
- {"id": "ED-301", "date_flagged": "2026-04-05", "date_resolved": "2026-04-06", "source": "design", "source_file": "session_log_current.md", "description": "Thread Sensitivity (TS) and Coherence are orthogonal axes governing fundamentally different things.\nThread Sensitivity (TS): governs depth and breadth of thread perception — what the practitioner can detect, manipulate, and understand about thread configuration, conditions of possibility, relational structure, and consequences. Higher TS = more of the thread landscape is accessible and legible as thread. TS level is identical in effect at any Coherence level — a TS 95 practitioner at Coherence 10 and a TS 95 practitioner at Coherence 1 perceive the same depth of thread detail.\nCoherence: governs the ontological frame through which perception is rendered — specifically, how much of that perception remains translatable into human terms: being-in-the-world, being-with-others, self-understanding as a human entity among humans. Coherence loss is not degradation or narrowing — it is expansion beyond the human rendering frame. A low-Coherence practitioner does not perceive less; their perception becomes increasingly Other, increasingly incommensurable with human rendering, at the limit exceeding what human being-categories can hold.\nKnots are relational bindings between entities (characters, memories, places) — structural features of the thread landscape, not metaphors for unresolved conflict.\nTS-gated investigation: scenes are practitioner states, not locations. Thread operations including investigative ones incur co-movement consequences (P-01). Over-investigation degrades Coherence and may create new knots in the process of examining existing ones. Emergent cross-character thread connections are possible as secondary yield — not authored but mechanically generated by the relational structure of the thread landscape itself.\nCoherence 0: the practitioner's rendering frame has become sufficiently Other that being-with-others no longer operates on human terms. Language remains functional but the thread-connectivity behind language use is inaccessible to human observers regardless of their own TS. Intentions and actions may still be oriented toward human concerns (ref: Solmund) but the why is not reconstructible from any human rendering position — not withheld, not hidden, but genuinely outside human rendering capacity. A TS 99 Coherence 10 observer watching a Coherence 0 practitioner perceives all thread activity with full clarity and still cannot render the why in human terms.\nPP-261 NPC transition at Coherence 0: player agency ends not because the character is incapacitated but because their interiority no longer operates on human motivational terms. The game cannot simulate that rendering frame. The character passes to GM as a being whose reasoning has exceeded human-legible simulation capacity — not as a broken entity.\nCanonical illustration: Solmund's miracles are observable effects. The reasoning behind them is not recoverable — the gap is rendering frame incompatibility, not communication failure. Comparable to explaining caninsulin dosage rationale to a diabetic dog: the care is real and oriented toward the dog's wellbeing; the pharmacokinetic reasoning is simply not translatable into terms the dog can occupy.\n", "status": "resolved", "priority": "P2", "decision": null, "propagation_targets": ["designs/ttrpg/threadwork_redesign_v25.md", "references/params_threadwork.md", "references/params_core.md"], "propagation_status": "pending", "tags": ["thread-sensitivity", "coherence", "investigation", "scene-structure", "knots", "coherence-0", "solmund", "all-modes", "perception", "rendering-frame"], "addendum_2026-04-05": "Released Coherence 0 player characters become world-state contributors in the same category as Vaynard or Klapp — active in the world, generating Domain Echoes, available as scene nodes — except their behaviour is GM-rendered and their reasoning is unrecoverable to any other character regardless of that character's TS. They appear in the thread landscape as a kind of weather: their thread activity (knots created/dissolved, operations performed) is detectable but intent and future action are not attributable.\nGM handling mechanism: at Coherence 3, player and GM co-write beliefs and inspirations together. This is double-duty — it is both a narrative tool for the player to participate in their own release, and a design document the GM uses to render the character as a world-state contributor afterward. The player co-authors the behaviour parameters of their future NPC. The released character's actions are not random — they are the terminus of an arc already visible in the belief/inspiration material, extrapolated into a mode of being that no longer operates on human motivational logic but remains recognisably continuous with what the character was becoming. Ref: Solmund helping living things is not arbitrary — it is the endpoint of what Solmund was already oriented toward.\n"}

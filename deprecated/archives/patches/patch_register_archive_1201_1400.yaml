- id: PP-604
  type: patch
  date: 2026-04-14
  severity: P1
  description: >
    Gap Self-Closure by Scale — new model replacing flat −4 RS/season Gap persistence rate.

    FIVE GAP SCALES (n = scale index):
    Reality self-heals gaps at a rate proportional to the disruption's scale.
    Larger disruptions take longer to heal; smaller ones close quickly.

    Formula: Gap at scale n closes in 2^n seasons (exceptions: Foundational uses 2^5=32).
    RS drain per open season = n.
    Total RS drain if untouched = n × (2^n − 1).

    | Scale      | n | Closes after | Open seasons | RS drain/season | Total untouched |
    |------------|---|--------------|--------------|-----------------|-----------------|
    | Object     | 0 | 1 season     | 0            | 0               | 0               |
    | Relational | 1 | 2 seasons    | 1            | 1               | 1               |
    | Territory  | 2 | 4 seasons    | 3            | 2               | 6               |
    | Structural | 3 | 8 seasons    | 7            | 3               | 21              |
    | Foundational | 5 | 32 seasons  | 31           | 5               | 155             |

    (n=4 skipped for Foundational; the ontological gap between Structural and Foundational
    is qualitative, not a single step. Foundational breaches affect the conditions of being
    itself — categorically more severe than Structural ruptures in local Thread configuration.)

    Object Gaps: close in 1 season with no RS drain. Produce Shifting Objects and
    operational interference while open but do not persistently damage substrate integrity.
    No Mending action required (or possible — they resolve before meaningful action).

    The Calamity's wound at T15 is a Foundational Gap. Its non-closure after 245 years is not
    because it cannot self-close (32 seasons is achievable) but because sustained conflict
    repeatedly resets the closure timer. Each major war or invasion re-opens what was slowly
    closing. The Wardens are not fighting impossible physics — they are fighting the peninsula's
    inability to sustain 32 consecutive seasons of substrate peace.

    REPLACES: flat −4 RS/season Gap persistence rate (struck).
    REPLACES: current 6-tier Mending Gap classification (Shifting Object/Micro/Standard/
    Entrenched/Catastrophic/Locked Zone) replaced by 5-scale model.

    MENDING Ob formula: 2n (scale index × 2).
    | Scale      | n | Mending Ob | TS minimum |
    |------------|---|------------|------------|
    | Object     | 0 | 0 (n/a)    | n/a        |
    | Relational | 1 | 2          | 30+        |
    | Territory  | 2 | 4          | 50+        |
    | Structural | 3 | 6          | 70+        |
    | Foundational | 5 | 10       | 90+        |

    Ob 8 ceiling on Mending struck (Foundational is Ob 10, correctly near-impossible).

    LOCK CHRONIC DRIFT (revised by scale):
    | Lock scale  | Drift seasons 1-3 | Drift seasons 4+ |
    |-------------|-------------------|------------------|
    | Object      | 0                 | 0                |
    | Personal    | −1/season         | −1/season        |
    | Relational  | −1/season         | −2/season        |
    | Territorial | −2/season         | −3/season        |
    | Structural  | −3/season         | −5/season        |
    Foundational Lock: effectively impossible in practice (Ob 8+ TN8, no Thread Pool Score,
    TS 90+ required; P < 0.1% even for Edeyja).

    DISSOLUTION GAP CREATION (revised):
    The Gap scale created by Dissolution = scale of configuration being Dissolved.
    Immediate breach cost = n RS (one-time; the act of tearing).
    Ongoing RS drain follows Gap scale table.
    Degree modifies Gap scale produced:
    - Overwhelming: Gap forms and closes within scene. Immediate breach cost only.
    - Success: Gap at target scale (n). Closes per scale table.
    - Partial: Gap one scale worse than Success (n+1).
    - Failure: Gap two scales worse than Success (n+2).

    WARDEN COOPERATION effect on Gap drain: WC ≥ 2 halves all RS drain from open Gaps
    and active Locks at Accounting. This represents the Wardens actively managing the
    substrate's worst stress points.

    Affects: params_threadwork.md (Gap system, Mending table, Lock drift, RS drain sources).
  finding_id: null
  affects:
    - references/params_threadwork.md
  status: applied



- id: PP-607
  type: patch
  date: 2026-04-14
  severity: P1
  description: >
    Dissonance absorbed into Spirit. Certainty track removed. Attunement defined.

    DISSONANCE → SPIRIT CHECK MECHANIC:
    When a Thread operation fires near a character, they enter Thread-disrupted space,
    or POP affects their temporal experience: Dissonance check fires.
    Roll: Spirit pool (all dice available) TN7 vs Dissonance Factor.

    Dissonance Factor by source:
    - Thread operation in adjacent area, brief: Factor 1
    - Thread operation nearby, significant: Factor 2
    - POP affecting character's own memories: Factor 3
    - Entering Territory-scale Gap: Factor 2
    - Entering Structural-scale Gap: Factor 3
    - Proximity to active Substrate Saturation (Counter ≥ 3): Factor 2
    - Extended time in Foundational-breached zone: Factor 4

    Failure consequence (duration by exposure type):
    - Acute (single operation event, brief encounter): Spirit −1D for rest of scene.
    - Sustained (living or working in disrupted area across seasons): Spirit −1D for rest of season.
    - Stacking: multiple failures in the same scene reduce Spirit pool cumulatively.
    Recovery: acute effect clears at scene end; sustained effect clears at season end.
    Spirit pool reductions are temporary; the stat only permanently changes through
    Attunement damage (see below) or through deliberate character development.

    TS INTERACTION WITH DISSONANCE:
    TS 30+ practitioners: on a Dissonance check Success, instead of no-effect, they receive
    readable Thread information (Discovery Event trigger or Belief revision opportunity).
    On Failure, they still take the Spirit −1D penalty — perception does not eliminate the
    phenomenological burden; it changes what the disruption means, not that it has weight.

    ATTUNEMENT — DEFINITION (closes ED-418):
    Attunement = felt resonance with the world as it is. The receptive, healing-oriented
    complement to Spirit's assertive dimension. Where Spirit is the force of will that holds
    the self together under Thread pressure, Attunement is the quality of presence that allows
    the world to be read without forcing it.

    Mechanical functions:
    (1) Mending pool: Attunement + Focus + TPS (replaces provisional entries; canonical).
        Mending is not an act of will on the substrate — it is receptive engagement with
        what is actually there and what the substrate's own self-repair tendency wants.
        Attunement is the correct stat for this, not Spirit.
    (2) Community Weaving pool: Attunement + History + TPS (PP-250 canonical; confirmed).
    (3) Long-term Thread exposure damage (replaces Certainty track):
        When a character accumulates Dissonance failures across multiple scenes/seasons,
        or fails Forgetting checks, or undergoes traumatic Discovery Events: Attunement
        takes permanent −1 damage. This is the long-term cost of exposure beyond rendering
        capacity — the felt resonance with the world as-it-is is eroded.
        Recovery: extended time in Thread-unaffected environments (full season, no Thread
        operations nearby): Attunement +1. Cannot exceed starting value this way. Warden
        guidance or Anchoring Scene (Bonds TN7 Ob2): Attunement +1 (as Coherence recovery).

    CERTAINTY TRACK — STRUCK:
    The Certainty track is removed. Its mechanical function (accumulated epistemic damage
    from Thread exposure) is now handled by Attunement permanent damage.
    The phenomenological concept of certainty (epistemic confidence in one's access to
    reality) remains valid as narrative framing; it has no separate mechanical expression.

    STAT SUMMARY (practitioners):
    Spirit — assertive self-coherence; Dissonance checks; Leap rolls
    Attunement — receptive world-resonance; Mending/Weaving pools; long-term exposure damage
    Focus — contact duration (1–7 rounds)
    Thread Sensitivity (TS) — perceptual depth (0–100)
    Thread Pool Score (TPS) — TS ÷ 10 round down; contributes to operation pools
    Coherence — ontological rendering frame; 10→0; practitioners only

    STAT SUMMARY (non-practitioners in Thread-active environments):
    Spirit — Dissonance checks; temporary pool reduction on failure
    Attunement — long-term Thread exposure damage; starting resonance with world

    Affects: params_threadwork.md (Coherence section, Mending pool, Community Weaving pool,
    Certainty references); session worldbuilding canon.
  finding_id: ED-418 ED-433
  affects:
    - references/params_threadwork.md
  status: applied



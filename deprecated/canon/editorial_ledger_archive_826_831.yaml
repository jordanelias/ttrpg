    in tests/audit/all_directions_ners_v27.md, but was NEVER propagated to params/combat. params/combat L14 has always carried
    the clean universal grammar `(Agi × 2) + H + 3`. The 2026-05-15 engine NERS audit incorrectly cited params/combat L14
    as the source of the DR formula (F3/L-1) — citation was wrong; DR existed only in audit/sim layer documents. Jordan Decision-A
    2026-05-15: PP-717 D2 explicitly REJECTED at canon layer. Combat pool retains universal grammar. Agi 6 pool-dominance
    gap (v27 sim showed 55% advantage at pool 17 vs 11) is queued for Phase 4 simulation re-check to confirm whether the problem
    PP-717 D2 was designed to address still manifests at current canonical values.'
  severity: P2
  type: incongruency
  archetype: A2
  affected_docs:

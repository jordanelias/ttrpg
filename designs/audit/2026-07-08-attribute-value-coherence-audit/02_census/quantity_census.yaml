- canonical_name: Mandate
  aliases:
  - 'Mandate Pool (deprecated usage, recommended rename: Political Pool per ci_political_v30 §3.4/§7.2)'
  kind: faction_stat
  cluster: C5
  defining_surface: 'AMBIGUOUS: params/factions_personal.md:14 (LINEAR) vs designs/provincial/faction_behavior_v30.md:398-410
    §4 + faction_canon_v30.md:216 + references/module_contracts.yaml:598-601 (SATURATING) — the saturating
    form is the one actually cross-confirmed by 3 independent surfaces and is Stage-4 sim-validated'
  formulas:
  - formula: 'LINEAR: round(0.5*Legitimacy + 0.5*Popular_Support), citing ''faction_behavior_v30 §4''
      as source'
    surface: params/factions_personal.md:14
    provenance: F-REG-002/F-DESIGN-5
  - formula: 'SATURATING: q_s=0.5*L_s+0.5*PS_s; W_s=base(Type)+Prosperity_s+FacilityTier_s; T=sum(W_s*(q_s/7));
      Mandate=clamp(round(7T/(T+6)),0,7) — Lesson-5 bound, Stage-4 sim validated'
    surface: references/module_contracts.yaml:598-601; designs/provincial/faction_behavior_v30.md:398-410
      (§4, current text); designs/provincial/faction_canon_v30.md:216; designs/territory/settlement_layer_v30.md:147-177
      (§1.8, LPS-2e ruling that produced this form)
    provenance: F-REG-002/F-DESIGN-5/F-C
  registered: warn
  status: DRIFTED
  scale_bounds: 0-7 (1-7 per F-INDEX floor note; can collapse to 0)
  key_bindings:
  - echo_armature §2.1 Domain Echo Debate row
  - faction_state consumes
  - settlement_layer<->Mandate feedback loop (damper coefficient 0.6/season, module_contracts.yaml:562-563)
  consumers:
  - victory gate g_diss (module_contracts.yaml:685)
  - Faction Legitimacy(derived)=Mandate*20 (C2 row)
  divergences:
  - 'params/factions_personal.md:14''s citation of ''faction_behavior_v30 §4'' is now stale: that section
    was rewritten under the LPS-2e ruling (2026-05-30) to the saturating, size-weighted form, but the
    params citation still states the old flat/linear mean — the params doc''s own citation no longer matches
    its cited source (F-DESIGN-5, confirms the exact divergence named in this audit''s baseline facts).'
  - name_collision_database.yaml separately flags 'Mandate Pool' as a stat-noun-as-pool-name collision,
    recommending 'Political Pool' (already canonical usage in ci_political_v30 §3.4/§7.2) — unresolved,
    low severity.
  finding_basis: F-REG-002 (NEW), F-DESIGN-5 (NEW, confirms baseline-flagged divergence with exact citations),
    F-C (contract-side saturating form), FIX (Mandate Pool naming, low-severity unresolved)

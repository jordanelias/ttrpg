# ─── TERRAIN LAYER (8 types) ───
# Types: plains, forest, highland, mountain, mountain_pass, fjord_coast, coast, marsh
# Annotations are separate (river, bridge, forgetting_zone, radiation_bands).
# Roads are NOT authored: A*-cached over terrain-cost field per PP-709 §2.4.
terrain:
  - id: terrain-mountain-north
    type: mountain
    polygon: [[300, 80], [1620, 80], [1620, 290], [1100, 260], [820, 290], [300, 290]]
    description: Northern Mountains — east-west barrier vs Altonia. Two passes embedded (Lowenskyst NE, Spartfell NW).
  - id: terrain-pass-lowenskyst
    type: mountain_pass
    polygon: [[1300, 80], [1500, 80], [1500, 290], [1300, 290]]
    description: Lowenskyst NE pass — primary Altonian crossing. T3 gates this pass. S-007 Fortress.
  - id: terrain-pass-spartfell
    type: mountain_pass
    polygon: [[420, 80], [620, 80], [620, 290], [420, 290]]
    description: Spartfell NW pass — secondary Altonian crossing. T10 gates this pass. S-021 Fortress.
  - id: terrain-highland-hafenmark
    type: highland
    polygon: [[420, 290], [820, 290], [820, 700], [420, 700]]
    description: Hafenmark Highlands — Swiss-coded. Rocky, mineral deposits, limited arable. Includes T8, T10.
  - id: terrain-highland-halvarshelm

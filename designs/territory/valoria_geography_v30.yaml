# ─── TERRAIN COST MATRIX (movement multipliers) ───
# Seed values per PP-707 §1.5; Phase 4 stress test will calibrate.
# Mountain interior is impassable except via embedded mountain_pass polygons.
terrain_cost_matrix:
  plains: 1.0
  coast: 1.0
  fjord_coast: 2.5      # broken inlet land terrain; naval rules separate
  forest: 1.5
  highland: 1.5
  marsh: 2.0
  mountain_pass: 2.0    # embedded pass strips; gated by fortress
  mountain: 999.0       # impassable (effectively infinity)
  river_crossing_no_bridge: 1.5
  river_crossing_with_bridge: 1.0
  road_overlay: 0.7     # multiplier on underlying terrain (cached A*, not authored)

# ─── VISION RANGE (multiplicative factor stack per PP-709 §2.6) ───
# effective_vision = base × terrain × weather × season
vision_range:
  base_pixels: 240        # ≈ one settlement-spacing distance on 1920×2880
  terrain_factor:
    plains: 1.0
    coast: 1.0
    fjord_coast: 1.0
    forest: 0.7           # own-vision reduced inside forest
    highland: 1.5         # vantage from elevation
    marsh: 0.7            # mist, broken sightlines
    mountain_pass: 0.7    # narrow corridor
    mountain: 1.4         # high vantage if reachable
  weather_factor:
    clear: 1.0
    overcast: 0.85
    fog: 0.4
    storm: 0.3
    blizzard: 0.2
  season_factor:
    spring: 1.0
    summer: 1.05
    autumn: 0.9
    winter: 0.6

# ─── MARCH BUDGET (PP-709 §2.3) ───
# Per-army per-season march budget. Cost consumed via terrain_cost × distance.
march_budget:
  base_per_military_point: 100   # px/season; Crown Mil 5 → 500 px budget
  cavalry_modifier: 1.5          # ≥50% Cav-class units in army
  skirmish_modifier: 1.3         # low-tier only, no siege equipment (chevauchée)


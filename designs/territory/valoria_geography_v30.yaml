# ─── SETTLEMENT-LEVEL ADJACENCY GRAPH (PP-726 supersedes PP-723) ───
# Per valoria_political_hierarchy_v30 §2.2 — fulfills the ED-710 placeholder at correct granularity.
# PP-723's 49-edge block was at WRONG GRANULARITY (mixed siege-target settlements with subservient
# districts and outposts). PP-726 supersedes with 55 edges across 37 march-target settlements at
# correct settlement = city/fortress/village/town granularity. Sub-features (cathedrals, markets,
# barracks, harbors, garrison towns, mines, watchtowers, lodges, shrines, watches, storehouses,
# coves, gates, ruins) collapse into their parent settlement and live in settlement_layer §2.2.
#
# 14 provinces in 3 duchies (Valorsmark/Almud, Hafenmark/Baralta, Varfell/Vaynard) = 35 settlements;
# Himmelenger Church city-state = 1; Schoenland foreign Altonian island = 1; total 37.
# Askeheim has 0 settlements (Calamity wilderness, no siege targets until healing).
#
# Total edges: 55 (28 intra-province + 24 primary inter-province + 1 Schoenland sea + 3 second-routes
# satisfying ≥2-connection rule for 2-settlement-province spokes).
# Composes with the territory-level adjacency block above for two-tier strategic-tactical resolution
# (the territory-level edges = inter-province edges; settlement-level edges = full march-route graph).

settlement_adjacency:
  # Generated 2026-05-10 (PP-726) — corrected-granularity rebuild superseding PP-723.
  # Granularity: settlement = siege-target (city/fortress/village/town); 35 Kingdom settlements
  # in 14 provinces under 3 duchies + Himmelenger Church city-state + Schoenland foreign tributary.
  # Sub-features (districts, garrison towns, mines, watchtowers, lodges, shrines, watches,
  # storehouses, harbors, gates, ruins) collapse into their parent settlement and are NOT
  # separate march-targets — they are listed in settlement_layer_v30 §2.2 sub-features registry.
  #
  # 56 edges total: 28 intra-province (3-settlement provinces are triangles, 2-settlement
  # provinces are single edges) + 28 inter-province (24 primary territorial routes from old
  # T1..T17 adjacency minus 2 Askeheim drops + 1 Schoenland sea-route + 3 second-routes for
  # ≥2-connection rule resilience).
  #
  # All 35 Kingdom settlements + Himmelenger have ≥2 connections (verified). Schoenland at
  # degree 1 is the foreign-exempt case awaiting ED-055 naval-scope expansion.

  # ─── Intra-province edges (28: 7 triangles × 3 + 7 singles × 1) ───
  - {from: S-001, to: S-002, type: road, note: "intra-Valorsplatz"}
  - {from: S-001, to: S-003, type: road, note: "intra-Valorsplatz"}
  - {from: S-002, to: S-003, type: road, note: "intra-Valorsplatz triangle"}
  - {from: S-004, to: S-005, type: road, note: "intra-Kronmark"}
  - {from: S-004, to: S-006, type: road, note: "intra-Kronmark"}
  - {from: S-005, to: S-006, type: road, note: "intra-Kronmark triangle"}
  - {from: S-007, to: S-008, type: road, note: "intra-Lowenskyst"}
  - {from: S-009, to: S-010, type: road, note: "intra-Feldmark"}
  - {from: S-009, to: S-011, type: road, note: "intra-Feldmark"}
  - {from: S-010, to: S-011, type: road, note: "intra-Feldmark triangle"}
  - {from: S-012, to: S-013, type: road, note: "intra-Stillhelm"}

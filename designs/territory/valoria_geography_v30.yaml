  rivers:
    - id: river-valoris
      type: navigable
      vertices: [[1380, 290], [1370, 500], [1380, 800], [1380, 1150], [1450, 1230], [1500, 1310], [1620, 1380]]
      description: Major river — northern mountain headwaters → Valorsplatz → eastern sea outflow. Crown trade artery.


#   2. Verify before trust: tools/workplan_status.py --check warns whenever
#      workplan-relevant paths (designs/, handoffs/, canon/, sim/) changed since this
#      file's last-touch commit (the machine freshness base; `as_of` below is the
#      human-facing record). The navigator skill runs the check on EVERY read; stale
#      board -> refresh rows from the handoffs/ledger FIRST, then answer.
#   3. Refresh-on-use: any session that lands juncture/stage-relevant work updates the
#      touched rows + appends one last_progress line + bumps as_of (skill Workflow C).
#   4. States: not_started | in_progress | blocked | done. `blocked_on` names the gate
#      (a §5 register fork / ED); `next` is the next concrete increment (one line).
#
# Glyph legend (rendering, workplan_status.py): ■ done · ◐ in_progress · ⊘ blocked · ▢ not_started


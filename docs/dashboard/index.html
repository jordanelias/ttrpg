<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valoria Dashboard</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#2a78d6">
<style>
  :root {
    --surface-1:      #fcfcfb;
    --page-plane:      #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --series-blue:    #2a78d6;
    --good:           #0ca30c;
    --warning:        #fab219;
    --serious:        #ec835a;
    --critical:       #d03b3b;
    --chip-ink:       #0b0b0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1:      #1a1a19;
      --page-plane:      #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --series-blue:    #3987e5;
      --good:           #0ca30c;
      --warning:        #fab219;
      --serious:        #ec835a;
      --critical:       #e66767;
      --chip-ink:       #0b0b0b;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page-plane);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    line-height: 1.4;
    padding: 12px;
    max-width: 900px;
    margin: 0 auto;
  }

  h1 { font-size: 1.25rem; margin: 4px 0 2px; }
  h2 { font-size: 1rem; margin: 0 0 10px; color: var(--text-primary); }

  .meta {
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-bottom: 16px;
  }
  .meta.stale { color: var(--critical); font-weight: 600; }

  section.card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }

  /* Single column by default (mobile-first); side-by-side only above ~700px */
  .grid-2 { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 700px) {
    .grid-2 { grid-template-columns: 1fr 1fr; }
  }

  ul.plain { list-style: none; margin: 0; padding: 0; }
  ul.plain li {
    padding: 8px 0;
    border-bottom: 1px solid var(--gridline);
    font-size: 0.92rem;
  }
  ul.plain li:last-child { border-bottom: none; }

  .decision-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .decision-item .dot {
    flex: 0 0 auto;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--critical);
    margin-top: 6px;
  }
  .decision-source {
    color: var(--text-muted);
    font-size: 0.75rem;
  }

  .bar { font-family: monospace; letter-spacing: 1px; font-size: 1.1rem; }
  .juncture-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--gridline);
    font-size: 0.88rem;
    align-items: baseline;
  }
  .juncture-row:last-child { border-bottom: none; }
  .juncture-glyph { font-family: monospace; }
  .juncture-next { color: var(--text-secondary); font-size: 0.82rem; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
  }
  .chip.good     { background: var(--good); }
  .chip.warning  { background: var(--warning); color: var(--chip-ink); }
  .chip.serious  { background: var(--serious); color: var(--chip-ink); }
  .chip.critical { background: var(--critical); }
  .chip.unknown  { background: var(--text-muted); }

  .badge-inferred {
    font-size: 0.68rem;
    color: var(--text-muted);
    border: 1px solid var(--gridline);
    border-radius: 6px;
    padding: 1px 5px;
    margin-left: 4px;
  }

  table.audit-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.audit-table th {
    text-align: left;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--gridline);
    padding: 4px 6px;
  }
  table.audit-table td {
    padding: 6px;
    border-bottom: 1px solid var(--gridline);
    vertical-align: top;
  }
  .subsystem-group-header {
    font-weight: 700;
    padding-top: 10px !important;
    color: var(--series-blue);
  }
  .audit-scope { color: var(--text-secondary); font-size: 0.78rem; }
  .audit-link { font-size: 0.78rem; }
  a { color: var(--series-blue); }

  .stat-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-tile { flex: 1 1 120px; }
  .stat-tile .value { font-size: 1.5rem; font-weight: 700; }
  .stat-tile .label { font-size: 0.75rem; color: var(--text-muted); }

  .commit-row { font-size: 0.85rem; display: flex; gap: 8px; }
  .commit-scope {
    flex: 0 0 auto;
    font-family: monospace;
    color: var(--series-blue);
    font-size: 0.75rem;
  }
  .commit-date { color: var(--text-muted); font-size: 0.75rem; flex: 0 0 auto; }
  .unavailable { color: var(--text-muted); font-style: italic; font-size: 0.85rem; }
  .empty-state { color: var(--text-muted); font-size: 0.85rem; }
</style>
</head>
<body>
  <h1>Valoria — what's been happening</h1>
  <div class="meta" id="generated-meta">loading…</div>

  <section class="card" id="decisions-card">
    <h2>Needs your decision</h2>
    <div id="decisions-body" class="empty-state">loading…</div>
  </section>

  <section class="card" id="workplan-card">
    <h2>North star — workplan</h2>
    <div id="workplan-body" class="empty-state">loading…</div>
  </section>

  <section class="card" id="audits-card">
    <h2>Audit &amp; balance verdicts</h2>
    <div id="audits-body" class="empty-state">loading…</div>
  </section>

  <div class="grid-2">
    <section class="card" id="ci-card">
      <h2>CI health</h2>
      <div id="ci-body" class="empty-state">loading…</div>
    </section>
    <section class="card" id="currency-card">
      <h2>Currency drift</h2>
      <div id="currency-body" class="empty-state">loading…</div>
    </section>
  </div>

  <section class="card" id="activity-card">
    <h2>Recent activity</h2>
    <div id="github-stats" class="stat-row" style="margin-bottom:10px;"></div>
    <div id="activity-body" class="empty-state">loading…</div>
  </section>

<script>
const GLYPH = { done: '■', in_progress: '◐', blocked: '⊘', not_started: '▢' };

const VERDICT_CLASS = {
  PASS: 'good', CONFORMANT: 'good', CLOSED: 'good',
  PARTIAL: 'warning', MIXED: 'warning', OPEN: 'warning',
  FAIL: 'critical', NON_CONFORMANT: 'critical',
};
const VERDICT_ICON = {
  PASS: '✓', CONFORMANT: '✓', CLOSED: '✓',
  PARTIAL: '◐', MIXED: '◐', OPEN: '◐',
  FAIL: '✕', NON_CONFORMANT: '✕',
};

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function cleanMarkdown(s) {
  // Strip a leading list marker and ** bold markers — this is a raw source line
  // from HANDOFF.md/handoffs/, not authored for display.
  return String(s ?? '').replace(/^[-*]\s+/, '').replace(/\*\*/g, '');
}

function verdictChip(verdict) {
  const cls = VERDICT_CLASS[verdict] || 'unknown';
  const icon = VERDICT_ICON[verdict] || '?';
  return `<span class="chip ${cls}">${icon} ${esc(verdict || 'UNKNOWN')}</span>`;
}

function renderGeneratedMeta(d) {
  const el = document.getElementById('generated-meta');
  const g = d.generated_at || {};
  if (!g.timestamp_utc) { el.textContent = 'generation time unknown'; return; }
  const genDate = new Date(g.timestamp_utc);
  const ageHours = (Date.now() - genDate.getTime()) / 3_600_000;
  const stale = ageHours > 48;
  el.textContent = `generated ${genDate.toLocaleString()} · commit ${g.commit_sha || '?'}` +
    (stale ? `  ⚠ stale (${Math.round(ageHours)}h old — check the dashboard.yml workflow run)` : '');
  el.classList.toggle('stale', stale);
}

function renderDecisions(d) {
  const el = document.getElementById('decisions-body');
  const nd = d.needs_decision;
  if (!nd || nd.available === false) {
    el.innerHTML = '<div class="unavailable">data unavailable</div>';
    return;
  }
  if (!nd.items || nd.items.length === 0) {
    el.innerHTML = '<div class="empty-state">nothing open — nice.</div>';
    return;
  }
  const items = nd.items.map(item => `
    <li class="decision-item">
      <span class="dot"></span>
      <span>${esc(cleanMarkdown(item.text))}<br><span class="decision-source">${esc(item.source)}${item.line ? ':' + item.line : ''}</span></span>
    </li>`).join('');
  el.innerHTML = `<ul class="plain">${items}</ul>
    <div class="decision-source" style="margin-top:8px;">heuristic prose scan — a floor, not a guarantee</div>`;
}

function renderWorkplan(d) {
  const el = document.getElementById('workplan-body');
  const wp = d.workplan;
  if (!wp || wp.available === false) {
    el.innerHTML = '<div class="unavailable">data unavailable</div>';
    return;
  }
  let html = '';
  if (wp.staleness_warning) {
    html += `<div class="decision-source" style="color:var(--warning);margin-bottom:8px;">⚠ ${esc(wp.staleness_warning)}</div>`;
  }
  for (const mkey of ['M1', 'M2', 'M3']) {
    const ms = wp.milestones && wp.milestones[mkey];
    if (!ms || !ms.rows || ms.rows.length === 0) continue;
    const bar = ms.rows.map(r => GLYPH[r.state] || GLYPH.not_started).join('');
    html += `<div style="margin-bottom:6px;"><strong>${mkey}</strong> <span class="bar">${bar}</span> — ${esc(ms.label)}</div>`;
    for (const r of ms.rows) {
      const glyph = GLYPH[r.state] || GLYPH.not_started;
      html += `<div class="juncture-row">
        <span><span class="juncture-glyph">${glyph}</span> ${esc(r.label)}${r.blocked_on ? ' <span class="decision-source">[gate: ' + esc(r.blocked_on) + ']</span>' : ''}</span>
      </div>`;
      if (r.next) html += `<div class="juncture-next">${esc(r.next)}</div>`;
    }
  }
  if (wp.decisions_t0_open && wp.decisions_t0_open.length) {
    html += `<div style="margin-top:10px;"><strong>T0 open:</strong> ${wp.decisions_t0_open.map(esc).join(' · ')}</div>`;
  }
  el.innerHTML = html || '<div class="empty-state">no rows</div>';
}

function renderAudits(d) {
  const el = document.getElementById('audits-body');
  const au = d.audits;
  if (!au || au.available === false) {
    el.innerHTML = '<div class="unavailable">data unavailable</div>';
    return;
  }
  if (!au.entries || au.entries.length === 0) {
    el.innerHTML = '<div class="empty-state">registry is empty — nothing has logged a verdict yet</div>';
    return;
  }
  const bySubsystem = {};
  for (const e of au.entries) {
    const key = e.subsystem || 'uncategorized';
    (bySubsystem[key] = bySubsystem[key] || []).push(e);
  }
  let html = '<table class="audit-table"><thead><tr><th>Type</th><th>Verdict</th><th>Date</th><th>Scope</th></tr></thead><tbody>';
  for (const subsystem of Object.keys(bySubsystem).sort()) {
    html += `<tr><td colspan="4" class="subsystem-group-header">${esc(subsystem)}</td></tr>`;
    for (const e of bySubsystem[subsystem].sort((a, b) => (a.audit_type || '').localeCompare(b.audit_type || ''))) {
      const inferred = e.confidence === 'inferred'
        ? '<span class="badge-inferred" title="backfilled by heuristic scan, not self-reported">🔎 inferred, verify</span>' : '';
      const link = e.folder
        ? `<a class="audit-link" href="https://github.com/jordanelias/ttrpg/tree/main/${encodeURI(e.folder)}" target="_blank" rel="noopener">${esc(e.folder)}</a>`
        : '';
      html += `<tr>
        <td>${esc(e.audit_type)}${inferred}</td>
        <td>${verdictChip(e.verdict)}${e.verdict_detail ? '<div class="audit-scope">' + esc(e.verdict_detail) + '</div>' : ''}</td>
        <td>${esc(e.date)}</td>
        <td><div class="audit-scope">${esc(e.scope)}</div>${link}</td>
      </tr>`;
    }
  }
  html += '</tbody></table>';
  if (au.entries.some(e => e.audit_type === 'simulation_balance')) {
    html += `<div class="decision-source" style="margin-top:8px;">
      ⚠ known gap: no CI job runs a full mc_v18 campaign — a seeded batch has shown a degenerate
      win-share with no oracle flagging it (see sim/README.md). simulation_balance rows above are
      not a substitute for that check.</div>`;
  }
  el.innerHTML = html;
}

function renderCi(d) {
  const el = document.getElementById('ci-body');
  const ci = d.ci_health;
  if (!ci || ci.available === false) {
    el.innerHTML = '<div class="unavailable">data unavailable' + (ci && ci.reason ? ': ' + esc(ci.reason) : '') + '</div>';
    return;
  }
  const conclChip = c => c === 'success'
    ? '<span class="chip good">✓ pass</span>'
    : c ? `<span class="chip critical">✕ ${esc(c)}</span>` : '<span class="chip unknown">?</span>';
  el.innerHTML = `
    <div style="margin-bottom:6px;">${conclChip(ci.conclusion_summary)} <strong>All Gates Green</strong></div>
    <div style="margin-bottom:6px;">${conclChip(ci.conclusion_unit_tests)} Validator Unit Tests</div>
    <div style="margin-bottom:6px;">${conclChip(ci.conclusion_sim_regression)} Sim Reference Regression</div>
    <div class="decision-source">commit ${esc(ci.commit_sha)}${ci.run_html_url ? ' · <a href="' + esc(ci.run_html_url) + '" target="_blank" rel="noopener">view run</a>' : ''}</div>`;
}

function renderCurrency(d) {
  const el = document.getElementById('currency-body');
  const cu = d.currency;
  if (!cu || cu.available === false) {
    el.innerHTML = '<div class="unavailable">data unavailable</div>';
    return;
  }
  el.innerHTML = `<div>${esc(cu.summary)}</div>`;
}

function renderActivity(d) {
  const el = document.getElementById('activity-body');
  const gh = document.getElementById('github-stats');
  const ghData = d.github;
  if (ghData && ghData.available) {
    gh.innerHTML = `
      <div class="stat-tile"><div class="value">${ghData.open_pr_count}</div><div class="label">open PRs</div></div>
      <div class="stat-tile"><div class="value">${ghData.open_issue_count}</div><div class="label">open issues</div></div>`;
  } else {
    gh.innerHTML = '';
  }

  const act = d.activity;
  if (!act || act.available === false) {
    el.innerHTML = '<div class="unavailable">data unavailable</div>';
    return;
  }
  if (!act.commits || act.commits.length === 0) {
    el.innerHTML = '<div class="empty-state">no commits found</div>';
    return;
  }
  el.innerHTML = '<ul class="plain">' + act.commits.slice(0, 20).map(c => `
    <li class="commit-row">
      <span class="commit-date">${esc(c.date)}</span>
      ${c.scope ? '<span class="commit-scope">[' + esc(c.scope) + ']</span>' : ''}
      <span>${esc(c.subject)}</span>
    </li>`).join('') + '</ul>';
}

async function load() {
  try {
    const res = await fetch('data.json', { cache: 'no-store' });
    const d = await res.json();
    renderGeneratedMeta(d);
    renderDecisions(d);
    renderWorkplan(d);
    renderAudits(d);
    renderCi(d);
    renderCurrency(d);
    renderActivity(d);
  } catch (e) {
    document.getElementById('generated-meta').textContent = 'failed to load data.json: ' + e;
  }
}
load();
</script>
</body>
</html>

task:
  description: "Continue scene combat redesign exploration. Five design directions\
    \ remain on the table — analysis phase, not commit-ready. Decision-owner is Jordan;\
    \ assistant role is exploration support, NOT recommendation. Do not push a particular\
    \ direction; surface trade-offs.\n\nPrior session traced Agility-pool dominance\
    \ in scene combat from Phase 8/10/11/12 sim work to a structural mismatch with\
    \ how real combat resolves. Reframing 2 (cross-scale niche dominance) was sim-validated.\
    \ C4 was drafted as one specific reform direction but became too thin once the\
    \ deeper question surfaced: scene combat fails to capture the five convergent\
    \ observations from treatises/sports/games:\n  1. Initiative is a state, not a\
    \ number\n  2. Weapon choice changes engagement profile, not just damage\n  3.\
    \ The bind/engaged-distance is the decision sub-game\n  4. Commitment is asymmetric\
    \ per moment\n  5. Reading the opponent is its own skill\n\nCurrent Valoria engine\
    \ captures none.\n\nFive remaining directions (struck FFT/Octopath/FFX init-meter\
    \ and Disco Elysium narrative-check per Jordan 2026-05-17):\n  1. Three-axis attack/defense\
    \ + advantage bar (Sid Meier Pirates, Silver time hierarchy)\n  2. One-hit kill\
    \ + posture/limb subsystem (Bushido Blade, Hellish Quart, Kendo, Liechtenauer)\n\
    \  3. Directional commitment + feint (For Honor, Bannerlord, Liechtenauer)\n \
    \ 4. Stance counters opponent archetype (Ghost of Tsushima, Fiore)\n  5. Posture/HP\
    \ dual tracks (Sekiro, Liechtenauer Vor/Nach)\n\nHellish Quart added to videogame\
    \ survey 2026-05-17: physics-based HEMA dueling, 4 attack angles, autoguard, mocap\
    \ from HEMA practitioners, no health bars, single-strike kills, weapon physically\
    \ blocks weapon. Closest existing videogame to Liechtenauer-tradition combat.\
    \ Stylistic successor to Bushido Blade with European twist.\n\nNext session: deepen\
    \ exploration of each direction with concrete mechanical proposals, present trade-offs,\
    \ await Jordan decision on direction. Do not push tiered framing or any other\
    \ synthesis — bias was called out in prior session."
  skill: valoria-mechanic-audit

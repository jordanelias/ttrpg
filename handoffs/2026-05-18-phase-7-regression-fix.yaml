task:
  skill: valoria-simulator
  description: 'Phase 7 regression fix. Prior session (c6ecb5b9, 2026-05-18 d88a9cb2)
    landed the v22 mass-battle bare port + faction_action wiring for Phase 7 C2 scope,
    but execution surfaces RecursionError in Subunit.__eq__ via target_atom cycle
    after assign_targets. Operationally: _try_conquest now calls resolve_mass_battle
    which raises; mc_v18.faction_take_action catches in try/except Exception:pass
    — so the campaign sim still completes, but every Conquest attempt silently fails
    (battle_count stays 0; territory turnover via Conquest stops). Muster/Govern/faction-unique
    paths unaffected. SCOPE: surgical fix only — override Subunit (and Unit if needed)
    __eq__/__hash__ to use identity, OR add eq=False to the target_atom dataclass
    field, OR change assign_targets to store an index/handle instead of a direct Subunit
    reference. Validate via mc_v18.run_batch(10, seed=42) showing battle_count > 0
    AND direct invocation of resolve_mass_battle on a constructed faction pair returning
    a degree result without raising. Steps 2-9 of canon §4 (LETHALITY, flanking, penetration,
    ripple, tiebreakers, phase hooks, internal collision, cleanup) + Step 10 sub-steps
    1-2 (domain_echo, accounting) + faction→unit construction richening — all deferred
    to subsequent handoffs. canon §4.1 PROVISIONAL flex clause applies: bare port
    may flex on call signature if statistical equivalence holds; identity-based __eq__
    does not change observable mass-battle outcomes (target_atom is set-by-reference
    throughout the engine, never compared by value).'

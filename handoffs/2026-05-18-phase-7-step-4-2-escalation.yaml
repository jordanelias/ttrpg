task:
  skill: valoria-orchestrator
  description: 'ESCALATION — Step 4.2 LETHALITY calibration discovered a spec/engine
    mismatch that requires Jordan-side resolution before commit.


    CONTEXT. The Step 4.2 (LETHALITY_SCALE restoration) handoff (2026-05-18-phase-7-step-4-2-lethality)
    was loaded and the patch implemented in working tree (NOT committed):

    - LETHALITY_SCALE constant declared at sim/provincial/massbattle.py

    - Multiplier applied at 3 HP-damage sites: engagement (L915-916), pursuit_damage,
    freed_attacker_damage

    - Float-accumulate per engagement; floor at aggregate return (per-engagement floor
    zeroed out small values)


    PATCH IS CORRECTLY APPLIED. The mismatch is in CALIBRATION.


    SPEC EXPECTATION (§3.1, designs/provincial/mass_battle_integration_v30.md):

    - Initial LETHALITY = 0.10 (v17 baseline)

    - Calibration license: "iterate within 0.05-0.20 if T3 casualty target missed"

    - Target: ~14-16% per-turn casualties at T3 P4/C4/D5/M6 mirror Line vs Line

    - Underlying assumption: v22 inherited v17''s baseline lethality (damage formula
    `(1+Power) - DR ≈ 3-5 per success`) but with 20× HP inflation; multiplier of 0.10
    compensates.


    OBSERVED REALITY (40-run sweep, mirror T3 Line vs Line, P4/C4/D5/M6):

    | LETHALITY | per-turn casualties | resolution turns | winners |

    |-----------|---------------------|------------------|---------|

    | 0.05      | 0.00%               | 8.0 (cap)        | 40 draws |

    | 0.10      | 0.00%               | 8.0 (cap)        | 40 draws |

    | 0.20      | 0.00%               | 8.0 (cap)        | 40 draws |

    | 0.50      | 1.71%               | 8.0 (cap)        | 40 draws |

    | 1.00      | 3.96%               | 6.8              | balanced |

    | 2.00      | 6.86%               | 3.9              | balanced |

    | 3.00      | 10.06%              | 2.6              | balanced |

    | 4.00      | 13.23%              | 2.0              | balanced |

    | **5.50**  | **14.61%**          | **1.8**          | **balanced (A21/B18/D1)**
    |

    | 7.00      | 23.08%              | 1.1              | balanced |


    The entire spec-licensed range (0.05-0.20) produces effectively zero per-turn
    casualties — 27× outside target.


    ROOT CAUSE DIAGNOSIS. The v22 engine baseline lethality (no scaling, L=1.0) only
    produces 3.96% per-turn casualties, not the ~80%/tick the spec assumes was carried
    through from v17. The §3.1 author''s mental model of the engine baseline appears
    to be wrong — likely because v19/v20/v21/v22 refactors made damage more conservative
    than the spec assumed. The literal §3.1 formula `LETHALITY × ((1+Power) × net_successes
    - DR × defender_size)` is also NOT the actual code shape: code uses discrete `DAMAGE_BY_DEGREE`
    buckets {Overwhelming: 1+p, Success: p, Partial: 1, Failure: 0} of net_successes,
    not net_successes directly.


    DECISION REQUIRED FROM JORDAN. Two paths:


    (A) Accept LETHALITY_SCALE = 5.5 as the calibrated value.

    - Preserves v22 discrete-degree damage formula exactly.

    - Hits target band cleanly (14.61% per-turn, balanced winners, 1.8 turns to resolution).

    - Documents in commit that 5.5 is 27× outside spec-licensed range and explains
    why (engine baseline drift since v17).

    - Pragmatic; smallest delta to working code.


    (B) Rewrite damage formula to be net_successes-continuous per §3.1 LITERAL.

    - Damage formula becomes: `LETHALITY × ((1+Power) × net_successes - DR × defender_size)`.

    - Drops discrete DAMAGE_BY_DEGREE buckets entirely (or repurposes for narrative
    degree label only).

    - LETHALITY = 0.10 likely lands close to target band under this formula (since
    unscaled net_successes × (1+power) ≈ 4 × 5 = 20 vs current max 5 from Overwhelming
    bucket — 4× hotter, plus DR × defender_size term subtracts more).

    - Closer to spec author intent but larger semantic change. Affects steps 4.3+
    (flanking, penetration, ripple all interact with damage shape).

    - Re-calibration required after rewrite.


    (C) Escalate to spec author for clarification on §3.1 intent.

    - Was the literal formula a careful spec, or shorthand for the existing degree-bucket
    model?

    - What does "v17 baseline" mean if v22 already differs from v17 in damage shape?


    WHAT THIS HANDOFF DOES NOT DO. Does not commit. Working-tree changes to sim/provincial/massbattle.py
    exist locally but are NOT pushed to main. b0185f05 (Phase 7 C2 regression fix)
    remains the live HEAD; LETHALITY work is uncommitted.


    WHAT THIS HANDOFF NEEDS. Jordan picks (A), (B), or (C). Each path has a different
    follow-on handoff.'

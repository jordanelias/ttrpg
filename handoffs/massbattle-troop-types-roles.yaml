  architecture: 'Three-level FM surface: L1 army doctrine (Aggression/Cohesion-priority)
    | L2 unit formation = SHAPE (arrangement only, NO bonus) | L3 subunit ROLE = troop-type-gated
    INSTRUCTION package. Governance triangle: Command orchestrates (adapt strategy
    / interpret events / reinforce Discipline / rally Morale / stratagems / coordination-cap;
    Command = derived Cha-primary + Cog-secondary) -> Discipline holds shape+tactics
    (MIN_DISCIPLINE adopt-gate; formation breaks at 0) -> Morale sustains (rout resource,
    rallied by Command). EMERGENCE PRINCIPLE (load-bearing): formations grant NO flat
    bonuses; all effects emerge from primitives (frontage/Lanchester, depth-damping,
    support, facing, charge-shock, density). SHAPE_OFF/DEF_MOD retired to make this
    structural.'
  methodology: 'Build geometry/instruction -> MEASURE on the gauge -> iterate until
    the historical intent emerges. SHIELD-WALL LESSON this session: a narrow+deep+braced
    SHAPE did NOT make defense emerge (-1pp vs melee; +3pp vs charge only) -> shield-wall
    must be a brace-INSTRUCTION raising density, not a shape. Do not repeat the shape
    approach.'
  calibration_target: (proposed; Jordan to ratify) A braced heavy-infantry shield
    wall should ~hold its ground vs an equal melee line (parity, not -1pp) AND meaningfully
    blunt a cavalry charge (well above the +3pp brace-only). Tune the density primitive
    to this.
  bootstrap: Standard. Engine = tests/sim/mass_battle/ package + shim sim_mb_sigma.py
    + gauge_mb.py. Run committed/isolated with cwd INSIDE the engine dir (sys.path
    shadowing makes import mass_battle resolve to cwd). PER_CELL=1 enables the per-cell
    layer; PYTHONHASHSEED=0 deterministic.

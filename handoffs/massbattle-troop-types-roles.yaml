  - 1. Populate/revise config.TROOP_TYPE_ROLES from the historical troop-type/role
    research (taxonomy + per-type role menus).
  - '2. Add ROLE_SPEC: role -> {shape, instructions}.'
  - '3. Wire the instruction->primitive modulation (BEHAVIOUR-CASCADING, moves gauge
    bands): brace->+density (density primitive B), skirmish->-density, charge->concentration;

# ─────────────────────────────────────────────────────────────────────────
# COLLISION DISAMBIGUATION TABLE
# Abbreviations whose meanings conflict. Never use alone.
# ─────────────────────────────────────────────────────────────────────────

collision_table:
  tc:
    abbreviation: "TC"
    meaning_a: "Theocracy Counter (Church faction clock, 0-100)"
    meaning_b: "Conviction Track (Debate position tracker, 0-10)"
    resolution: "Write full term always."
  cp:
    abbreviation: "CP"
    meaning_a: "Character Point (advancement currency) — CURRENT"
    meaning_b: "Combat Power (renamed to Power — PP-232)"
    resolution: "CP refers to Character Points only. Use 'Power' for unit offensive stat. [ED-136]"
  td:
    abbreviation: "TD"
    meaning_a: "Thread Depth (phantom stat; REMOVED PP-166)"
    meaning_b: "Top-Down (Mermaid flowchart directive)"
    resolution: "Thread Depth does not exist. 'flowchart TD' is valid Mermaid syntax — not a game term."
  comp:
    abbreviation: "COMP"
    meaning_a: "Composure (Debate context)"
    meaning_b: "Computation / Composition (general English)"
    resolution: "Write 'Composure' in game documents."


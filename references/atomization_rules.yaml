version: 1
established: 2026-04-18
philosophy: |
  Rules are deterministic. The atomizer must be able to apply them without
  semantic understanding. If a file requires human judgment to split, it
  needs a custom split_map file, not a new rule type.

defaults:
  compliance_check_on_bootstrap: true
  compliance_check_on_commit: true
  compliance_check_on_close: true
  # NOTE (audit 2026-05-25 — Phase 0 item 0.4):
  # auto_fix_on_violation is HONORED at commit time (pre_commit_gate_mutating
  # calls compliance_check.apply_auto_fixes_to_additions) but OVERRIDDEN to
  # print-only at bootstrap time (valoria_hooks.assert_bootstrap). The bootstrap
  # override landed 2026-05-10 after auto-fix-during-bootstrap produced two
  # destructive commits (a8f7b2f8, 1df4259b) that wiped editorial_ledger_summary
  # by running atomizer on empty content. See architecture <compliance_subsystem>
  # (V2.5+) for full context.
  auto_fix_on_violation: true
  force_skeleton_routing_for_design_docs: true
  skeleton_threshold_tokens: 5000
  archive_chunk_max_tokens: 10000
  unknown_file_warn_tokens: 10000
  max_auto_fix_iterations: 3

# ── Policies are evaluated top to bottom; first match wins ──

policies:

  # ────────────────────────────────────────────────────────────
  # SESSION FILES
  # ────────────────────────────────────────────────────────────
  - match: "session_log_current.md"
    max_tokens: 2000
    on_exceed: "block_commit"
    write_policy: "auto_generated_only"
    note: "Auto-generated pointer to session_logs/index.md. Direct writes blocked."

  - match: "session_logs/index.md"
    max_tokens: 2000
    on_exceed: "block_commit"
    write_policy: "managed_only"
    managed_by: ["start_session_log", "close_session_log"]
    note: "Auto-generated active session list. Only written by session lifecycle functions."

  - match: "session_logs/*.md"
    exclude_match: ["session_logs/index.md"]
    max_tokens: 2000
    on_exceed: "block_commit"
    write_policy: "single_writer"
    note: "Per-session log files. Single writer per file (owning session only)."
    on_close: "archive_to"
    archive_target_pattern: "archives/session/session_log_{scope}_{date}_{token}.md"

  - match: "archives/session/session_log_archive.md"
    max_tokens: 50000
    on_exceed: "chunk_by_quarter"
    chunk_pattern: "archives/session/session_log_archive_{year}_q{quarter}.md"
    index_file: "archives/session/session_log_archive_index.md"

  # ────────────────────────────────────────────────────────────
  # REGISTERS — patches
  # ────────────────────────────────────────────────────────────
  - match: "canon/patch_register_active.yaml"
    max_tokens: 15000
    auto_archive_status: [applied, struck, superseded]
    archive_target_pattern: "canon/patch_register_archive_{range}.yaml"
    archive_chunk_max: 10000
    archive_chunk_by: pp_range
    index_file: "canon/patch_register_index.md"
    index_max_tokens: 3000
    regenerate_index_on: [any_change]

  - match: "canon/patch_register_archive*.yaml"
    max_tokens: 10000
    on_exceed: "error"
    read_restriction: "index_first"

  - match: "canon/patch_register_index.md"
    max_tokens: 6000
    note: "Full-history index across all archives (199+ entries). Raised from 3000 after fixing index_gen to parse all archive formats."
    split_active_only: true
    regenerate_from: "canon/patch_register_active.yaml"

  # ────────────────────────────────────────────────────────────
  # REGISTERS — editorial ledger
  # ────────────────────────────────────────────────────────────
  # Editorial ledger fully migrated to canon/editorial_ledger.jsonl (JSONL
  # migration 5c07bff0; reader cutover 6a42b1f1). The YAML ledger and all 10
  # editorial_ledger_archive*.yaml files were deprecated 2026-05-28 to
  # deprecated/canon/ — no active editorial YAML register remains to atomize.
  # The JSONL store is integrity-checked at commit by validate_ledger_jsonl.

  # ────────────────────────────────────────────────────────────
  # REGISTERS — coverage matrix
  # ────────────────────────────────────────────────────────────
  - match: "tests/coverage_matrix.md"
    max_tokens: 8000
    on_exceed: "flag_for_manual_archive"
    note: "Markdown narrative file; auto-archive-by-status doesn't apply (no per-entry status field). When threshold reached, manually move closed-finding paragraphs to tests/coverage_matrix_archive_<date>.md and reset."

  # ────────────────────────────────────────────────────────────
  # PARAMS FILES — atomized by domain
  # ────────────────────────────────────────────────────────────
  - match: "params/board_game.md"
    max_tokens: 5000
    split_strategy: custom_map
    split_map: "references/splits/params_board_game_split.yaml"
    index_replaces_canonical: true

  - match: "params/threadwork.md"
    max_tokens: 5000
    split_strategy: canonical_vs_superseded
    superseded_marker: "SUPERSEDED SECTIONS"
    superseded_target: "params/threadwork_superseded.md"
    superseded_max_tokens: 15000

  - match: "params/factions.md"
    max_tokens: 5000
    split_strategy: by_level_2_heading
    split_cap_per_file: 5000
    target_pattern: "params/factions/{slug}.md"
    index_replaces_canonical: true

  # Superseded params: frozen for reference. Never shrinks.
  - match: "params/threadwork_superseded.md"
    on_exceed: "skip"
    note: "Superseded by params/threadwork.md. Frozen for reference only."

  - match: "params/*.md"
    max_tokens: 10000
    on_exceed: "flag_for_split"
    require_rule_above_threshold: true

  # ────────────────────────────────────────────────────────────
  # ARC REGISTER
  # ────────────────────────────────────────────────────────────
  - match: "references/arc_register.md"
    max_tokens: 5000
    split_strategy: by_vector_category
    split_cap_per_file: 10000
    target_pattern: "references/arcs/arc_register_{category}.md"
    index_replaces_canonical: true
    categories:
      - name: clocks
        matches: ["I — Clock Vectors"]
      - name: threads
        matches: ["II — Thread Vectors"]
      - name: factions
        matches: ["III — Faction Vectors"]
      - name: territory
        matches: ["IV — Territory Vectors"]
      - name: events
        matches: ["V — BG Conviction Events", "VI — Convergence Markers"]

  # ────────────────────────────────────────────────────────────
  # PROPAGATION MAP
  # ────────────────────────────────────────────────────────────
  - match: "references/propagation_map.md"
    max_tokens: 5000
    split_strategy: tables_vs_log
    log_split_marker: "BROKEN DEPENDENCIES"
    log_target: "references/propagation_log.md"
    log_max_tokens: 10000
    log_chunk_pattern: "references/propagation_log_{year}_q{quarter}.md"
    regenerate_log_index_on: [any_change]

  # ────────────────────────────────────────────────────────────
  # DESIGN DOCS — skeleton required above threshold
  # ────────────────────────────────────────────────────────────
  - match: "designs/**/*.md"
    exclude_suffix: ["_skeleton.md", "_infill.md"]
    require_skeleton_above: 5000
    skeleton_pattern: "{basename}_skeleton.md"
    infill_pattern: "{basename}_infill.md"
    on_read: "skeleton_first"
    skeleton_must_update_on: [any_canonical_change]

  # ────────────────────────────────────────────────────────────
  # REFERENCE INDEXES — must stay compact
  # ────────────────────────────────────────────────────────────
  - match: "references/file_index.md"
    max_tokens: 8000
    summary_file: "references/file_index_summary.md"
    summary_max_tokens: 1000

  - match: "references/design_registry.yaml"
    max_tokens: 8000

  - match: "references/canonical_sources.yaml"
    max_tokens: 12000
    note: "Raised 5000 -> 8000 -> 9000 (2026-05-18) -> 12000 (2026-06-12, aligned with TOKEN_THRESHOLDS + arch interim cap 633f5e57). 115 canonical_sha fields added by freshness_gate --update pushed file to 8086 tokens; threshold predated SHA metadata."


  # ────────────────────────────────────────────────────────────
  # FROZEN / HISTORICAL CONTENT — explicit exemptions from catch-all
  # ────────────────────────────────────────────────────────────

  # Deprecated: frozen forever. No archival, no split. Large files are expected.
  - match: "deprecated/**"
    on_exceed: "skip"
    note: "Frozen historical content. Size is expected and non-actionable."

  # Archives: frozen historical. May exceed chunk limits legitimately.
  - match: "archives/**"
    max_tokens: 100000
    on_exceed: "warn_only"
    note: "Historical archive content. Warn but do not block."

  # Atoms-pending staging area: large manifests and queued docs are expected.
  - match: "references/atoms_pending/**"
    on_exceed: "skip"
    note: "Staging area for atomization work. Not a governed register."

  # Superseded params: frozen historical. Never shrinks.
  - match: "params/threadwork_superseded.md"
    on_exceed: "skip"
    note: "Superseded by params/threadwork.md. Frozen for reference only."

  # Auto-generated values registry: grows with corpus. Not splittable by status.
  - match: "references/values_master.yaml"
    max_tokens: 50000
    on_exceed: "warn_only"
    note: "Auto-generated by tools/extract_values.py. Expected to be large."

  # Auto-generated bounds report: large by design.
  - match: "references/numeric_bounds_report.yaml"
    max_tokens: 25000
    on_exceed: "warn_only"
    note: "Auto-generated numeric bounds analysis. Large by design."

  # Reference data: large but stable.
  - match: "references/npc_registry.yaml"
    max_tokens: 15000
    on_exceed: "warn_only"
    note: "NPC registry grows with NPCs; triage when approaching 15k."

  - match: "references/proper_noun_triage_round2.yaml"
    max_tokens: 15000
    on_exceed: "warn_only"

  - match: "references/collation_report_summary.yaml"
    max_tokens: 15000
    on_exceed: "warn_only"

  # Mechanical terms index: large diagnostic proposal, actively being structured.
  # T6 target — extract synonym/collision/deprecated as yaml; then this shrinks.
  - match: "references/mechanical_terms_index.md"
    max_tokens: 40000
    on_exceed: "warn_only"
    note: "Pending T6 structural extraction. Size expected until T6 complete."

  # Foundational canon: not splittable. Philosophically complete by design.
  - match: "canon/00_philosophical_foundations.md"
    max_tokens: 20000
    on_exceed: "warn_only"
    note: "Foundational canon; content is load-bearing, not compressible."

  # Historical test sim outputs: archived run data, frozen.
  - match: "tests/sim/sim_*.md"
    on_exceed: "skip"
    note: "Historical sim-run outputs. Frozen; not actionable."

  - match: "tests/sim/sim_batch_*.md"
    on_exceed: "skip"

  # Archived stress test output
  - match: "tests/stress/*.md"
    on_exceed: "skip"
    note: "Stress test historical output. Frozen."

  - match: "tests/emergent_arc_*.md"
    on_exceed: "skip"

  - match: "tests/coverage_matrix_archive*.md"
    max_tokens: 50000
    on_exceed: "warn_only"
    note: "Archive of coverage matrix findings. Grows over time."

  # Skill support files: read-only reference docs for prose-writer skill.
  - match: "skills/prose-writer/references/*.md"
    max_tokens: 25000
    on_exceed: "warn_only"
    note: "Prose-writer skill support files. Large by design (technique libraries)."


  # Simulation framework workplans + resolution docs: large planning artifacts.
  # Comprehensive workplans enumerating every mechanical system legitimately exceed
  # the 15k catch-all (V1.1 workplan is ~25k tokens). Splitting would fragment the
  # single source of truth for stress planning.
  - match: "tests/sim_framework/*.md"
    max_tokens: 30000
    on_exceed: "warn_only"
    note: "Workplan + resolution docs. Large by design (comprehensive system enumeration)."

  # ────────────────────────────────────────────────────────────
  # RESEARCH NOTES + SIM ACTIVITY LOGS — reference/historical, not governed registers
  # (added 2026-05-31, Lane B item 5.6; precedent: deprecated/** · archives/** · tests/sim/sim_*.md skip-policies)
  # ────────────────────────────────────────────────────────────
  - match: "research/**"
    on_exceed: "skip"
    note: "Historical/HEMA research notes feeding design. Long-form reference prose, not a splittable register."

  - match: "tests/sim/**/session_activity_log.md"
    on_exceed: "skip"
    note: "Per-run sim activity logs. Frozen historical output (same class as tests/sim/sim_*.md)."

  # ────────────────────────────────────────────────────────────
  # CATCH-ALL — flag any unrecognized file above safe size
  # ────────────────────────────────────────────────────────────
  - match: "**/*.md"
    max_tokens: 15000
    on_exceed: "flag_unknown_pattern"

  - match: "**/*.yaml"
    max_tokens: 10000
    on_exceed: "flag_unknown_pattern"

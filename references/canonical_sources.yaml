## HOW SKILLS USE THIS FILE

**Simulator / Mechanic-Audit Read Protocol:**
1. Read canonical_sources.yaml (this file)
2. For the system under test, find `canonical:` field
3. Load `params:` file first (most efficient — extracted values)
4. If a value is missing from params: check `canonical:` document directly
5. NEVER use a document listed as `compilation_current: false` — use the design doc

**Canon-guard Read Protocol:**
1. Load `canon/02_canon_constraints.md` (P-01 to P-15)
2. For the mechanic under test, find its system in canonical_sources.yaml
3. Load params file for mechanical values
4. Check against each applicable constraint

**Compiler Read Protocol:**
1. For each system to compile, check canonical_sources.yaml
2. If `compilation_current: true` — the compilation stage is already the canonical source; verify no patches have been applied to design docs since last compile
3. If `compilation_current: false` — the design doc is more current; compile FROM the design doc INTO the compilation stage

---

## UPDATE PROTOCOL (auto-maintained)

When any design doc or compilation stage changes:
1. Update `compilation_current:` field for that system
2. Update `canonical:` if the source changes
3. Update `note:` with what changed and when
4. Include this file in the same atomic commit as the changed document

This file is included in the propagation_map.md as a dependency of EVERY system.

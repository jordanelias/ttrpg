# ── Level 3-4 (in-session hooks, mostly pre_commit_gate) ─────────────────────
# These fire in-session via valoria_hooks.py before commit. CI mirrors
# (Level 5) should run equivalent post-push.

in_session_hooks:

  - hook: assert_bootstrap
    level: 4
    role: "Confirms github_ops fetched this session — no commit possible without bootstrap."

  - hook: task_gate
    level: 4
    role: "Required-fetch enforcement per task type (audit, simulation, propose_mechanic, etc.)."
    notes: "Reads TASK_REQUIRED_FILES literal. Promote to yaml registry deferred — see open_items in architecture spec."

  - hook: editorial_gate
    level: 4
    role: "Editorial path markers (mirrors ci_editorial_checker.py)."
    paired_ci: tools/ci_editorial_checker.py

  - hook: forbidden_token_gate
    level: 4
    role: "PI core_rules canonical-name enforcement (Solmund, never Galbados). The live gate is tools/ci_naming_check.py (+ the edit-time tools/hook_naming_guard.py); the GitHub-API-only predecessor this row originally pointed at, prose-writer/scripts/consistency_check.py, was never wired into any hook or CI job and was retired to deprecated/skills/prose-writer/scripts/ (2026-07-09)."

  - hook: abbreviation_registry_gate
    level: 4
    role: "One-owner-per-abbreviation enforcement. Consumes references/name_collision_database.yaml; fires on definitional 'Name (ACR)' patterns; halts on enforced owner-violations + deprecated abbreviations, soft-warns on status:recorded / unregistered."
    paired_ci: ""    # was tools/valoria_collator.py — never actually wired into any hook or CI job (confirmed 2026-07-09); the tool retired to deprecated/tools/. This hook's enforcement remains a documented-but-unbuilt gap, not a live pairing.
    notes: "Added 2026-06-04. Closes the gap where name_collision_database.yaml declared itself hook-checkable but no hook consumed it. Collisions CI/Crown-Index, IP/Imperial-Pressure, PT/Piety-Territory+Parliamentary-Transfer registered status:recorded pending Jordan rename ruling."

  - hook: vetting_gate
    level: 4
    role: "Class A/B patches require vetting block (PP-674)."

  - hook: commit_message_gate
    level: 4
    role: "[scope] description format enforcement."

  - hook: supersession_check
    level: 4
    role: "Warn (non-blocking) if commit touches files in registers/supersession_register.yaml files_to_recheck list."

  - hook: assert_unique_ids
    level: 4
    role: "Prevent ED-NNN / PP-NNN collisions in ledger/register files."

  - hook: pre_commit_gate
    level: 4
    role: "Aggregate gate. Runs editorial_gate, size, co-file rules, forbidden_token, unique_id, vetting, supersession."
    paired_ci: tools/ci_co_file_checker.py
    notes: "The umbrella in-session check. CI mirror (ci_co_file_checker) covers the co-file subset."

  - hook: propose_mechanic_gate
    level: 4
    role: "task_gate('propose_mechanic') variant requiring system-specific canonical doc fetch."

  - hook: memory_contamination_guard
    level: 4
    role: "Prevents writing remembered values where canonical fetch is required."

  - hook: audit_gate
    level: 4
    role: "task description audit-keyword detection requires audit-task fetches."

  - hook: assert_index_before_full_read
    level: 4
    role: "Skeleton-first enforcement on canonical doc reads."

  - hook: safe_commit
    level: 4
    role: "Single valid path to atomic_commit. Runs all gates."
    paired_ci: ""

  - hook: sim_gate
    level: 4
    role: "Multi-system simulation requires module_manifest.md fetch + verification ledger."

  - hook: sim_fabrication_check
    level: 4
    role: "Catches uncited mechanical constants in tests/sim/ files."

  - hook: write_checkpoint / close_checkpoint / read_active_checkpoint
    level: 4
    role: "Session-checkpoint state machine for resumability."

  - hook: context_gate
    level: 4
    role: "Token-budget tracking; soft (60%), checkpoint (75%), hard (90%) thresholds."

# ── Level 1-2 (text/skill, supervisory only) ─────────────────────────────────
# Listed for completeness; promotion to Level 4 is the long-term direction.

advisory_only:

  - locus: PI core_rules
    level: 1
    role: "GitHub > memory; investigate don't guess; bootstrap before game-state work."
    notes: "Largely backed by Level 4 hooks; the text reminders are belt-and-braces."

  - locus: skill descriptions (valoria-mechanic-audit, valoria-simulator)
    level: 2
    role: "Mode/workflow guidance."


# Valoria CI / Compliance / Verifier Checks — Registry
#
# Single source of truth for what tools/ scripts exist, what they enforce,
# whether they have a paired in-session hook, and what level of enforcement
# they sit at on the architecture spec's enforcement_spectrum.
#
# Architecture spec V2.2 explicitly names "code and text drifting apart is its
# own defect." This file mechanizes that discipline for the CI/compliance class.
#
# Levels (from project-architecture-valoria-v2_2.md):
#   1 — text rule in PI (low reliability)
#   2 — skill description (medium)
#   3 — pre-commit grep / heuristic check (high)
#   4 — code hook with RuntimeError in valoria_hooks.py (highest, in-session)
#   5 — CI external check via GitHub Actions (highest, post-push, mirror)
#
# Field definitions:
#   path             — script path
#   level            — enforcement level (3, 4, or 5)
#   role             — what defect class it catches
#   paired_hook      — corresponding in-session hook function in valoria_hooks.py
#                      (empty string if standalone)
#   ci_job           — name of the GitHub Actions job that invokes it (empty
#                      if not wired in CI yet)
#   notes            — anything important
#
# Drift discipline: when a hook changes, this registry must update in the same
# commit if the hook is registered here. CI mirror should add a check that
# every paired_hook listed here actually exists in valoria_hooks.py.

version: 1
generated: 2026-07-11
# Full regeneration (2026-07-11, ED-IN-0031, Valoria Audit Ecosystem plan Phase 2 item 11):
# the previous 2026-05-10 snapshot listed only 8 of the ~22 checker-shaped tools/*.py scripts
# and only 5 of the workflow's then-19 non-aggregator jobs. Regenerated against the working
# tree post-Phase-2 (25 jobs total incl. ci-summary; 22 tools/*.py invocations across them).
# See tools/broken_dependency_checker.py::check_ci_registry_coverage() for the mechanical
# verifier that now keeps this honest going forward (wired into the `integrity` CI job).
ci_workflow: .github/workflows/valoria-ci.yml

# ── Level 5 (CI external) ────────────────────────────────────────────────────
# These run on every push to main / PR. Cannot be bypassed by Claude.
ci_checks:


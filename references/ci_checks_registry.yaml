# Valoria CI / Compliance / Verifier Checks — Registry
#
# Single source of truth for what tools/ scripts exist, what they enforce,
# whether they have a paired in-session hook, and what level of enforcement
# they sit at on the architecture spec's enforcement_spectrum.
#
# Architecture spec V2.2 explicitly names "code and text drifting apart is its
# own defect." This file mechanizes that discipline for the CI/compliance class.
#
# Levels (from project-architecture-valoria-v2_2.md):
#   1 — text rule in PI (low reliability)
#   2 — skill description (medium)
#   3 — pre-commit grep / heuristic check (high)
#   4 — code hook with RuntimeError in valoria_hooks.py (highest, in-session)
#   5 — CI external check via GitHub Actions (highest, post-push, mirror)
#
# Field definitions:
#   path             — script path
#   level            — enforcement level (3, 4, or 5)
#   role             — what defect class it catches
#   paired_hook      — corresponding in-session hook function in valoria_hooks.py
#                      (empty string if standalone)
#   ci_job           — name of the GitHub Actions job that invokes it (empty
#                      if not wired in CI yet)
#   notes            — anything important
#
# Drift discipline: when a hook changes, this registry must update in the same
# commit if the hook is registered here. CI mirror should add a check that
# every paired_hook listed here actually exists in valoria_hooks.py.

version: 1
generated: 2026-05-10
ci_workflow: .github/workflows/valoria-ci.yml

# ── Level 5 (CI external) ────────────────────────────────────────────────────
# These run on every push to main / PR. Cannot be bypassed by Claude.
ci_checks:

  - path: tools/ci_register_size_check.py
    level: 5
    role: "Token-threshold enforcement on governed files (session log, ledgers, registers, canonical_sources)."
    paired_hook: ""    # in-session size checks live inside pre_commit_gate sub-rules
    ci_job: register-sizes
    notes: "External enforcement gate; runs outside Claude."

  - path: tools/ci_hooks_verifier.py
    level: 5
    role: "Enforcement architecture intact: hooks wired, orchestrator imports them, skills don't bypass safe_commit, skeleton limits."
    paired_hook: ""    # this IS the verifier of paired hooks
    ci_job: hooks-verifier
    notes: "Meta-check. Drift here means the whole hook system has been bypassed."

  - path: tools/ci_co_file_checker.py
    level: 5
    role: "Co-file requirements (design→canonical_sources, patch→propagation_map, sim→coverage_matrix, SKILL.md→skill_registry)."
    paired_hook: pre_commit_gate     # in-session co-file rules live inline in pre_commit_gate
    ci_job: co-file-check
    notes: "Mirrors in-session co-file rules. Both must pass."

  - path: tools/ci_editorial_checker.py
    level: 5
    role: "Editorial paths (designs/npcs/, designs/world/, designs/arcs/gm_ref/, canon/03_*) carry [EDITORIAL] or [PROVISIONAL] markers."
    paired_hook: editorial_gate
    ci_job: editorial-check
    notes: ""

  - path: tools/broken_dependency_checker.py
    level: 5
    role: "References to nonexistent files in propagation_map / canonical_sources."
    paired_hook: ""
    ci_job: integrity     # part of the integrity job
    notes: ""

  - path: tools/patch_propagation_checker.py
    level: 5
    role: "Patches in patch_register are reflected in target params file headers."
    paired_hook: ""
    ci_job: integrity
    notes: ""

  - path: tools/freshness_gate.py
    level: 5
    role: "params/canonical SHA drift detection — compares live HEAD SHA of canonical doc against recorded SHA in canonical_sources.yaml."
    paired_hook: ""
    ci_job: integrity
    notes: "Bootstrap currently calls but the function get_live_sha is absent in active session; warning emitted, non-blocking."

  - path: tools/canon_coverage_check.py
    level: 5
    role: "Bidirectional Status:CANONICAL ↔ canonical_sources.yaml verification."
    paired_hook: ""
    ci_job: ""    # not yet wired into CI — Jordan to decide on inclusion
    notes: "Added 2026-05-10. Initial state: 41 unregistered-with-header, 32 registered-no-header. CLI --strict for CI exit code."

# ── Level 3-4 (in-session hooks, mostly pre_commit_gate) ─────────────────────
# These fire in-session via valoria_hooks.py before commit. CI mirrors
# (Level 5) should run equivalent post-push.

in_session_hooks:

  - hook: assert_bootstrap
    level: 4
    role: "Confirms github_ops fetched this session — no commit possible without bootstrap."

  - hook: task_gate
    level: 4
    role: "Required-fetch enforcement per task type (audit, simulation, propose_mechanic, etc.)."
    notes: "Reads TASK_REQUIRED_FILES literal. Promote to yaml registry deferred — see open_items in architecture spec."

  - hook: editorial_gate
    level: 4
    role: "Editorial path markers (mirrors ci_editorial_checker.py)."
    paired_ci: tools/ci_editorial_checker.py

  - hook: forbidden_token_gate
    level: 4
    role: "PI core_rules canonical-name enforcement (Solmund, never Galbados). Mirrors prose-writer/scripts/consistency_check.py."

  - hook: vetting_gate
    level: 4
    role: "Class A/B patches require vetting block (PP-674)."

  - hook: commit_message_gate
    level: 4
    role: "[scope] description format enforcement."

  - hook: supersession_check
    level: 4
    role: "Warn (non-blocking) if commit touches files in canon/supersession_register.yaml files_to_recheck list."

  - hook: assert_unique_ids
    level: 4
    role: "Prevent ED-NNN / PP-NNN collisions in ledger/register files."

  - hook: pre_commit_gate
    level: 4
    role: "Aggregate gate. Runs editorial_gate, size, co-file rules, forbidden_token, unique_id, vetting, supersession."
    paired_ci: tools/ci_co_file_checker.py
    notes: "The umbrella in-session check. CI mirror (ci_co_file_checker) covers the co-file subset."

  - hook: propose_mechanic_gate
    level: 4
    role: "task_gate('propose_mechanic') variant requiring system-specific canonical doc fetch."

  - hook: memory_contamination_guard
    level: 4
    role: "Prevents writing remembered values where canonical fetch is required."

  - hook: audit_gate
    level: 4
    role: "task description audit-keyword detection requires audit-task fetches."

  - hook: assert_index_before_full_read
    level: 4
    role: "Skeleton-first enforcement on canonical doc reads."

  - hook: safe_commit
    level: 4
    role: "Single valid path to atomic_commit. Runs all gates."
    paired_ci: ""

  - hook: sim_gate
    level: 4
    role: "Multi-system simulation requires module_manifest.md fetch + verification ledger."

  - hook: sim_fabrication_check
    level: 4
    role: "Catches uncited mechanical constants in tests/sim/ files."

  - hook: write_checkpoint / close_checkpoint / read_active_checkpoint
    level: 4
    role: "Session-checkpoint state machine for resumability."

  - hook: context_gate
    level: 4
    role: "Token-budget tracking; soft (60%), checkpoint (75%), hard (90%) thresholds."

# ── Level 1-2 (text/skill, supervisory only) ─────────────────────────────────
# Listed for completeness; promotion to Level 4 is the long-term direction.

advisory_only:

  - locus: PI core_rules
    level: 1
    role: "GitHub > memory; investigate don't guess; bootstrap before game-state work."
    notes: "Largely backed by Level 4 hooks; the text reminders are belt-and-braces."

  - locus: skill descriptions (valoria-mechanic-audit, valoria-simulator)
    level: 2
    role: "Mode/workflow guidance."

# ── Drift-detection notes ────────────────────────────────────────────────────
# - When ci-yml adds or removes a tool invocation, update this file in the same commit.
# - When valoria_hooks.py adds or removes a hook function, update this file.
# - The ci_hooks_verifier should ideally read from this file rather than carry its
#   own list (deferred — current state is two sources, this one and the hardcoded
#   set in ci_hooks_verifier.py; reconcile when ci_hooks_verifier is next touched).

# ── Known issues (not registry coverage gaps; defects waiting for fix) ───────

known_issues:
  - id: ci-import-skeleton_gen
    description: ".github/workflows/valoria-ci.yml syntax-check job runs `py_compile tools/skeleton_gen.py` but that file was renamed to tools/doc_index_gen.py per PP-673. CI may be silently failing this step or skipping it."
    surface: ".github/workflows/valoria-ci.yml syntax-check job"
    proposed_fix: "Replace skeleton_gen.py with doc_index_gen.py in the syntax-check command. One-line CI fix."
    flagged: 2026-05-10

  - id: freshness_gate-get_live_sha-missing
    description: "Bootstrap session-startup tries `freshness_gate.get_live_sha` and warns 'module has no attribute get_live_sha' on every run. Function appears not present in current freshness_gate.py."
    surface: "freshness_gate.py / bootstrap call site"
    proposed_fix: "Add get_live_sha() to freshness_gate.py, or remove the bootstrap call site."
    flagged: 2026-05-10

  - id: compliance-doc_index_gen-missing
    description: "compliance_check.py logs '[COMPLIANCE] Auto-fetch failed: No module named doc_index_gen — skipping' on every bootstrap. doc_index_gen.py exists at tools/, but compliance_check is looking for it as an importable module rather than tool path."
    surface: "compliance_check.py auto-fetch path resolution"
    proposed_fix: "Adjust import path or add tools/ to sys.path before the import attempt."
    flagged: 2026-05-10

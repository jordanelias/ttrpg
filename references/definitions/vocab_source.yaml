      canonical: '**Tabletop Roleplaying Game (TTRPG)**'
      aliases___synonyms: (none)
      source: alias_registry.
    - concept: Hybrid mode (full term)
      canonical: '**Hybrid (HYB)**'
      aliases___synonyms: (none — HYB never standalone)
      source: alias_registry.
    - concept: BG mode
      canonical: '**Board Game (BG)**'
      aliases___synonyms: (none)
      source: alias_registry.

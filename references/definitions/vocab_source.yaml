      canonical: '**Piety Track (PT)**'
      aliases___synonyms: Conviction Track (CT/CV — legacy abbreviation in some docs)
      source: 'ED-644 explicitly confirms: "Conviction (PT) here is the same per-territory stat as Piety
        (PT)." Range is 0–5, NOT 0–10. PT is canonical. **RESOLVED — same track.**'
    - concept: ~~Per-territory Solmund-orthodoxy track~~
      canonical: ~~**Piety Track (PT)** vs **Conviction Track (CV)**~~ — ~~POTENTIAL DUPLICATION~~
      aliases___synonyms: ~~If PT and CV are the same axis at the same scale, one is redundant.~~
      source: '**RESOLVED per ED-644: they ARE the same track. PT is canonical. CV/CT are legacy abbreviations.**'

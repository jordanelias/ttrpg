# VALORIA DESIGN REGISTRY
# Version baseline: v30 (established 2026-04-13)
# Single source of truth for: mode assignment, v30 canonical path,
#   atomization status (skeleton/infill split), and predecessor lineage.
#
# Used by: valoria-orchestrator, valoria-atomizer (planned), valoria-compiler
# Updated atomically on every rename, atomization, or deprecation event.
#
# Atomization status values:
#   not_started  — v30 rename done; no skeleton/infill split yet
#   in_progress  — skeleton extracted; infill file pending
#   complete     — skeleton and infill both exist as separate files
#
# Mode values: TTRPG | HYBRID | BG | ALL | SETTING | WORLDBUILDING | INFRA
# canonical_v30: null = unverified source; v30 rename blocked until design doc created


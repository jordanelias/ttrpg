#
# Used by: valoria-orchestrator, valoria-atomizer (planned), valoria-compiler
# Updated atomically on every rename, atomization, or deprecation event.
#
# Atomization status values:
#   not_started  — v30 rename done; no skeleton/infill split yet
#   in_progress  — skeleton extracted; infill file pending
#   complete     — skeleton and infill both exist as separate files

    Optionally have append_to_register call it when a new ED/PP entry is detected. SHIP WITH a
    tests/hooks/ test (synthetic: two sequential allocations return N then N+1; allocation outside
    a lane's block raises) per architecture <migration_and_growth> "hook ships only after tests

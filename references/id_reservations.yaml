# =====================================================================================
# ED-<LANE>-NNNN LANE-TAGGED NAMESPACE (2026-07-02, ED-IN-0001)
# =====================================================================================
# Motivated by TWO same-session concurrent-allocation collisions on the flat ED-NNNN
# sequence above (ED-1088 collided with mass-battle LC-8, renumbered to 1090; ED-1089/
# 1090 then collided AGAIN with three more mass-battle EDs, renumbered to 1093/1094 —
# see ED-1094's ledger entry for the full incident). The A-E reservation-block scheme
# above only prevents collision through allocation DISCIPLINE (read next_free before
# allocating); two sessions in the same numeric block that both skip that step, or read
# next_free before the other commits, can still collide. A lane tag makes CROSS-LANE
# collision impossible BY CONSTRUCTION — two sessions in different lanes can never
# collide, full stop. Same-lane collisions are still possible (two sessions both doing
# mass-battle work concurrently) but are a much narrower, already-expected case, and
# the existing CollisionError-retry append-safety still applies within a lane.
#
# FORMAT: ED-<LANE>-NNNN, zero-padded to 4 digits (e.g. ED-<LANE>-0001). Citation matching
# (tools/validate_ed_citations.py) normalises padding away, same as the flat format.
#
# MIGRATION: NEW IDS ONLY. The flat ED-NNNN sequence above is FROZEN as of this cutover
# — no new flat allocations — but remains permanently valid; none of the ~1094 existing
# entries are retrofitted. Both formats resolve through the same ledger/citation-audit
# path forever.
#
# ALLOCATION PROTOCOL: identical to the flat protocol at the top of this file, but per
# lane — take lane_ids.lanes.<LANE>.next_free, form the entry, increment next_free,
# co-commit this file. A session should declare which lane(s) its work belongs to (via
# the ED-<LANE> ids it allocates) and keep its commits/PRs scoped to that lane — see
# CLAUDE.md section 3 for the convention. Cross-cutting repo-governance/tooling work
# (like this namespace itself) uses IN.

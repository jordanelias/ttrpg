  ED: 884                          # canon/editorial_ledger.jsonl (max ED referenced)
  PP: 726                          # canon/patch_register_active.yaml (max PP referenced)
  verified_on: "2026-05-31"

reservations:
  A:
    ED: { block: "890-939", next_free: 890 }
    PP: { block: "727-759", next_free: 727 }
    reconciliation_zone_ED: "874-889"   # Lane A ONLY: cleanup of reserved-unfiled 874-882,885 (Track 1.8/1.11)
  B:
    ED: { block: "940-969", next_free: 940 }
    PP: { block: "760-779", next_free: 760 }
  C:
    ED: { block: "970-999", next_free: 970 }
    PP: { block: "780-799", next_free: 780 }

# When all three lanes exhaust their blocks, the integration seam allocates the next
# round of disjoint blocks (extend each by the same stride) and bumps `version`.
exhaustion_policy: "at integration: assign the next disjoint blocks per lane; never overlap a prior block; bump version."

wiring_status:
  file_live: true
  manual_allocation: "ACTIVE — use the ALLOCATION PROTOCOL above."
  auto_allocation: "PARKED"
  auto_allocation_spec: >
    Add g.allocate_id(lane, id_class) to github_ops: read this file, return next_free for

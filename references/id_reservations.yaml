# reserved block below is clear of existing IDs.
#
# ALLOCATION PROTOCOL (manual, until auto-allocation lands — see wiring_status):
#   1. To allocate, take `next_free` for your lane + id_class.
#   2. Form your ledger/register entry with that ID.
#   3. Increment `next_free` and co-commit this file with your entry. Lane B owns this file;
#      other lanes either (a) note the bump in their handoff for Lane B, or (b) interim:
#      bump it themselves within their reserved range and let CollisionError-retry serialize.
#   Reserved blocks are disjoint, so step-3 races are append-safe (retryable, never a real clash).
# =====================================================================================

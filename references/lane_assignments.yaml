# references/lane_assignments.yaml
# =====================================================================================
# THREE-LANE OPERATING MODEL — write-disjoint concurrent sessions.
# Source of truth a cold "proceed lane X" session reads. Built bottom-up from the
# Valoria Master Workplan v2 (2026-05-31) "Three-Lane Operating Model"; lane-disjointness
# and reserved ranges verified against live repo state this session (ED max 884, PP max 726).
#
# A session DECLARES its lane via:  env VALORIA_LANE=<A|B|C>   OR   file /home/claude/.valoria_lane
# The bootstrap Status Block then prints that lane's line (github_ops.report_lane).
#
# ⚠️ RETIRED-MACHINERY NOTE (2026-07-01, ED-1084): the handoffs/*.yaml + session_logs/
# per-lane continuity machinery referenced below was retired with the orchestrator (LB-22)
# and relocated to deprecated/session_machinery/. Lane OWNS-globs and reserved-ID ranges
# here remain live; launch_protocol steps that mention github_ops/g.* or handoffs/*.yaml
# are historical.
#
# ⚠️ NAMING COLLISION WARNING (2026-07-02): this file's "Lane A/B/C" (write-disjoint
# session concurrency lanes, defined below) is a DIFFERENT, OLDER concept from the
# ED-<LANE>-NNNN editorial namespace's 9 lanes (MB/PC/FI/SC/FA/WR/IN/GO/SE — CLAUDE.md
# §3, ED-IN-0001). Do not conflate them. HANDOFF.md is no longer the only live continuity
# surface: per-lane files now live at handoffs/HANDOFF_<LANE>.md (2026-07-02, using the
# ED-<LANE>-NNNN taxonomy, NOT this file's A/B/C), with root HANDOFF.md as a thin index.
# See HANDOFF.md's own header for the current structure.
#
# This file is the enabler (workplan 5.11). Companion: references/id_reservations.yaml (5.10).
# =====================================================================================
version: 1
updated: "2026-07-05"
source: "designs/workplans/valoria_master_workplan_v6.md — §4 lane workstreams + §6 governance (lineage: v5 2026-06-28 -> v4 2026-06-11 -> v3 2026-06-10 -> workplan_v2 2026-05-31 item 5.11; owns-globs unchanged; the old A/B/C lane framing is generalized by the ED-<LANE>-NNNN session lane-scoping, CLAUDE.md §4)"
# ID ALLOCATION (2026-07-05 note superseding the v5 §0a exhaustion warning): the flat ED
# sequence is FROZEN (ED-IN-0001 cutover 2026-07-02); all new EDs allocate per-lane from
# references/id_reservations.yaml `lane_ids` (read next_free, bump, co-commit). The old
# shared-block exhaustion problem is structurally moot. roadmap_state.yaml (referenced in a
# concurrency rule below) was RETIRED 2026-07-05 to deprecated/references/ (ED-IN-0006).

boundary_rule: >
  A lane NEVER writes outside its owns: set. Need another lane's file changed? Read its
  committed state and note the request in your handoff for that lane — do not reach across.
  Allocate ED/PP IDs ONLY from your reserved block (references/id_reservations.yaml).
  On commit: catch CollisionError -> re-fetch touched paths -> re-apply -> retry.
  Never collision_check=False (that is the --no-verify anti-pattern). A genuine hook
  RuntimeError still hard-halts: report verbatim, stop.

launch_protocol:           # what "bootstrap; proceed lane X" expands to, autonomously
  - "1. bootstrap the lane scope (A -> editorial/design, B -> infrastructure, C -> simulation/godot); declare lane (VALORIA_LANE or marker file)."
  - "2. read references/lane_assignments.yaml -> your owns globs, reserved ID range, ordered entry items."
  - "3. open/refresh your lane handoff handoffs/lane-<X>-<date>.yaml declaring those owns globs."
  - "4. run g.check_handoff_conflicts(owns) -> MUST be empty. If not, lanes overlap: stop and report, do not write."
  - "5. work entry items in priority order, staying inside owns; allocate IDs only from your reserved block."
  - "6. commit via safe_commit; on CollisionError re-fetch + re-apply + retry."
  - "7. park any Jordan-gated item (note in handoff); continue with the next ungated item — do not stall the lane."
  - "8. at close: update your handoff (progress + parked items); session log too if 5.7 is revived."

lanes:
  A:
    name: "Canon / Editorial / Design-content"
    bootstrap_scope: ["editorial", "design"]
    owns:                         # write-exclusive globs (fnmatch; '*' spans '/')
      - "canon/**"                # incl. registers/editorial_ledger.jsonl + patch_register_active.yaml; the ledger is APPEND-SHARED per shared_files (canon/** = structural authority, not an append lock)
      - "params/**"
      - "designs/provincial/**"
      - "designs/world/**"
      - "designs/personal/**"
      - "designs/scene/**"          # [2026-06-12 Jordan] scene -> Lane A (sole design-content lane; owns all sibling designs/ globs). Resolves OWNS-GAP: social_contest/combat_engine_v1/conviction_track/derived_stats/miraculous_event/investigation_systems/fieldwork were unowned. Fieldwork to move into designs/scene/fieldwork/ (separate Lane-A op).
      - "designs/proposals/**"
      - "references/propagation_map.md"
    reserved_ed: "890-939"
    reserved_pp: "727-759"
    reconciliation_zone_ed: "874-889"   # Lane A ONLY — Track 1.8/1.11 cleanup of reserved-unfiled 874-882,885
    entry_items: ["LA-1", "LA-5", "LA-2", "LA-3", "LA-4", "LA-6", "LA-8", "LA-9", "LA-10", "LA-7"]   # v4 §4; gates per v4 §3 docket
    notes: >
      Structural ledger ops (re-issue register, strike, supersede, dedup — items 1.2/1.7/1.13)
      are Lane A ONLY, so two lanes never rewrite the same existing ledger rows.
      editorial_ledger.jsonl is append-only; each lane appends only within its reserved ED range.
    launch_ready: true
    launch_blocker_resolved: >
      [RESOLVED 2026-06-09] check_handoff_conflicts(Lane A owns) returns NONE this session.
      The named overlap handoffs (2026-05-29-resolution-diagnostic-faction-ratifications;
      combat-armature) were archived by the 2026-06-09 consolidation master, so Track 1.1 is
      satisfied. Lane A is launch-ready.
  B:
    name: "Infrastructure / Tooling / Governance"
    bootstrap_scope: ["infrastructure"]
    owns:
      - "deprecated/skills/valoria-orchestrator/scripts/**"   # retired harness — moved to deprecated/ (LB-22)
      - "references/**"                 # EXCEPT the shared_files below (canonical_sources / canonical_freshness)
      - "tests/hooks/**"
      - "tests/index/**"
      - "session_logs/**"
      - "tools/**"
      - "archives/**"
      - "deprecated/skills/valoria-orchestrator/references/skill_registry.yaml"   # retired harness — moved to deprecated/ (LB-22)
    shared_not_exclusive:             # under references/** but co-owned — see shared_files
      - "references/canonical_sources.yaml"
      - "references/canonical_freshness.yaml"
    reserved_ed: "940-969"
    reserved_pp: "760-779"
    entry_items: ["LB-1", "LB-2", "LB-3", "LB-4", "LB-5", "LB-6", "LB-7", "LB-8", "LB-9", "LB-10", "LB-11", "LB-12", "LB-13", "LB-14", "LB-15", "LB-16", "LB-17", "LB-18"]   # v4 §5; sequencing/gates per v4 §9
    solo_items: ["LB-6"]              # structural rewrites of shared infra — run OUTSIDE the parallel window (former 5.3 SHA-split; former 5.1A SQLite-wire shipped as the enshrined SQL index pipeline, architecture V2.5)
    notes: >
      PI / architecture text edits are Jordan-applied: propose, do not self-commit.
      5.7 (session-log revive) optional — handoffs already give disjointness + visibility.
      5.1A (SQLite wire) and 5.3 (canonical_sources SHA-split) are full-file restructures of
      shared infra: sequence solo (before/after the parallel phase), never during it.
    launch_ready: true

  C:
    name: "Simulation / Implementation"
    bootstrap_scope: ["simulation", "godot"]
    owns:
      - "sim/**"
      - "tests/sim/**"
      - "tests/coverage_matrix.md"
      - "valoria-game/**"             # SEPARATE REPO — fully disjoint from A/B
      - "tests/sim/HANDOFF_*"
    reserved_ed: "970-999"
    reserved_pp: "780-799"
    entry_items: ["LC-0a", "LC-1", "LC-3", "LC-4", "LC-5"]   # v4 §6; governing spec = godot_conversion_strategy_v1
    canon_gated: ["LC-0b", "LC-7", "LC-8"]   # unblock on v4 docket J-2 / J-11 / J-9+J-10
    notes: >
      valoria-game is a separate repo, so Lane C implementation work is collision-free with A/B.
    launch_ready: true

shared_files:                         # the unavoidable cross-lane writes — handle by discipline, not ownership
  - path: "registers/editorial_ledger.jsonl"
    rule: >
      APPEND-ONLY; each lane uses ONLY its reserved ED range -> ID-collision impossible.
      File-level race on near-simultaneous appends resolves via CollisionError -> re-fetch +
      re-append + retry (append is idempotent on re-fetch). STRUCTURAL ops (re-issue register,
      strike, supersede, dedup — items 1.2/1.7/1.13) are Lane A ONLY. (This append-shared rule
      OVERRIDES Lane A's canon/** exclusivity for THIS file: every lane appends its own
      reserved-range IDs; only structural rewrites are Lane-A-gated.)
  - path: "references/canonical_sources.yaml | references/canonical_freshness.yaml"
    rule: >
      NOT cleanly Lane-B-exclusive: the co-file hook (valoria_hooks pre_commit_gate) forces any
      designs/*_v30.md edit to co-commit canonical_sources.yaml with a refreshed SHA. So the
      EDITING lane co-commits its own SHA row; CollisionError-retry on races. Consequences:
      (a) design-doc edits CANNOT batch SHAs at integration — the hook blocks the commit without it;
      (b) Lane B must NOT run the 5.3 SHA-split during the parallel window (a full-file restructure
      while Lane A edits rows = semantic conflict, not a retryable collision).
  - path: "references/roadmap_state.yaml"
    rule: >
      Edited ONLY at lane-session close; structural fields (phase status, decisions) by integration;
      per-lane progress as a note. CollisionError -> retry. Low frequency -> rare collision.
  - path: "handoffs/<id>.yaml"
    rule: >
      One file per lane (distinct id) — concurrent-safe by design. THREE active handoffs is the
      new normal (not a consolidation trigger — see workplan M4). Bootstrap prints all three, so
      each lane sees the others without the session-log registry.
  - path: "co-files (propagation_map / coverage_matrix / skill_registry)"
    rule: >
      Each owned by the SAME lane as its trigger (patches->A, sim->C, skills->B) -> no cross-lane
      co-file write. Exception: a brand-new designs/ doc forces a canonical_sources registration row
      (handled by the canonical_sources rule above).

coordination:
  conflict_check: "g.check_handoff_conflicts(owns) — NOT auto-run; each lane calls it before work."
  id_discipline: "allocate only from your reserved block (id_reservations.yaml); never read-max-and-add."
  cross_lane_dependency: "need another lane's output? read its current committed state and proceed; do not block, do not reach into its owned files."
  sequence_solo: "the two structural rewrites (canonical_sources SHA-split 5.3; SQLite wire 5.1A) run solo — before the round or at an integration pause, never while A/C are committing."
  integration_seam: "rotating or a short 4th pass between rounds: roadmap structural bump; check_handoff_conflicts; ID-range exhaustion check; within-lane handoff consolidation; queued solo rewrites."
  gate_is_read_only: "Jordan's GATE (G1-G12) answers feed all lanes; no lane writes the decision sheet. Each lane has ungated work so none idles on a decision."

launch_prerequisites:
  - "[DONE 2026-05-31] Commit this lane spec where bootstrap surfaces it (item 5.11)."
  - "[DONE 2026-05-31] references/id_reservations.yaml committed (item 5.10 — reserved blocks)."
  - "[OPTIONAL] Revive the session-log/index registry (5.7) for the active-session line; NOT a hard prerequisite (handoffs carry disjointness + visibility)."
  - "[BEFORE LANE A] Run Track 1.1 reconciliation so Lane A's owns no longer overlap the faction handoff."

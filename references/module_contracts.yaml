# Canonical Accounting spine (doc-12 §8 + substrate §4.1). Module accounting_phase
# entries must name a phase id below (checked by A12).
accounting_sequence:
  - phase: season_tick
    does: "engine_clock emits mechanical.season_change"
    source: "key_type_registry (engine_clock)"
  - phase: accounting_boundary
    does: "engine_clock emits mechanical.accounting"
    source: "doc-12 §8"
  - phase: B_concern
    does: "Procedure B: Knowledge Decay -> Concern Generation (memory_query reads Keys) -> Resolution (state.concern_resolved, state.belief_revised, MemoryReferences)"
    source: "doc-12 §8"
  - phase: DA_proposal
    does: "DA Proposal Phase: select_proposal() reads Faction Meta-Armature; execute_proposed_domain_actions() emits da_outcome.*; displacement_neglect_observed -> scene.displacement [unreg]"
    source: "doc-12 §8"
  - phase: C_project
    does: "Procedure C: mechanical.project_advanced [unreg]; state.project_failed [unreg] (stall >= 8); state.project_completed [unreg]"
    source: "doc-12 §8"
  - phase: D_opinion
    does: "Procedure D: state.opinion_revised per drift threshold"
    source: "doc-12 §8"
  - phase: E_offscreen
    does: "Procedure E: scene.interaction (ambient pairs); scene.dialogue (knowledge sharing); scene.gossip (cumulative_drift > 0.5)"
    source: "doc-12 §8"
  - phase: emission_processing
    does: "substrate single-update rule: validate (registry + invariants, causes[] DAG) -> append immutable KEY_LOG -> resolve observers — inline, deterministic"
    source: "key_substrate_v30 §4.1"
  - phase: settlement_accounting
    does: "derived-value-at-0-through-Accounting -> stat -1; Mandate feedback drift ±1; Knot strain decay check"
    source: "settlement §1.3/§1.8; knots §5"

      - {name: "Legitimacy (L) / Popular Support (PS)", bucket: track, writable: true}   # §1.8 LPS-2e per-settlement 0-7 (Jordan ruling 2026-05-30)
      - {name: "province Accord", bucket: derived_value, writable: false}   # §1.3 floor(mean Order across settlements) — F1 guard
    transitions: []
    loops:
      - {with: faction_state, damper: "Mandate↔L/PS: saturating Mandate = 7T/(T+6) (∂Mandate/∂q shrinks as T grows) + mean-reverting feedback drift ±1; Stage-4 sim bounded 0-7 over 30 seasons under mission shocks (settlement_layer_v30 §1.8, Lesson-5 bound)"}
    gates:
      - id: g_ord0
        when: "Order = 0"
        then: "local revolt"
        "on": "Prosperity / Defense / Order"
        source: "settlement_layer_v30 §1.3"
      - id: g_def0
        when: "settlement Defense = 0"
        then: "undefended — auto-capture"
        "on": "Prosperity / Defense / Order"
        source: "settlement_layer_v30 §1.3"
      - id: g_dv0
        when: "derived value = 0 held through Accounting"
        then: "owning stat -1 (same rule as faction stats)"
        "on": "Local Economy / Garrison Strength / Public Order"
        source: "settlement_layer_v30 §1.3"
    derivations:
      - output: "province Accord"
        inputs: ["Order"]
        formula: "floor(mean Order across settlements)"
        bucket: derived_value
        source: "settlement_layer_v30 §1.3"
      - output: "Local Economy"
        inputs: ["Prosperity"]
        formula: "Prosperity × 50"
        source: "settlement_layer_v30 §1.3"
      - output: "Garrison Strength"
        inputs: ["Defense", "Fort Level"]
        formula: "Defense × 20 + Fort × 30"
        source: "settlement_layer_v30 §1.3"
      - output: "Public Order"
        inputs: ["Order"]
        formula: "Order × 20 (riot events below 0)"
        source: "settlement_layer_v30 §1.3"
      - output: "faction Mandate (cross-module → faction_state)"
        inputs: ["Legitimacy", "Popular Support", "W_s"]   # L_s/PS_s canonicalized to set.legitimacy/set.popular_support (ED-IN-0060); W_s is a formula-local intermediate (see formula), not a registry quantity
        formula: "q_s = 0.5L+0.5PS; W_s = base(Type)+Prosperity+FacilityTier; T = Σ W_s·(q_s/7); Mandate = clamp(round(7T/(T+6)),0,7) — saturating (Lesson-5 bound)"
        source: "settlement_layer_v30 §1.8 LPS-2e"
      - output: "Legitimacy / Popular Support"   # Mandate-feedback drift on L/PS (ED-IN-0060: canonicalized from "settlement L/PS (Mandate feedback)")
        inputs: ["faction Mandate"]
        formula: "drift ±1/settlement/season toward Mandate (damped, mean-reverting; Stage-4 sim bounded 30 seasons)"
        source: "settlement_layer_v30 §1.8"
      - output: "faction Treasury income (cross-module → faction_state)"
        inputs: ["Prosperity"]
        formula: "Σ Prosperity across settlements × 10"
        source: "derived_stats §8.1 (quoted in settlement_layer §1.8)"
    accounting_phase: [settlement_accounting]

      - Agility
      - Endurance
      - Presence
      - Cognition
      - Thread Sensitivity  # abbr: TS
      - Thread Pool Score   # abbr: TPS
      - Composure           # attacked by debate but DEFINED here
      - Certainty           # personal axis
      - Health              # = Endurance (personal)
      - Stamina             # = Endurance
      - Recall              # renamed from "Memory (score)" — caps History entries
      - Disposition          # NPC state
      - Attitude Scale
      - Character Points    # abbr: CP
      - Momentum            # combat-derived but character-carried
      - Vitality            # combat HP replacement (ED-548)
      - Focus               # threadwork resource
      - Concentration       # contest resource
      - Background
      - Calling
      - Specialty
      - Faith               # Conviction #1
      - Authority            # Conviction #2
      - Order               # Conviction #3
      - Scholastic          # Conviction #4
      - Utility             # Conviction #5
      - Equity              # Conviction #6
      - Liberty             # Conviction #7
      - Precedent           # Conviction #8
      - Community           # Conviction #9
      - Identity            # Conviction #10
      - Warden              # Conviction #11
      - Virtue              # Conviction #12
      - Honor               # Conviction #13
      - Conviction Scar
      - Key                 # generated from Conviction Scars
      - Memory entry        # per-NPC Key reference (NOT the stat)

  # ─────────────── §2 FACTION ATTRIBUTES ───────────────
  silo_2:
    name: "Faction Attributes"
    description: "What a faction carries on its ledger"
    terms:
      - Mandate             # faction stat
      - Influence           # faction stat
      - Wealth              # faction stat
      - Military            # faction stat
      - Intelligence        # faction stat
      - Stability           # faction stat
      - Legitimacy          # faction stat
      - Public Support      # abbr: PS (freed from collision with Peninsular Strain)
      - Standing            # faction attribute (also Key type — exempt)

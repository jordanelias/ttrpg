# VALORIA — Name Collision Database
# Canonical term registry. Every game term has exactly one silo.
# Every abbreviation has exactly one owner. No duplicates.
#
# ENFORCEMENT: Hook-checkable. New content committing a term from
# the wrong silo, or reusing a deprecated term, should fail pre-commit.
#
# EXEMPT terms (cosmological/substrate layer) may appear across silos.
# All other terms: one silo only.
#
# Last updated: 2026-05-08
# Authority: vocabulary audit + silo cohesion analysis

# ═══════════════════════════════════════════════════════════════
# ABBREVIATION REGISTRY — one abbreviation, one owner, no exceptions
# ═══════════════════════════════════════════════════════════════

abbreviations:
  # Character (§1)
  CP: {term: "Character Points", silo: 1}
  TS: {term: "Thread Sensitivity", silo: 1}
  TPS: {term: "Thread Pool Score", silo: 1}

  # Faction (§2)
  PS: {term: "Public Support", silo: 2}
  M: {term: "Mandate (faction stat)", silo: 2, scope: "table-only"}
  I: {term: "Influence (faction stat)", silo: 2, scope: "table-only"}
  W: {term: "Wealth (faction stat)", silo: 2, scope: "table-only"}
  Mil: {term: "Military (faction stat)", silo: 2, scope: "table-only"}
  Int: {term: "Intelligence (faction stat)", silo: 2, scope: "table-only"}
  Sta: {term: "Stability (faction stat)", silo: 2, scope: "table-only"}
  L: {term: "Legitimacy", silo: 2, scope: "table-only"}

  # Territory (§3)
  PV: {term: "Provincial Value", silo: 3}

  # World/Cosmological (§4 — exempt layer)
  MS: {term: "Mending Stability", silo: 4, exempt: true}
  TT: {term: "Thread Tension", silo: 4, exempt: true}

  # Combat (§5 — all scales)
  DR: {term: "Damage Resistance", silo: 5}
  CE: {term: "Combat Endurance", silo: 5}
  H: {term: "Health per Size (unit)", silo: 5, scope: "table-only"}

  # Contest/Debate (§6)
  # No single-letter or two-letter abbreviations for contest terms

  # Piety & Church Influence (§9)
  PT: {term: "Piety Track", silo: 9}
  CI: {term: "Church Influence", silo: 9}

  # Clocks (§12)
  IP: {term: "Institutional Pressure", silo: 12}
  PI: {term: "Public Instability", silo: 12}

  # Dice Engine (§16A)
  TN: {term: "Target Number", silo: "16A"}
  Ob: {term: "Obstacle", silo: "16A"}
  EV: {term: "Expected Value", silo: "16A"}

  # Authoring (§16B)
  PP: {term: "Patch (design parameter)", silo: "16B"}
  ED: {term: "Editorial Decision", silo: "16B"}
  SIM: {term: "Simulation", silo: "16B"}

# ═══════════════════════════════════════════════════════════════
# SILO TERM REGISTRY — every term, one silo
# ═══════════════════════════════════════════════════════════════

terms:

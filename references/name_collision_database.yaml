# ═══════════════════════════════════════════════════════════════
# VALIDATION RULES
# ═══════════════════════════════════════════════════════════════
#
# 1. ABBREVIATION UNIQUENESS: No two entries in `abbreviations:` may
#    share the same key. This is structurally enforced by YAML (last
#    wins), so the registry must be checked for duplicates on any edit.
#
# 2. TERM UNIQUENESS: No term may appear in two non-exempt silos.
#    Exempt silos (§4, §7, §15) can share terms with each other and
#    with non-exempt silos. All other silos: one term, one silo.
#
# 3. DEPRECATED ENFORCEMENT: Any term in `deprecated:` must not
#    appear in new content (excluding historical/diagnostic references
#    and the censured_vocabulary.yaml registry itself).
#
# 4. NEW TERM PROTOCOL: Before adding a new game term to any doc:
#    a. Search this registry for the term
#    b. If found → use the existing term from its assigned silo
#    c. If not found → assign to exactly one silo, add to registry
#    d. If the term collides with an existing term → rename one
#
# 5. ABBREVIATION PROTOCOL: Before assigning an abbreviation:
#    a. Check abbreviations: for collision
#    b. If taken → choose a different abbreviation or spell out
#    c. Two-letter minimum for prose; single-letter only in tables

# names_index.yaml — UNIFIED NAMES INDEX (the one place a definition's name lives).
#
# WHY: names used to be hardcoded and duplicated across 50+ prose docs, engine/params/, the
# registries, and the tools (ci_naming_check.py even hardcoded the deprecated proper
# noun). descriptor_registry.yaml already promised "a descriptor can be renamed HERE
# without rewriting any consumer" — this index makes that real for ALL named
# definitions, not just descriptors.
#
# HOW IT IS READ (one source, many readers — all via tools/names.py):
#   * tools/ci_naming_check.py   — hard gate; flags any `legacy` name of an `enforce: block` entry.
#   * tools/ci_names_check.py    — report-only drift lint; flags `legacy` names of `enforce: warn` entries.
#   * tools/valoria_rename.py    — the "change once" executor: edit a `canonical` here (or run the
#                                  tool) and every occurrence across docs/params/registries is rewritten.
#   * tools/ci_names_consistency.py — asserts the mirror name fields in descriptor_registry.yaml /
#                                  proper_noun_registry.yaml still match the `canonical` here.
#
# ENTRY SCHEMA:
#   <dotted.key>:
#     canonical: <the ONE display string>
#     aliases:   [<allowed equivalent phrasings — not errors>]
#     legacy:    [<deprecated names that must NOT appear in active docs>]
#     category:  attribute | aggregate | faction_stat | settlement_stat | clock |
#                track | mechanic | mass_combat_stat | substrate | proper_noun |
#                conviction | pressure_point   (new 2026-07-21, Reconciliation R2 / ED-IN-0082)
#     enforce:   block | warn
#                  block = hard CI gate (ci_naming_check) — naming invariants.
#                  warn  = report-only drift lint (ci_names_check) until triaged, then flipped.
#     context:   [<regex terms>]  — OPTIONAL. When the `canonical` display collides with a
#                  common English word (Faith / Order / Reason / …), the disambiguation terms
#                  that must co-occur for a prose hit to count as THIS definition. The single
#                  home for the §3.5 disambiguation gate — vector_audit reads it FROM here
#                  (CLAUDE.md §8), migrated verbatim from the prior hardcoded SEED table so P2
#                  stays byte-identical. Terms are Python regex fragments (word-boundaried).
#
# MIRRORS (consistency-checked by tools/ci_names_consistency.py):
#   attr.* / agg.* / fac.* / set.*  -> references/descriptor_registry.yaml
#   world.* (and other proper nouns) -> references/proper_noun_registry.yaml
# Mechanic/clock/track legacy entries are seeded from references/deprecated_terms_registry.yaml
# and references/synonym_registry.yaml; they drive the drift lint + rename, not a mirror.
#
# MIGRATION: seeded 2026-06-28 (attributes, faction/settlement stats, the proper-noun
# naming invariant, and the clean mechanic renames). 2026-07-01 (ED-1084): the rest of the
# proper-noun corpus folded in below as warn-tier `world.*` entries (generated from
# proper_noun_registry.yaml; ci_names_consistency keeps the pair agreeing). Remaining
# follow-up: flipping `warn -> block` per entry as each is triaged.

# ── NAMESPACE PREFIXES (id ↔ silo table; Reconciliation Program §3.2) ─────────────────
# Every id's first dotted segment is a namespace prefix bound to ONE class/silo. Engine and
# pre-existing ids WIN any conflict; references/name_collision_database.yaml stays the
# historical silo authority. Existing prefixes are kept as-is; NEW prefixes are added only for
# classes that lacked one. Key-family prefixes used in module_contracts (scene. da. env.
# mechanical. …) are the engine's own and are NOT re-homed here.
#   attr.      character attribute            (mirror: descriptor_registry.yaml)   [existing]
#   agg.       attribute aggregate            (mirror: descriptor_registry.yaml)   [existing]
#   fac.       faction stat                   (mirror: descriptor_registry.yaml)   [existing]
#   set.       settlement stat                (mirror: descriptor_registry.yaml)   [existing]
#   world.     proper noun (place/person/org) (mirror: proper_noun_registry.yaml)  [existing]
#   clock.     named clock                                                          [existing]
#   mass.      mass-combat stat                                                     [existing]
#   thread.    threadwork mechanic                                                  [existing]
#   substrate. Key substrate primitive                                             [existing]
#   conv.      character conviction (the 7-axis class)                              [NEW 2026-07-21]
#   ppt.       social-contest pressure point (the 4-axis class)                     [NEW 2026-07-21]
#   mech.      strategic-layer mechanic (Disposition/Standing/Stability/Mandate/…)  [NEW 2026-07-22]
# An entry MAY also carry `token_class: <cls>` (audit vocabulary class) distinct from its naming
# `category` — e.g. a world.* proper_noun tagged `token_class: faction`, or a mech.* tagged
# `token_class: mech` — so the vector-audit CLASSES roster + §3.5 disambiguation live here (§8)
# without disturbing the category/mirror. `scale:` overrides the audit scale when it differs.
# Reserved for the R2 migration wave (authored as entries land, not pre-populated):
#   npc.  named character · place.  location · org.  organisation/order
#   ppl.  people/populace group · concept.  design concept · act.  performable action verb
# ID-form tokens ([[conv.faith]]) are resolved to display by tools/tag_normalizer.py and are
# EXCLUDED from prose matching (A6 / perf).

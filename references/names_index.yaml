  # word. Single-quoted so YAML keeps the regex backslashes literal.
  conv.faith:      {canonical: Faith,      aliases: [], legacy: [], category: conviction, enforce: warn, context: ['\bConviction\b', '\bFramework\b', '\bDivine\b', '\bChurch\b', '\bCardinal\b', '\bdoctrine\b']}
  conv.order:      {canonical: Order,      aliases: [], legacy: [], category: conviction, enforce: warn, context: ['\bConviction\b', '\bFaith\b', '\bAutonomy\b', '\bReason\b', '\bEquity\b']}

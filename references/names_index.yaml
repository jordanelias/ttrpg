  # ── PRESSURE POINTS (the 4-axis social-contest class; new 2026-07-21, R2 / ED-IN-0082) ──
  # Same shape as convictions: `context` is the §3.5 disambiguation gate, migrated VERBATIM from
  # vector_audit's former hardcoded SEED (test_vector_audit pins byte-identical). vector_audit
  # sources CLASSES['pressure_point'] + the SEED tokens FROM here (§8). enforce: warn — the
  # displays collide with common words.
  ppt.evidence:    {canonical: Evidence,    aliases: [], legacy: [], category: pressure_point, enforce: warn, context: ['\bPressure Point\b', '\bInvestigation\b', '\bEvidence Track\b']}
  ppt.consequence: {canonical: Consequence, aliases: [], legacy: [], category: pressure_point, enforce: warn, context: ['\bPressure Point\b', '\bConsequentialist\b']}
  ppt.authority:   {canonical: Authority,   aliases: [], legacy: [], category: pressure_point, enforce: warn, context: ['\bPressure Point\b', '\bAuthority Challenge\b', '\binstitutional\b']}
  ppt.loyalty:     {canonical: Loyalty,     aliases: [], legacy: [], category: pressure_point, enforce: warn, context: ['\bPressure Point\b', '\bKnot\b', '\brelational\b']}

  # ── MECHANICS (strategic-layer mechanic tokens; new 2026-07-22, R2 namespacing / ED-IN-0082) ──
  # Namespaced ids so a generic "Stability"/"Mandate"/"Standing" is COLLISION-SAFE from the faction
  # stat fac.stability etc. — author or wire with [[mech.stability]] vs [[fac.stability]]. patterns
  # migrated verbatim from the hardcoded SEED; token_class: mechanic sources them into the audit
  # (category mechanic has no proper-noun mirror). enforce: warn (all collide with common words).
  mech.disposition: {canonical: Disposition, aliases: [], legacy: [], category: mechanic, token_class: mech, scale: mechanic, enforce: warn, patterns: ['\bDisposition\b']}
  mech.standing:    {canonical: Standing,    aliases: [], legacy: [], category: mechanic, token_class: mech, scale: mechanic, enforce: warn, patterns: ['\bStanding\b']}

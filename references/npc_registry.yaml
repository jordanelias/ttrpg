# VALORIA — Named Character Registry
# Canonical source of truth for ALL named characters.
# Every named NPC, faction leader, royal family member, or arc character gets an entry.
#
# ENFORCEMENT: No character name may appear in design docs without an entry here.
# Conviction vectors use 13-Conviction taxonomy (PP-684). Legacy labels DEPRECATED and removed.
#
# Last updated: 2026-05-08
# Status: ACTIVE — legacy labels migrated per PP-685; stats still deferred per npc_roster_v30

schema:
  required: [id, first_name, last_name, faction, role, status]
  optional: [age, birthplace, territory, ts, coherence, stats, convictions, goals, arc_trajectory, notes]


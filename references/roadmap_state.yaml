# Roadmap State — single source of truth for "where are we" at session start.
#
# Read by bootstrap (quick_bootstrap → report_roadmap) and printed in the
# Status Block under "ROADMAP POSITION". The companion human-facing document
# is the Pass-2 workplan artifact (valoria-audit-workplan.md), which lives
# outside the repo; THIS file is the in-repo mirror the bootstrap consumes.
#
# UPDATE DISCIPLINE: bump `updated` and the relevant phase/item counts whenever
# a phase or item completes, or a decision resolves. Stale roadmap state is a
# defect of the same class as a stale session log — surface, don't hide.
#
# Schema:
#   current_phase        — integer id of the phase in progress
#   phases[]             — id, name, status (complete|in_progress|not_started),
#                          items_total, items_done, optional completed date,
#                          optional next_actions[] (only for in_progress)
#   pending_decisions[]  — short id + one-line framing of each open decision


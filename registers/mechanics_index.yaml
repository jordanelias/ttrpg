# Valoria Mechanics Index
#
# Canonical registry of every mechanical system in the simulation, mapping each
# to its canon source, sim module path, test status, dependencies, and GD constraint
# applicability. Replaces ad-hoc grepping when reasoning about "what mechanics exist
# at scale X for faction Y."
#
# Schema authoring conventions: see tools/mechanics_index_gen.py for validation rules.
# Updates require co-commit of mechanics_index_gen.py validation pass.

schema_version: 1
last_authored: "2026-05-17"
authoring_pass: "Pass 2j armature index v1; renamed entries Pass 2 follow-up Option A 2026-05-17"
generator: "tools/mechanics_index_gen.py"
authoring_mode: "manual_v1"
freshness_note: "⚠️ (ED-IN-0025, 2026-07-07, C-VERIFY-3): the 'combat' entry (~line 215) was hand-patched 2026-06-22/23 (ED-1041) WITHOUT a file-wide re-authoring pass — last_authored/drift_report above are stale for every OTHER entry. Do not trust them as a currency signal; verify per-entry against CURRENT.md."
note: |
  Initial index population by Pass 2j manual authoring. Generator at v1 validates
  structure and cross-references; auto-population from canon-doc scanning is
  deferred to v2. Every entry traces to a canonical source doc and a sim/ module path.

# ─── Reference metadata ────────────────────────────────────────────────────

scales:
  primitive: "Dice engine + foundational rules (engine/params/core.md)"
  service: "Infrastructure (state, season loop, scene manager, registry — not game mechanics per se)"
  personal: "Character-scale individual actions"
  thread: "Thread-layer operations (substrate mechanics)"
  provincial: "Mass battle + provincial-scale faction actions"
  territory: "Settlement + infrastructure layer"
  peninsular: "Strategic-scale world tracks + season/accounting"
  world: "Background processes (RM PT decay, miraculous events, insurgency)"
  cross_scale: "Inter-scale handoff / echo / zoom / articulation"

gd_constraints:
  GD-1: "Peninsular Sovereignty is the sole victory condition"
  GD-2: "Deterministic threat response precedes stochastic action selection"
  GD-3: "Revolt -> Insurgency -> Faction emergence pipeline"

test_status_values:
  not_implemented: "stub raising NotImplementedError; canon source declared but no impl"
  provisional: "implementation present but balance-untested"
  validated_n100: "tested at N >= 100 sample"
  validated_n500: "tested at N >= 500 sample"
  validated_n1000: "tested at N >= 1000 sample"
  canonical: "validated at N >= 1000 + matches canon expectation + GD-compliant"
  contested: "depends on canon claim flagged as Claude-overreach contamination per Jordan diagnosis 2026-05-17 - awaiting audit"
  superseded: "mechanic STRUCK by GD constraint - preserved as supersession-trail evidence only"


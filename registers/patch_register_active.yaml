- id: PP-726
  class: A
  pre-framework: false
  date: 2026-05-10
  severity: P1
  description: "Substrate canon for the Valoria political hierarchy: Valn peninsula → Kingdom of Valoria → 3 duchies (Valorsmark/Almud-monarch, Hafenmark/Baralta, Varfell/Vaynard) → 14 provinces → 35 settlements (1-3 per province; siege-targets at city/fortress/village/town granularity). Plus Himmelenger Church city-state (sovereign ecclesiastical entity, like Vatican; 1 settlement) and Schoenland foreign Altonian island (politically independent; 1 settlement, sea-connected to Valorsplatz only). Askeheim is unincorporated Calamity-zone wilderness (0 settlements until healing). Resolves the granularity error that ran through PP-666/ED-710/PP-723: those iterations conflated siege-target settlements with subservient districts and outposts (Cathedrals, Markets, Barracks, Harbors, garrison towns, mines, watchtowers, lodges, shrines, watches, storehouses, coves, gates, ruins) at one level, producing a 36-entry §2.1 registry that mixed two granularities and a 49-edge adjacency graph at the wrong level. PP-726 establishes: (a) new substrate doc systems/settlements/valoria_political_hierarchy_v30.md defining the duchy/province/settlement hierarchy + fracturing rule (province with faction-split territories canonically fractures into northern/southern or western/eastern sub-provinces) + political-value computation (unified province > sum of constituent territories, structural; specific scalars TBD pending balance pass) + governor assignment (per-settlement, by faction); (b) refactored settlement_layer §2.1 with 37-settlement registry (S-001..S-037) + new §2.2 sub-features registry (22 sub-features as properties of parent settlements) + §2.3 migration map from old S-001..S-036; (c) rebuilt valoria_geography_v30.yaml :: settlement_adjacency: with 55 edges (28 intra-province with 7 triangles + 7 singles; 24 primary inter-province + 1 Schoenland sea-route + 3 second-routes for ≥2-rule resilience); (d) retuned PP-724/PP-725 §6.1 NPC residence canon to settlement names (Almud at Valorsplatz, Baralta at Gransol, Vaynard at Sigurdshelm, Confessor at Himmelenger, etc.) and §6.5 worked examples to corrected hop distances. All 35 Kingdom settlements + Himmelenger have ≥2 march-route connections verified; Schoenland at degree 1 is foreign-exempt awaiting ED-055 naval-scope expansion. Settlement counts: 7 provinces at 3 settlements (Valorsplatz capital, Kronmark+Feldmark breadbaskets, Gransol commerce-on-lake-Switzerland, Halvarshelm mining, Halvardshelm multi-fjord, Sigurdshelm ducal capital), 7 provinces at 2 settlements (Lowenskyst+Spartfell chokepoints, Stillhelm+Oastad Calamity-edge, Ehrenfeld fortress-city itself-the-gate, Rendstad remote valley, Grauwald highland sparse). New settlements authored: Auerheim, Königsbrück, Saatfeld, Goldenfurt, Tiefental, Erntehof, Spelzdorf, Aschenbach, Nordhain, Holzbrück, Niedersol, Saltbrück, Gelbgrund, Erzbach, Schmiedhof, Skogheim, Geirsvik, Yrnastead, Brynjard, Sundfjord, Salgrund (21 new names with culturally-coherent naming per duchy template). Old S-IDs deprecated; lazy migration in non-substrate documents (character_canon, migration_roster, npc_roster, editorial_ledger historical entries) as those documents are next touched. Per Jordan canonical clarification 2026-05-10: settlement = siege-target = city/fortress/village/town; districts/outposts/garrison-towns/mines/watchtowers etc. are subservient sub-features. Ehrenfeld is fortress-city gating crownlands from west and north (no forward defensive screens needed — fortress IS the gate). Gransol is Switzerland-like landlocked lake province (Gransol Harbor district is a lake-harbor not sea-harbor; Hafenmark trade routes overland via lake). Schoenland connects to Valorsplatz via the port (foreign Altonian, exempt from Kingdom's ≥2 rule pending ED-055)."

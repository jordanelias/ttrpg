# ─── Hook enforcement notes ──────────────────────────────────────────────────
#
# valoria_hooks.placeholder_names_gate() checks this file on every safe_commit.
# Behavior:
#   - For each placeholder with deadline_status == 'expired':
#       If placeholder_name appears in any committed file path OR content,
#       AND the commit does not include an entry in registers/placeholder_names.yaml
#       moving it from 'expired' to 'resolved' (with canonical_name_assigned field):
#         HALT with RuntimeError listing the placeholder.
#   - Placeholders with deadline_status == 'pending' do not trigger halt.
#   - Status flips ('pending' -> 'expired' -> 'resolved') are Jordan-controlled.
#
# Jordan workflow:
#   1. Conduct contamination audit (per id's contamination_audit_scope)
#   2. Flip deadline_status from 'pending' to 'expired' on the audit-complete
#      entry. Commit that flip.
#   3. Next session, when authoring the replacement: include canonical_name_assigned
#      field + flip status to 'resolved' + update paths_using_placeholder to
#      reflect rename. Commit replacement work + status flip in same commit.
#
# Hook is single-direction: pending -> expired -> resolved. No reverse flips.

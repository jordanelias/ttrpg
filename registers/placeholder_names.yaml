# Valoria Placeholder Names Registry
#
# Tracks generic-named modules and content-pending mechanics that ship with
# placeholder identity pending Jordan's contamination audit. Enforced by
# valoria_hooks.placeholder_names_gate.
#
# Lifecycle:
#   1. Module ships with placeholder name + placeholder identity content.
#      Status: 'pending'. Hook does not halt.
#   2. Jordan conducts contamination audit for the relevant faction.
#   3. Jordan flips status to 'expired' after audit, indicating: replacement
#      decision made (canonical name + cleaned content authored).
#   4. Next commit triggers placeholder_names_gate halt UNLESS the placeholder
#      name + paths have been updated to canonical name in this commit.
#
# This creates a forcing function: Jordan's audit triggers the rename,
# which becomes a precondition for further work on those modules.


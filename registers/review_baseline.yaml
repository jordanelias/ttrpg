# review_baseline.yaml — the ratchet for the Repository State Armature (ED-IN-0077).
#
# One row per report-only signal in tools/review_core.py's CHECKS registry. `baseline` is the
# ACCEPTED DEBT CEILING as measured at seeding: review_core `--check` fails only when a signal
# exceeds its baseline (a REGRESSION), so report-only signals are blocking-on-regression from day
# one WITHOUT branch-protection edits or CI job renames. Debt can only shrink — lowering a
# `baseline` is a one-line edit in the PR that earns it; when a row reaches `target` it is fully
# blocking. See systems/_architecture/repo_state_armature_v1.md §2.3.
#
# Governance: registers/review_baseline.yaml is CODEOWNERS-gated to Jordan (a debt ceiling is a
# design commitment). Raising any baseline requires an explicit ED and a loud call-out per ED-1094.
schema_version: 1
seeded: "2026-07-20"
seeded_by: "ED-IN-0077"
# `baseline` is a DEBT-COUNT ceiling: review_core parses the count each tool prints on failure
# (count_re in tools/review_core.py's CHECKS) and regresses only when count > baseline. Where a
# tool prints no parseable count (wiring), the ratchet falls back to boolean (any failure on a
# baseline-0 signal regresses). Banked 2026-07-20 (ED-IN-0077) to true measured debt after the
# currency/freshness reconcile drove currency to 0 — the shrink is banked per the ratchet rule
# "debt can only shrink; each shrink is a one-line baseline edit in the PR that earns it."
signals:
  currency.stamps:
    baseline: 0        # reconciled to 0 this PR (CURRENT.md paths + id ceilings all current); any drift now regresses
    target: 0
  vocab.a17:
    baseline: 29       # A17 quantity-vocabulary closure: measured 29/71 unresolved (was seeded 36, stale by 7)
    target: 0
    flip_blocking_at: 0
  wiring.coverage:
    baseline: 0        # wiring_map_check --check passes (27/27 · 7/7); boolean fallback — any failure regresses
    target: 0
  definitions.parity:
    baseline: 0        # definitions store current + name parity holds; boolean fallback — drift/mismatch regresses
    target: 0

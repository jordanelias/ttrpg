# Valoria Skill Registry — yaml form
#
# Single source of truth for all skills in the project, in a structured form
# that can be consumed by valoria_hooks.py and tooling. The companion
# skill_registry.md remains the human-readable documentation; this file is
# authoritative for any programmatic check (presence, model routing, gating).
#
# CO-FILE RULE (enforced by valoria_hooks.pre_commit_gate):
#   If any commit modifies skills/<name>/SKILL.md (add, rename, or content change),
#   this file must also be modified in the same commit. Update the corresponding
#   entry's last_verified date and any changed fields. Adding a new skill: add
#   a new entry. Removing one: delete the entry and remove the SKILL.md.
#
# Fields per entry:
#   name              — directory name under skills/
#   path              — primary SKILL.md path
#   model             — Anthropic model the skill is targeted at when invoked
#   triggers          — phrases / situations that route the orchestrator here
#   purpose           — one-line description
#   references_dir    — optional, references/ subdir if the skill has support files
#   scripts           — optional, list of scripts the skill ships
#   gating_hooks      — list of hooks (functions in valoria_hooks.py) that this
#                       skill is required-fetched by, or that depend on this skill
#   last_verified     — ISO date this entry was last reconciled with disk reality


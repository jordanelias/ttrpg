# ── Routing matrix (consumed by orchestrator) ────────────────────────────────
# Maps user-intent phrases to (skill, modes/workflows). Authoritative for
# orchestrator routing decisions; the markdown registry mirrors this for humans.

routing:
  - intent: "stress test [specific mechanic]"
    skill: valoria-simulator
    modes: [A, D, J, L]
  - intent: "stress test [subsystem]"
    skill: valoria-simulator
    modes: [G-submode, D, J, K, L]
  - intent: "simulate [scenario]"
    skill: valoria-simulator
    modes: [C, M]
  - intent: "audit [subsystem]"
    skill: valoria-mechanic-audit
    modes: [A, B, C, D, E, F, G]
  - intent: "topographic audit / vector audit"
    skill: valoria-vector-audit
    modes: ["full pipeline"]
  - intent: "vocabulary debt"
    skill: valoria-vector-audit
    modes: [G]
  - intent: "find isolates / what's disconnected"
    skill: valoria-vector-audit
    modes: [E, H]
  - intent: "find implied connections"
    skill: valoria-vector-audit
    modes: [B, C]
  - intent: "canon check [mechanic]"
    skill: valoria-canon-guard
    modes: ["full P-01–P-14 pass"]
  - intent: "resolve editorials"
    skill: valoria-editorial-register
    modes: [A]
  - intent: "compile"
    skill: valoria-compiler
    modes: ["full pass"]
  - intent: "atomize / split design doc"
    skill: valoria-atomizer
    modes: ["index/infill split + registry update"]
  - intent: "write [prose/scene/codex/dialogue]"
    skill: prose-writer
    modes: ["coherence-tiered narrative composition"]

  - intent: "is this NERS compliant / resolution audit / balance audit"
    skill: valoria-resolution-diagnostic
    modes: ["full pipeline Stage 0-5 (incl. Stage-0 calibration + historical-precedent validation)"]
  - intent: "stress test resolution / small pool problem / death spiral / cliff check"
    skill: valoria-resolution-diagnostic
    modes: ["Stage 1 diagnostic only, or full pipeline"]

  - intent: "module contract / wrapper conformance / adjudicate the architecture"
    skill: valoria-module-adjudicator
    modes: ["full pipeline Stage 0-4 (extract -> adjudicate A1-A9 + J1-J3 -> verdict -> enforce)"]
  - intent: "key wiring / does the graph close / enforce the wrappers"
    skill: valoria-module-adjudicator
    modes: ["Stage 2-3 over existing contracts (assessor run + verdict)"]

# ── Drift-detection notes ────────────────────────────────────────────────────
# - Co-file enforcement at Level 4 prevents skills/SKILL.md changes from drifting
#   from this registry within a commit. CI mirror should run an equivalent check.
# - The companion markdown (skill_registry.md) is updated alongside this file by
#   the same commit; consider it human-readable view, this yaml is canonical.
# - To verify: at any time, `ls skills/*/SKILL.md` should produce exactly the
#   set of `skills[].path` values here.

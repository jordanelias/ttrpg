<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valoria — Combat Workbench</title>
<style>
  :root{
    --bg:#14161b; --panel:#1c1f27; --panel2:#232733; --line:#2e3340; --ink:#dfe3ea; --dim:#9aa3b2;
    --accent:#6ea8fe; --good:#6ee7a8; --warn:#f0b86e; --bad:#f08a8a; --bind:#c9a0ff;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:14px}
  header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
  .nb{font-size:11px;color:var(--warn);border:1px solid var(--warn);border-radius:5px;padding:1px 7px;opacity:.85}
  .wrap{display:grid;grid-template-columns:300px 1fr 340px;gap:0;height:calc(100vh - 47px)}
  .col{overflow:auto;padding:14px}
  .col.mid{background:#11131a;border-left:1px solid var(--line);border-right:1px solid var(--line)}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--dim);margin:2px 0 10px}
  .fighter{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:10px}
  .fighter input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:5px;padding:5px 7px;margin-bottom:7px;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .stats label{font-size:10px;color:var(--dim);display:flex;flex-direction:column;gap:2px}
  .stats input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:3px 4px}
  select,.seed input{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:5px;padding:5px 7px;width:100%}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
  .ctrls{display:flex;gap:8px;align-items:center;margin:8px 0 16px;flex-wrap:wrap}
  button{background:var(--accent);color:#0b1020;border:0;border-radius:6px;padding:7px 13px;font-weight:650;cursor:pointer}
  button.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
  button:active{transform:translateY(1px)}
  .seed{display:flex;align-items:center;gap:6px;color:var(--dim);font-size:12px}
  .seed input{width:70px}
  /* trace */
  .turn{margin:14px 0 4px;color:var(--accent);font-weight:650}
  .beat{border-left:2px solid var(--line);margin:2px 0 2px 6px;padding:3px 0 3px 12px}
  .node{padding:2px 6px;border-radius:5px;cursor:pointer}
  .node:hover{background:#1a1d26}
  .node .tag{color:var(--dim)}
  .deg-success{color:var(--good)} .deg-overwhelming{color:var(--good);font-weight:700}
  .deg-fail{color:var(--bad)} .deg-partial{color:var(--warn)}
  .hit{color:var(--good)} .bind{color:var(--bind)} .rip{color:var(--accent)} .clean{color:var(--dim)}
  .branches{margin:3px 0 6px 20px;display:none}
  .branches.open{display:block}
  .br{display:grid;grid-template-columns:160px 1fr 44px;gap:8px;align-items:center;font-size:12px;margin:2px 0}
  .bar{height:9px;background:var(--panel2);border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);opacity:.55}
  .br.took .bar i{opacity:1;background:var(--good)}
  .br.took{color:var(--ink);font-weight:600}
  .br.d2{cursor:pointer}
  .br.d2:hover{background:#1a1d26;border-radius:4px}
  .branches.d2{margin:1px 0 4px 14px;border-left:1px solid var(--line);padding-left:8px}
  .meta{color:var(--dim);font-size:12px}
  .sep{color:var(--dim);margin:4px 0 2px 6px}
  .result{margin-top:14px;font-size:15px;font-weight:700}
  .call{font-size:14px;line-height:1.55;padding:1px 0}
  .call.hit{color:var(--good)} .call.bind{color:var(--bind)} .call.riposte{color:var(--accent)} .call.felled{color:var(--bad);font-weight:600}
  .mech{margin:3px 0 6px 12px;color:var(--dim);font-size:12px;border-left:2px solid var(--line);padding-left:10px}
  .mech div{padding:1px 0}
  .oddstoggle{margin:1px 0 6px 12px;color:var(--accent);font-size:12px;cursor:pointer;opacity:.85}
  .oddstoggle:hover{opacity:1}
  .oddsbox{display:none;margin:2px 0 8px 10px}
  .oddsbox.open{display:block}
  /* tuning */
  .tab{display:flex;gap:6px;margin-bottom:10px}
  .tab button{background:var(--panel2);color:var(--ink);font-weight:600;padding:4px 9px;font-size:12px}
  .tab button.on{background:var(--accent);color:#0b1020}
  .pgroup{margin-bottom:6px}
  .pgroup .glabel{font-size:11px;color:var(--dim);margin:8px 0 4px}
  .prow{display:grid;grid-template-columns:1fr 78px;gap:6px;align-items:center;padding:2px 0}
  .prow code{font-size:11px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prow input{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:3px 5px;text-align:right}
  .prow input:disabled{opacity:.5;cursor:not-allowed}
  .prow.changed input{border-color:var(--warn);color:var(--warn)}
  .search{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:5px;padding:5px 7px;margin-bottom:8px}
  .promote{margin-top:10px}
  pre.diff{background:#0d0f14;border:1px solid var(--line);border-radius:6px;padding:8px;font-size:11px;white-space:pre-wrap;color:var(--dim);max-height:180px;overflow:auto}
  .winbar{height:26px;border-radius:6px;overflow:hidden;background:var(--bad);display:flex;margin:6px 0}
  .winbar i{background:var(--good);display:block;height:100%}
  .empty{color:var(--dim);padding:30px 6px}
  @media (max-width:980px){
    .wrap{grid-template-columns:1fr;height:auto}
    .col{height:auto;max-height:none}
    .col.mid{border-left:0;border-right:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  }
</style>
</head>
<body>
<header>
  <h1>Valoria · Combat Workbench</h1>
  <span class="nb" id="modebadge">n = 1 — one outcome, not a probability</span>
  <span class="meta" id="status"></span>
</header>
<div class="wrap">
  <!-- LEFT: scenario -->
  <div class="col">
    <h2>Scenario</h2>
    <div id="fighterA"></div>
    <div id="fighterB"></div>
    <div class="ctrls">
      <button onclick="runTrace()">Run &amp; watch</button>
      <span class="seed">seed <input id="seed" type="number" value="3"></span>
    </div>
    <div class="ctrls">
      <button class="ghost" onclick="runMC()">Monte&nbsp;Carlo</button>
      <span class="seed">trials <input id="trials" type="number" value="1000"></span>
    </div>
    <div id="mc"></div>
  </div>
  <!-- MID: trace -->
  <div class="col mid" id="trace"><div class="empty">Set up two fighters and press <b>Run &amp; watch</b>. Click any node to see the branches it could have taken.</div></div>
  <!-- RIGHT: tuning -->
  <div class="col">
    <h2>Engine tuning</h2>
    <div class="tab" id="tabs"></div>
    <input class="search" id="psearch" placeholder="filter params…" oninput="renderParams()">
    <div id="params"></div>
    <div class="promote">
      <div class="row2">
        <input id="presetName" type="text" placeholder="scratch preset name" style="background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:5px;padding:5px 7px">
        <button class="ghost" onclick="savePreset()">Save</button>
      </div>
      <button class="ghost" style="margin-top:6px;width:100%" onclick="promote()">Promote diff (review)</button>
      <pre class="diff" id="diff" style="display:none"></pre>
    </div>
  </div>
</div>
<script>
const WEAPONS=["rapier","arming","longsword","greatsword","sabre","dagger","paired_short","spear","staff","mace","poleaxe"];
const TRADITIONS=["none","german","italian","spanish","japanese","chinese","filipino","english"];
const ARMORS=["none","light","medium","heavy"];
const STATS=["strength","agi","end","cog","att","spirit","focus","history","disp"];
let PARAMS=null, ACTIVE='C', BASE={};

function fighterCard(id,name,wpn,trad){
  const stats=STATS.map(s=>`<label>${s}<input type="number" min="1" max="7" value="${s==='disp'?4:(['strength','agi','end'].includes(s)?4:3)}" data-f="${id}" data-s="${s}"></label>`).join('');
  const opt=(arr,v)=>arr.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('');
  return `<div class="fighter">
    <input type="text" value="${name}" data-f="${id}" data-s="label">
    <div class="stats">${stats}</div>
    <div class="row2">
      <select data-f="${id}" data-s="weapon">${opt(WEAPONS,wpn)}</select>
      <select data-f="${id}" data-s="armor">${opt(ARMORS,'light')}</select>
    </div>
    <div class="row2" style="margin-top:6px">
      <select data-f="${id}" data-s="tradition">${opt(TRADITIONS,trad)}</select>
    </div>
  </div>`;
}
document.getElementById('fighterA').innerHTML=fighterCard('A','Bryn','arming','italian');
document.getElementById('fighterB').innerHTML=fighterCard('B','Halla','longsword','german');

function readFighter(id){
  const o={};
  document.querySelectorAll(`[data-f="${id}"]`).forEach(el=>{o[el.dataset.s]=el.type==='number'?+el.value:el.value;});
  return o;
}
function scenario(){return {A:readFighter('A'),B:readFighter('B')};}

function overrides(){
  const ov={};
  document.querySelectorAll('.prow input[data-key]').forEach(el=>{
    if(el.disabled) return;
    const k=el.dataset.key, v=parseFloat(el.value);
    if(!isNaN(v) && v!==BASE[k]) ov[k]=v;
  });
  return ov;
}
async function api(path,body){
  const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}

// ---- tuning panel ----
async function loadParams(){
  PARAMS=await (await fetch('/api/params')).json();
  for(const cls of ['A','B','C','M']) for(const [k,v] of Object.entries(PARAMS[cls].params)) BASE[k]=v;
  document.getElementById('tabs').innerHTML=['C','B','A','M'].map(c=>`<button class="${c===ACTIVE?'on':''}" onclick="ACTIVE='${c}';renderTabs();renderParams()">${c} · ${PARAMS[c].label.split('(')[0].trim().split(' ')[0]}</button>`).join('');
  renderParams();
}
function renderTabs(){document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.textContent.startsWith(ACTIVE+' ')));}
function renderParams(){
  const g=PARAMS[ACTIVE], q=(document.getElementById('psearch').value||'').toLowerCase();
  const rows=Object.entries(g.params).filter(([k])=>k.toLowerCase().includes(q)).map(([k,v])=>{
    const dis=g.editable?'':'disabled';
    return `<div class="prow" data-row="${k}"><code title="${k}">${k}</code>
      <input data-key="${k}" type="number" step="any" value="${v}" ${dis} oninput="markChanged(this)"></div>`;
  }).join('');
  document.getElementById('params').innerHTML=`<div class="glabel">${g.label}${g.editable?'':' — read-only'}</div>${rows||'<div class="meta">no params</div>'}`;
}
function markChanged(el){
  const k=el.dataset.key; el.closest('.prow').classList.toggle('changed', parseFloat(el.value)!==BASE[k]);
}
async function savePreset(){
  const name=document.getElementById('presetName').value.trim()||'scratch';
  const r=await api('/api/save_preset',{name,overrides:overrides()});
  setStatus('saved preset: '+(r.saved||'?'));
}
async function promote(){
  const r=await api('/api/promote',{overrides:overrides()});
  const d=document.getElementById('diff'); d.style.display='block';
  d.textContent=r.patch+'\n\nledger stub:\n'+JSON.stringify(r.ledger_stub,null,2);
}

// ---- trace render ----
function setStatus(s){document.getElementById('status').textContent=s;}
function pct(p){return Math.round(p*100)+'%';}
function distRow(label,p,extra,cls){
  return `<div class="br ${cls||''}"${extra||''}><span>${label}</span><span class="bar"><i style="width:${Math.round(p*100)}%"></i></span><span>${pct(p)}</span></div>`;
}
function branchesBlock(e){
  if(!e.dist) return '';
  const took=tookBranch(e);
  const rows=Object.entries(e.dist).map(([label,p])=>{
    const isTook = took!==null && branchMatches(e,label,took);
    const d2 = e.dist2 && e.dist2[label];   // depth-2: what this degree leads to
    if(d2){
      const head = distRow(label+' ▸', p,
        ` onclick="event.stopPropagation(); this.nextElementSibling.classList.toggle('open')"`,
        (isTook?'took ':'')+'d2');
      const kids = '<div class="branches d2">'+Object.entries(d2).map(([k,v])=>distRow(k,v,'','')).join('')+'</div>';
      return head + kids;
    }
    return distRow(label, p, '', isTook?'took':'');
  }).join('');
  return `<div class="branches">${rows}</div>`;
}
function tookBranch(e){
  if(e.kind==='commit') return 'commit '+e.commit;
  if(e.kind==='read') return e.read_win?'defender reads (Vor flips)':'attacker hides it';
  if(e.kind==='roll'||e.kind==='stophit') return e.degree;
  if(e.kind==='approach') return null;
  return null;
}
function branchMatches(e,label,took){
  if(e.kind==='roll'||e.kind==='stophit') return label===took;
  return label===took;
}
function nodeRow(html,e){
  const hasBr=!!e.dist;
  return `<div class="node" ${hasBr?'onclick="this.nextElementSibling.classList.toggle(\'open\')"':''}>${html}${hasBr?' <span class="tag">▸ branches</span>':''}</div>${branchesBlock(e)}`;
}
function degSpan(d){return `<span class="deg-${d}">${d.toUpperCase()}</span>`;}
function renderTrace(events){
  const el=document.getElementById('trace'); el.innerHTML='';
  let beat=null;
  const add=h=>{const d=document.createElement('div');d.innerHTML=h;el.appendChild(d.firstElementChild||d);};
  for(const e of events){
    if(e.kind==='fight_start'){ add(`<div class="meta">${e.A} (${e.weapon_A}/${e.tradition_A}) vs ${e.B} (${e.weapon_B}/${e.tradition_B})</div>`); }
    else if(e.kind==='turn_start'){ add(`<div class="turn">Turn ${e.turn} — ${e.first} moves first</div>`); }
    else if(e.kind==='engagement_start'){ add(`<div class="meta">${e.closed?'begin closed':'begin at measure, gap '+e.measure_gap+' ('+e.longer+' longer)'}</div>`); }
    else if(e.kind==='approach'){ add(nodeRow(`<span class="tag">approach</span> ${e.shorter} closes (gap ${e.gap}); ${e.longer} stop-hit ${pct(e.stophit_p)}${e.just_closed?' → closed':''}`,e)); }
    else if(e.kind==='stophit'){ add(nodeRow(`<span class="tag">stop-hit</span> ${e.longer} → ${degSpan(e.degree)}`,e)); }
    else if(e.kind==='commit'){ beat=document.createElement('div');beat.className='beat';el.appendChild(beat); beat.innerHTML=nodeRow(`<b>${e.aggressor}</b> commits <b>${e.commit}</b>`,e); }
    else if(e.kind==='read'){ if(beat) beat.innerHTML+=nodeRow(`<span class="tag">read</span> ${e.defender}: ${pct(e.p_read_win)} to read → <b>${e.read_win?'reads it':'misses'}</b>`,e); }
    else if(e.kind==='mode'){ if(beat) beat.innerHTML+=`<div class="node"><span class="tag">defence</span> ${e.defender} ${e.mode}${e.chosen_by==='read'?'':' (guess)'}</div>`; }
    else if(e.kind==='roll'){ if(beat) beat.innerHTML+=nodeRow(`<span class="tag">resolve</span> ${e.aggressor} pool ${e.pool}, edge ${e.net_sigma>=0?'+':''}${e.net_sigma} → ${degSpan(e.degree)}`,e); }
    else if(e.kind==='outcome'){
      let cls='clean',txt='clean defence';
      if(e.hit>0){cls='hit';txt=`${e.aggressor} HITS ${e.defender}`;}
      else if(e.bind){cls='bind';txt='blades bind';}
      else if(e.riposte){cls='rip';txt=`${e.defender} ripostes (flip)`;}
      if(beat) beat.innerHTML+=`<div class="node"><span class="${cls}">→ ${txt}</span> <span class="meta">(${e.A_wounds}/${e.B_wounds} wounds)</span></div>`;
    }
    else if(e.kind==='engagement_end'){ add(`<div class="sep">— ${e.felled?e.felled+' is felled':'they separate'}</div>`); beat=null; }
    else if(e.kind==='fight_result'){ add(`<div class="result">${e.winner?e.winner+' wins':'unresolved'}</div>`); }
  }
}
// ---- commentary transcript (the legible main view) ----
function distRowsFor(dist, took, dist2){
  return Object.entries(dist).map(([label,p])=>{
    const isTook = took!=null && label===took;
    const d2 = dist2 && dist2[label];
    if(d2){
      const head=distRow(label+' ▸',p,` onclick="event.stopPropagation(); this.nextElementSibling.classList.toggle('open')"`,(isTook?'took ':'')+'d2');
      const kids='<div class="branches d2">'+Object.entries(d2).map(([k,v])=>distRow(k,v,'','')).join('')+'</div>';
      return head+kids;
    }
    return distRow(label,p,'',isTook?'took':'');
  }).join('');
}
function branchNode(b){
  return `<div class="node" onclick="this.nextElementSibling.classList.toggle('open')"><span class="tag">${b.label} ▸</span></div><div class="branches">${distRowsFor(b.dist,b.took,b.dist2)}</div>`;
}
function entryHTML(e){
  const mech = e.mech ? `<div class="mech">${(Array.isArray(e.mech)?e.mech:[e.mech]).map(m=>'<div>'+m+'</div>').join('')}</div>` : '';
  const odds = e.branches ? `<div class="oddstoggle" onclick="this.nextElementSibling.classList.toggle('open')">▸ odds &amp; alternate branches</div><div class="oddsbox">${e.branches.filter(Boolean).map(branchNode).join('')}</div>` : '';
  if(e.type==='turn') return `<div class="turn">${e.line}</div>`;
  if(e.type==='result') return `<div class="result">${e.line}</div>${mech}`;
  if(e.type==='beat') return `<div class="beat"><div class="call ${e.cls||''}">${e.line}</div>${mech}${odds}</div>`;
  const cls = e.type==='sep'?'sep':'meta';
  return `<div class="${cls}"><span class="${e.cls||''}">${e.line}</span></div>${mech}${odds}`;
}
function renderCommentary(entries){
  document.getElementById('trace').innerHTML = entries.map(entryHTML).join('');
}
async function runTrace(){
  setStatus('running…');
  document.getElementById('modebadge').textContent='n = 1 — one outcome, not a probability';
  const r=await api('/api/trace',{scenario:scenario(),overrides:overrides(),seed:+document.getElementById('seed').value});
  if(r.error){setStatus('error: '+r.error);return;}
  renderCommentary(r.commentary); setStatus('done · '+(r.winner?r.winner+' won this run':'unresolved'));
}
async function runMC(){
  setStatus('running trials…');
  const trials=+document.getElementById('trials').value;
  const r=await api('/api/montecarlo',{scenario:scenario(),overrides:overrides(),trials,seed:+document.getElementById('seed').value});
  if(r.error){setStatus('error: '+r.error);return;}
  const w=Math.round(r.A_winrate*100);
  document.getElementById('mc').innerHTML=`<div class="meta" style="margin-top:6px">Monte Carlo · N=${r.decided} decided (${r.draws} draws) · position-swapped</div>
    <div class="winbar"><i style="width:${w}%"></i></div>
    <div class="meta"><b>${r.A_label} ${w}%</b> &nbsp;[95% CI ${Math.round(r.ci_lo*100)}–${Math.round(r.ci_hi*100)}%] &nbsp; vs ${r.B_label}</div>`;
  setStatus('trials done');
}
loadParams();
</script>
</body>
</html>

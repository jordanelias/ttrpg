# External tool / model version pins
# Single-source-of-truth for external versions referenced across PI, architecture spec,
# userPreferences, and other governance docs. Update when any pinned version moves.
#
# This file replaces ad-hoc version strings scattered through governance text.
# When PI / architecture-spec / preferences documents reference an external tool
# version, they should source from this file rather than carrying their own copy.
#
# Verified: 2026-05-10
# Convention: pin format follows the tool's own canonical version string.

engine:
  godot:
    version: "4.6"
    canonical_string: "Godot 4.6"
    role: "Implementation engine for jordanelias/valoria-game (GDScript, scenes, assets)."
    referenced_in:
      - "project-architecture-valoria-v2_2.md (project knowledge)"
      - "VALORIA project instructions (project knowledge)"
      - "userPreferences-v6.1.md (account)"

models:
  # Models are governance-relevant primarily for artifact-side API calls and skill model_routing.
  # Conversation model is set in claude.ai UI; this file pins what skills/prompts target.
  opus:
    primary: "claude-opus-4-7"
    fallback: "claude-opus-4-6"
    context_window_tokens: 1_000_000
    role: "Multi-step >50k, dispersed-evidence synthesis, 5+ tool orchestration, max-effort tasks."
  sonnet:
    primary: "claude-sonnet-4-6"
    context_window_tokens: 1_000_000
    role: "Moderate reasoning, code gen, <50k context, <5 tool calls. Default for most skills."
  haiku:
    primary: "claude-haiku-4-5"
    context_window_tokens: 200_000
    role: "Single-step, <2k input, no reasoning chain."

repositories:
  ttrpg:
    canonical_full_name: "jordanelias/ttrpg"
    role: "Design source of truth — lore, mechanics, narrative, character canon."
    branch: "main"
  valoria_game:
    canonical_full_name: "jordanelias/valoria-game"
    role: "Godot implementation — engine, scenes, GDScript, assets."
    branch: "main"

notes:
  - "When updating any pin, also bump the relevant text in PI / userPreferences / architecture-spec in the same conceptual change."
  - "Hooks and tools should not hard-code these values; read from this file when checking is needed."
  - "Adding a new tool or model dependency: add a top-level key here first, then reference it from governance docs."
